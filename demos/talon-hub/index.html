  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --maroon:#EF4152; --maroon-deep:#C8102E; --red:#EF4152; --red-deep:#C8102E; --gold:#F4C300;

  :root[data-theme="dark"] {
    --maroon:#EF4152; --maroon-deep:#C8102E; --red:#EF4152; --red-deep:#C8102E; --gold:#F4C300;
    --bg:#141518; --panel:#1B1D21; --card:#212429;
    --text:#ECEDEF; --muted:#9AA1AC; --line:#2C313A; --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
    --ok:#3DBB7E; --warn:#E08A2B; --err:#E5675A;
  }

  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; }

  /* app shell: fixed app bar + optional chip row, scrolling content, fixed bottom tabs */
  .app { display:flex; flex-direction:column; min-height:100dvh; }
  .abar { position:sticky; top:0; z-index:5; flex:none; display:flex; align-items:center; gap:.5rem; padding:.55rem .9rem;
    background:var(--maroon); color:#fff; }
  .abar .crest { width:42px; height:27px; background:#fff var(--logo) center/contain no-repeat; border-radius:5px; flex:none; }
  .abar .title { font-weight:800; font-size:1rem; letter-spacing:-.01em; }
  .abar .meta { margin-left:auto; font-size:.72rem; color:rgba(255,255,255,.82); font-weight:700; }
  .abar .act { color:#fff; background:rgba(255,255,255,.16); border:0; border-radius:999px; padding:.3rem .7rem; font-size:.75rem; font-weight:700; }

  .chips { position:sticky; z-index:4; flex:none; display:flex; gap:.4rem; padding:.5rem .8rem; overflow-x:auto;
    background:var(--bg); border-bottom:1px solid var(--line); -webkit-overflow-scrolling:touch; }
  .chips::-webkit-scrollbar { display:none; }
  .chip { flex:none; display:flex; align-items:center; gap:.35rem; padding:.32rem .6rem; border:1px solid var(--line);
    border-radius:999px; background:var(--card); color:var(--text); font-size:.75rem; font-weight:700; white-space:nowrap; cursor:pointer; }
  .chip.on { background:var(--maroon); color:#fff; border-color:var(--maroon); }
  .chip.on .badge { background:rgba(255,255,255,.2); }
  .chip.on .badge svg { color:#fff; }
  .chip.on .badge .lvl { background:#fff; color:var(--maroon); border-color:transparent; }
  .chip .dot { min-width:16px; height:16px; padding:0 .25rem; border-radius:999px; background:var(--err); color:#fff;
    font-size:.58rem; font-weight:900; display:flex; align-items:center; justify-content:center; }
  /* Team lifecycle tag (Preseason / Offseason / Past season) — quiet by default,
     inverts on a selected chip. */
  .phasepill { font-size:.58rem; font-weight:800; padding:.1rem .4rem; border-radius:999px; text-transform:uppercase; letter-spacing:.02em;
    background:color-mix(in srgb,var(--gold) 30%,transparent); color:#5b4a00; white-space:nowrap; }
  .chip.on .phasepill { background:rgba(255,255,255,.22); color:#fff; }

  main.content { flex:1; padding:.85rem .85rem 5.5rem; display:flex; flex-direction:column; gap:.6rem; max-width:34rem; margin:0 auto; width:100%; }

  .tabbar { position:fixed; bottom:0; left:0; right:0; z-index:6; display:flex; background:var(--card);
    border-top:1px solid var(--line); padding:.3rem .1rem calc(.3rem + env(safe-area-inset-bottom)); }
  .tabbar .tb { flex:1; display:flex; flex-direction:column; align-items:center; gap:.15rem; background:none; border:0;
    font-size:.6rem; font-weight:700; color:var(--muted); padding:.25rem 0; cursor:pointer; }
  .tabbar .tb.on { color:var(--maroon); }
  .tabbar .tb svg { width:21px; height:21px; color:currentColor; }
  .tabbar .tb:focus-visible, .chip:focus-visible, .abar .act:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }

  /* sport badge: mono glyph + red level letter */
  .badge { position:relative; width:28px; height:28px; border-radius:8px; background:color-mix(in srgb,var(--text) 8%,transparent);
    display:flex; align-items:center; justify-content:center; flex:none; }
  .badge svg { width:16px; height:16px; color:var(--text); }
  .badge .lvl { position:absolute; bottom:-5px; right:-6px; background:var(--card); color:var(--maroon); font-size:.5rem;
    font-weight:900; padding:.02rem .18rem; border-radius:5px; border:1px solid var(--line); line-height:1.25; }
  .badge.lg { width:36px; height:36px; border-radius:10px; } .badge.lg svg { width:21px; height:21px; }

  /* athlete avatar: photo thumbnail or initials placeholder */
  .avatar { width:38px; height:38px; border-radius:999px; flex:none; overflow:hidden; display:inline-flex; align-items:center; justify-content:center;
    background:color-mix(in srgb,var(--maroon) 14%,var(--card)); color:var(--maroon); font-weight:800; font-size:.85rem; }
  .avatar img { width:100%; height:100%; object-fit:cover; display:block; }
  .avatar.lg { width:60px; height:60px; font-size:1.25rem; }

  /* atoms */
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:.7rem .8rem; box-shadow:var(--shadow); }
  .card.tight { padding:.55rem .7rem; }
  .flex { display:flex; align-items:center; gap:.5rem; }
  .row2 { display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
  .h { font-size:.9rem; font-weight:700; } .s { font-size:.78rem; color:var(--muted); } .xs { font-size:.7rem; color:var(--muted); }
  .sectlabel { font-size:.66rem; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); font-weight:800; margin:.5rem .15rem .1rem; }
  .pill { font-size:.62rem; font-weight:800; padding:.12rem .45rem; border-radius:999px; text-transform:uppercase; letter-spacing:.02em; }
  .pill.ok{background:color-mix(in srgb,var(--ok) 16%,transparent);color:var(--ok);}
  .pill.warn{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn);}
  .pill.err{background:color-mix(in srgb,var(--err) 16%,transparent);color:var(--err);}
  .pill.gold{background:color-mix(in srgb,var(--gold) 32%,transparent);color:#5b4a00;}
  .pill.win{background:var(--ok);color:#fff;} .pill.plain{background:color-mix(in srgb,var(--text) 9%,transparent);color:var(--muted);}
  .livebadge{display:inline-flex;align-items:center;gap:.3rem;background:var(--err);color:#fff;border-radius:999px;padding:.1rem .5rem;font-size:.7rem;font-weight:700;letter-spacing:.03em;}
  .livebadge::before{content:"";width:.5rem;height:.5rem;border-radius:50%;background:#fff;animation:livepulse 1.4s ease-in-out infinite;}
  @keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.2;}}
  @media (prefers-reduced-motion: reduce){.livebadge::before{animation:none;}}
  .watchbtn{display:inline-block;background:var(--err);color:#fff;border-radius:8px;padding:.35rem .7rem;font-size:.8rem;font-weight:600;text-decoration:none;margin-top:.4rem;}
  .watchbtn.hl{background:var(--maroon);}
  .btn { border:0; border-radius:10px; background:var(--maroon); color:#fff; font-weight:700; font-size:.85rem; padding:.6rem .8rem; text-align:center; cursor:pointer; }
  .btn:active { background:var(--maroon-deep); }
  .btn.ghost { background:transparent; color:var(--maroon); border:1px solid color-mix(in srgb,var(--maroon) 40%,var(--line)); }
  .btn.block { display:block; width:100%; }
  .input, select.input { width:100%; font-size:1rem; padding:.6rem .7rem; border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--text); }
  .conflict { border:1px solid color-mix(in srgb,var(--err) 45%,var(--line)); background:color-mix(in srgb,var(--err) 8%,var(--card)); border-radius:14px; padding:.7rem .8rem; }
  .todo { border:1px solid color-mix(in srgb,var(--warn) 45%,var(--line)); background:color-mix(in srgb,var(--warn) 8%,var(--card)); border-radius:14px; padding:.7rem .8rem; }
  .notice { background:color-mix(in srgb,var(--gold) 12%,var(--card)); border:1px solid color-mix(in srgb,var(--gold) 45%,var(--line)); border-radius:12px; padding:.6rem .8rem; font-size:.85rem; }
  /* Announcement banner — sticky just under the app bar, dismissible. */
  .annc-bar { position:sticky; top:0; z-index:6; flex:none; display:flex; flex-direction:column; }
  .annc-item { display:flex; align-items:flex-start; gap:.5rem; padding:.5rem .9rem; font-size:.82rem; background:color-mix(in srgb,var(--gold) 22%,var(--card)); border-bottom:1px solid color-mix(in srgb,var(--gold) 45%,var(--line)); }
  .annc-item.urgent { background:color-mix(in srgb,var(--err) 16%,var(--card)); border-bottom-color:color-mix(in srgb,var(--err) 45%,var(--line)); }
  .annc-item .annc-body { flex:1; }
  .annc-item .annc-x { flex:none; border:0; background:transparent; color:var(--muted); font-size:1rem; line-height:1; cursor:pointer; padding:0 .1rem; }
  .center { text-align:center; } .muted { color:var(--muted); }
  .build-stamp { text-align:center; color:var(--muted); opacity:.7; font-size:.68rem; padding:1.5rem 0 .5rem; }
  .toast { position:fixed; left:50%; bottom:5rem; transform:translateX(-50%); background:var(--text); color:var(--bg);
    padding:.5rem .9rem; border-radius:999px; font-size:.8rem; font-weight:700; z-index:20; box-shadow:var(--shadow); }
  /* In-app dialog — replaces native alert/confirm/prompt so there's no browser
     "An embedded page at …googleusercontent.com says" banner. Themed + light/dark. */
  .tdlg-scrim { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center;
    z-index:50; padding:1rem; opacity:0; transition:opacity .15s ease; }
  .tdlg-scrim.on { opacity:1; }
  .tdlg { background:var(--card); color:var(--text); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow);
    max-width:24rem; width:100%; padding:1.1rem 1.15rem 1rem; transform:translateY(8px) scale(.98); transition:transform .15s ease; }
  .tdlg-scrim.on .tdlg { transform:none; }
  .tdlg-title { font-weight:800; font-size:1rem; margin-bottom:.3rem; }
  .tdlg-msg { font-size:.9rem; color:var(--muted); white-space:pre-wrap; line-height:1.5; }
  .tdlg-input { width:100%; font-size:1rem; padding:.55rem .6rem; border:1px solid var(--line); border-radius:10px;
    background:var(--card); color:var(--text); margin-top:.7rem; }
  .tdlg-actions { display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem; }
  .tdlg-actions .btn.danger { background:var(--err); }
  .tdlg-actions .btn.danger:active { filter:brightness(.9); }
  @media (prefers-reduced-motion:reduce){ .tdlg-scrim,.tdlg{ transition:none; } }
  @media (prefers-reduced-motion:no-preference){ .btn,.chip,.tb{transition:background .12s ease,color .12s ease;} }

  /* ===== "More" sheet (mobile bottom sheet; grouped secondary destinations) === */
  .msheet-scrim { position:fixed; inset:0; background:rgba(10,12,16,.34); z-index:40; opacity:0; transition:opacity .15s ease; }
  .msheet-scrim.on { opacity:1; }
  .msheet { position:fixed; left:0; right:0; bottom:0; z-index:41; background:var(--card); border-top-left-radius:20px; border-top-right-radius:20px;
    box-shadow:0 -10px 34px rgba(0,0,0,.22); padding:.5rem .7rem calc(1rem + env(safe-area-inset-bottom)); transform:translateY(102%); transition:transform .2s ease; }
  .msheet.on { transform:none; }
  .msheet .grip { width:36px; height:4px; border-radius:999px; background:var(--line); margin:.4rem auto .5rem; }
  .msheet h3 { font-size:.66rem; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); font-weight:800; margin:.2rem .3rem .3rem; }
  .msheet .mrow { display:flex; align-items:center; gap:.8rem; width:100%; text-align:left; background:none; border:0; padding:.85rem .3rem; border-bottom:1px solid var(--line);
    font-size:.95rem; font-weight:600; color:var(--text); cursor:pointer; }
  .msheet .mrow:last-child { border-bottom:0; }
  .msheet .mrow svg { width:22px; height:22px; color:var(--muted); flex:none; }
  @media (prefers-reduced-motion:reduce){ .msheet-scrim,.msheet{ transition:none; } }

  /* ===== Desktop: bottom tab bar → left sidebar rail (same markup) ============ */
  @media (min-width:820px) {
    .tabbar { top:0; bottom:0; right:auto; width:220px; flex-direction:column; align-items:stretch; justify-content:flex-start;
      border-top:0; border-right:1px solid var(--line); padding:.6rem .55rem; gap:.15rem; overflow-y:auto; }
    .tabbar .tb { flex:none; flex-direction:row; justify-content:flex-start; gap:.7rem; font-size:.92rem; font-weight:700; color:var(--muted);
      padding:.6rem .65rem; border-radius:10px; }
    .tabbar .tb.on { color:var(--red); background:color-mix(in srgb,var(--red) 10%,transparent); }
    .tabbar .tb svg { width:20px; height:20px; }
    .tabbar .tb.more-only { display:none; }             /* the mobile-only "More" tab */
    .tabbar .rail-head { display:flex; align-items:center; gap:.5rem; padding:.2rem .5rem .7rem; font-weight:800; color:var(--text); }
    .tabbar .rail-head .crest { width:34px; height:22px; background:#fff var(--logo) center/contain no-repeat; border-radius:4px; }
    .tabbar .rail-sec { margin-top:auto; padding-top:.5rem; border-top:1px solid var(--line); font-size:.6rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); font-weight:800; }
    .abar, .annc-bar, .chips, main.content { margin-left:220px; }
    main.content { max-width:64rem; padding:1.2rem 1.4rem 2rem; }
    .abar { border-bottom:1px solid var(--line); }
    /* two-up dashboards on wide screens (apps opt in with .cols) */
    .cols { display:grid; grid-template-columns:1.5fr 1fr; gap:1.1rem; align-items:start; }
  }
  @media (max-width:819px){ .cols{ display:block; } .tabbar .rail-head, .tabbar .rail-sec{ display:none; } .tabbar .tb.desk-only{ display:none; } }
</style>

<script>
  /* Shared client UI helpers (both apps). Kept tiny and dependency-free. */
  var TalonUI = (function () {
    var GLYPH = { BSOC:'sp-soccer', GSOC:'sp-soccer', SOC:'sp-soccer',
      BBB:'sp-basketball', GBB:'sp-basketball', BBK:'sp-basketball', GBK:'sp-basketball', BSK:'sp-basketball',
      VB:'sp-volleyball', VOLL:'sp-volleyball', BASE:'sp-baseball', SOFT:'sp-softball',
      XC:'sp-xc', GOLF:'sp-golf', FF:'sp-football', FB:'sp-football' };
    var LEVEL = { V:'V', JV:'JV', MS:'MS' };
    function esc(s){ var d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }
    function glyphId(sport){ return GLYPH[String(sport||'').toUpperCase()] || 'sp-generic'; }
    function levelLetter(level){ return LEVEL[String(level||'').toUpperCase()] || esc(level); }
    function badge(sport, level, big){
      return '<span class="badge'+(big?' lg':'')+'"><svg><use href="#'+glyphId(sport)+'"></use></svg>'+
        (level? '<span class="lvl">'+levelLetter(level)+'</span>':'')+'</span>';
    }
    function toast(msg){ var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.body.appendChild(t); setTimeout(function(){ t.remove(); }, 2600); }
    /* Mobile "More" bottom sheet. items = [{label, icon(sprite id), onClick}].
       Opens a themed sheet; picking a row closes it and fires onClick. On desktop
       the same destinations live in the sidebar, so this is the phone mechanism. */
    function moreSheet(items, opts){
      opts = opts || {};
      var scrim=document.createElement('div'); scrim.className='msheet-scrim';
      var sheet=document.createElement('div'); sheet.className='msheet';
      var rows=(items||[]).map(function(it,i){
        return '<button class="mrow" data-i="'+i+'">'+(it.icon?'<svg><use href="#'+it.icon+'"></use></svg>':'')+esc(it.label)+'</button>';
      }).join('');
      sheet.innerHTML='<div class="grip"></div>'+(opts.title?'<h3>'+esc(opts.title)+'</h3>':'')+rows;
      document.body.appendChild(scrim); document.body.appendChild(sheet);
      void sheet.offsetWidth; scrim.classList.add('on'); sheet.classList.add('on');
      var done=false;
      function close(){ if(done)return; done=true; scrim.classList.remove('on'); sheet.classList.remove('on');
        setTimeout(function(){ scrim.remove(); sheet.remove(); }, 220); }
      scrim.addEventListener('click', close);
      Array.prototype.forEach.call(sheet.querySelectorAll('.mrow'), function(b){
        b.addEventListener('click', function(){ var it=items[+b.getAttribute('data-i')]; close(); if(it&&it.onClick) it.onClick(); }); });
      return close;
    }
    /* Promise-based in-app dialogs (drop-in for native alert/confirm/prompt).
         await TalonUI.confirm(msg, {title, okLabel, cancelLabel, danger}) -> true/false
         await TalonUI.prompt(msg,  {title, okLabel, cancelLabel, defaultValue}) -> string|null
         await TalonUI.alert(msg,   {title, okLabel}) -> undefined
       Message text is set via textContent (safe) and honors newlines (pre-wrap). */
    function dialog(opts){
      opts = opts || {};
      return new Promise(function(resolve){
        var scrim = document.createElement('div'); scrim.className = 'tdlg-scrim';
        var dlg = document.createElement('div'); dlg.className = 'tdlg';
        dlg.setAttribute('role','dialog'); dlg.setAttribute('aria-modal','true');
        var h = '';
        if (opts.title) h += '<div class="tdlg-title"></div>';
        h += '<div class="tdlg-msg"></div>';
        if (opts.prompt) h += '<input class="tdlg-input" type="text">';
        h += '<div class="tdlg-actions">';
        if (opts.cancel) h += '<button class="btn ghost" data-x="cancel"></button>';
        h += '<button class="btn' + (opts.danger ? ' danger' : '') + '" data-x="ok"></button></div>';
        dlg.innerHTML = h;
        if (opts.title) dlg.querySelector('.tdlg-title').textContent = opts.title;
        dlg.querySelector('.tdlg-msg').textContent = opts.message == null ? '' : String(opts.message);
        var input = dlg.querySelector('.tdlg-input'); if (input) input.value = opts.defaultValue || '';
        var okBtn = dlg.querySelector('[data-x="ok"]'); okBtn.textContent = opts.okLabel || 'OK';
        var cancelBtn = dlg.querySelector('[data-x="cancel"]'); if (cancelBtn) cancelBtn.textContent = opts.cancelLabel || 'Cancel';
        scrim.appendChild(dlg); document.body.appendChild(scrim);
        void scrim.offsetWidth; scrim.classList.add('on');       // reflow so the fade/scale animates
        var done = false;
        function close(val){ if (done) return; done = true; scrim.classList.remove('on'); setTimeout(function(){ scrim.remove(); }, 180); resolve(val); }
        okBtn.addEventListener('click', function(){ close(opts.prompt ? (input ? input.value : '') : true); });
        if (cancelBtn) cancelBtn.addEventListener('click', function(){ close(opts.prompt ? null : false); });
        scrim.addEventListener('mousedown', function(e){ if (e.target === scrim) close(opts.prompt ? null : (opts.cancel ? false : true)); });
        scrim.addEventListener('keydown', function(e){
          if (e.key === 'Enter' && (!input || !e.shiftKey)) { e.preventDefault(); okBtn.click(); }
          else if (e.key === 'Escape') { e.preventDefault(); (cancelBtn || okBtn).click(); }
        });
        setTimeout(function(){ (input || okBtn).focus(); }, 50);
      });
    }
    function talonAlert(message, opts){ opts = opts || {}; return dialog({ title:opts.title, message:message, okLabel:opts.okLabel || 'OK', cancel:false }); }
    function talonConfirm(message, opts){ opts = opts || {}; return dialog({ title:opts.title, message:message, okLabel:opts.okLabel || 'OK', cancelLabel:opts.cancelLabel || 'Cancel', cancel:true, danger:opts.danger }); }
    function talonPrompt(message, opts){ opts = opts || {}; return dialog({ title:opts.title, message:message, okLabel:opts.okLabel || 'OK', cancelLabel:opts.cancelLabel || 'Cancel', cancel:true, prompt:true, defaultValue:opts.defaultValue || '' }); }
    /* A short guided sequence of themed dialogs. steps = [{title, message}].
       Next/Done to advance; Skip stops early. Resolves when finished/skipped. */
    function talonTour(steps){
      steps = steps || []; var i = 0;
      return (function next(){
        if (i >= steps.length) return Promise.resolve();
        var s = steps[i], last = i === steps.length - 1;
        return dialog({ title: s.title, message: s.message, okLabel: last ? 'Got it' : 'Next →', cancel: !last, cancelLabel: 'Skip' })
          .then(function(ok){ if (ok === false) return; i++; return next(); });
      })();
    }
    function initials(f,l){ return (String(f||'').charAt(0)+String(l||'').charAt(0)).toUpperCase() || '?'; }
    function avatar(photo, first, last, big){
      var cls='avatar'+(big?' lg':'');
      return photo ? '<span class="'+cls+'"><img src="'+esc(photo)+'" alt=""></span>'
                   : '<span class="'+cls+'">'+esc(initials(first,last))+'</span>';
    }
    /* Downscale a chosen image File to a small JPEG data URI (client-side). */
    function resizePhoto(file, cb){
      var img=new Image(), url=URL.createObjectURL(file);
      img.onload=function(){ var max=200, s=Math.min(max/img.width, max/img.height, 1);
        var w=Math.max(1,Math.round(img.width*s)), h=Math.max(1,Math.round(img.height*s));
        var c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url); try{ cb(c.toDataURL('image/jpeg',0.7)); }catch(e){ cb(null); } };
      img.onerror=function(){ URL.revokeObjectURL(url); cb(null); };
      img.src=url;
    }
    /* Announcement banner (shared across all apps). Renders into #annc-bar;
       dismissals persist per-device in localStorage. */
    function anncDismissed(){ try{ return JSON.parse(localStorage.getItem('talonAnncDismissed')||'[]'); }catch(e){ return []; } }
    function dismissAnnouncement(id){ try{ var d=anncDismissed(); if(d.indexOf(id)===-1){ d.push(id); localStorage.setItem('talonAnncDismissed', JSON.stringify(d)); } }catch(e){} }
    function renderAnnouncements(list){
      var el=document.getElementById('annc-bar'); if(!el) return;
      var d=anncDismissed();
      var show=(list||[]).filter(function(a){ return d.indexOf(a.AnnouncementID)===-1; });
      if(!show.length){ el.hidden=true; el.innerHTML=''; return; }
      el.hidden=false;
      el.innerHTML=show.map(function(a){
        return '<div class="annc-item'+(a.Severity==='urgent'?' urgent':'')+'"><div class="annc-body"><b>'+esc(a.Title||'')+'</b>'+(a.Body?' '+esc(a.Body):'')+(a.PostedByName?' <span class="muted">— '+esc(a.PostedByName)+'</span>':'')+'</div><button class="annc-x" data-id="'+esc(a.AnnouncementID)+'" aria-label="Dismiss">✕</button></div>';
      }).join('');
      Array.prototype.forEach.call(el.querySelectorAll('.annc-x'), function(b){ b.addEventListener('click', function(){ dismissAnnouncement(b.getAttribute('data-id')); renderAnnouncements(list); }); });
    }
    return { esc:esc, glyphId:glyphId, levelLetter:levelLetter, badge:badge, toast:toast, avatar:avatar, resizePhoto:resizePhoto, renderAnnouncements:renderAnnouncements, dismissAnnouncement:dismissAnnouncement,
      moreSheet:moreSheet, confirm:talonConfirm, alert:talonAlert, prompt:talonPrompt, tour:talonTour, dialog:dialog };
  })();
</script>

    display:flex; align-items:center; gap:.4rem; padding:.4rem .7rem; background:var(--maroon); color:#fff;
    box-shadow:0 -2px 10px rgba(0,0,0,.18); }

'use strict';
/**
 * xcsplits.js — pure cross-country mile-split math (Phase 2 XC depth). No GAS/DOM.
 *
 * A runner's splits are entered as CUMULATIVE elapsed time at each marker (what a
 * coach reads off a watch: "6:12 at mile 1, 12:40 at mile 2…"). This module turns
 * those cumulative times + the finish into a split board: per-segment time, pace
 * per mile, and whether the runner ran a negative / even / positive split.
 *
 * Distance strings ("5K", "3mi", "2mi") convert to miles so pace is per-mile and
 * comparable across courses. Everything degrades gracefully: missing distances
 * just drop the pace column; missing finish just omits the final segment.
 */

var XcSplits = (function () {
  var KM_PER_MI = 0.621371; // miles per km

  function fmt(sec) {
    sec = Math.round(Number(sec) || 0); if (sec <= 0) return '';
    var m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + ('0' + s).slice(-2);
  }

  /** Parse "mm:ss" / "m:ss" / "ss" / "h:mm:ss" → seconds (null if unparseable). */
  function parseClock(str) {
    str = String(str == null ? '' : str).trim();
    if (!str) return null;
    if (/^\d+(\.\d+)?$/.test(str)) return Math.round(Number(str)); // bare seconds
    var parts = str.split(':');
    if (parts.length < 2 || parts.length > 3) return null;
    for (var i = 0; i < parts.length; i++) if (!/^\d+(\.\d+)?$/.test(parts[i])) return null;
    var sec = 0;
    for (var j = 0; j < parts.length; j++) sec = sec * 60 + Number(parts[j]);
    return Math.round(sec);
  }

  /** Distance string → miles (0 if unknown). "5K"→3.107, "3mi"→3, "1.5mi"→1.5. */
  function distanceMiles(distanceStr) {
    var s = String(distanceStr == null ? '' : distanceStr).trim().toLowerCase().replace(/\s+/g, '');
    var m = s.match(/^([\d.]+)(k|km|mi|m|mile|miles)?$/);
    if (!m) return 0;
    var n = Number(m[1]); if (!isFinite(n) || n <= 0) return 0;
    var unit = m[2] || (n >= 100 ? 'm' : 'mi'); // large bare number ~ meters, else miles
    if (unit === 'k' || unit === 'km') return n * KM_PER_MI;
    if (unit === 'm') return (n / 1000) * KM_PER_MI; // meters
    return n; // mi / mile / miles
  }

  /** Suggested mile markers for a distance: Mile 1..floor(total), each with its
   *  distance-from-start in miles. Coaches can still add a custom marker. */
  function markerCatalog(distanceStr) {
    var total = distanceMiles(distanceStr);
    var markers = [];
    var whole = Math.floor(total + 1e-9);
    for (var i = 1; i <= whole; i++) {
      // Skip a "Mile N" that would sit exactly on the finish (e.g. a flat 3mi).
      if (Math.abs(i - total) < 1e-6) break;
      markers.push({ marker: 'm' + i, label: 'Mile ' + i, distMi: i });
    }
    return { totalDistMi: total, markers: markers };
  }

  /**
   * Build a split board for one runner.
   * @param splits    [{ marker, label, distMi, cumSec }] cumulative elapsed times
   * @param finishSec finish time in seconds (0 = not finished/unknown)
   * @param totalDistMi race distance in miles (0 = unknown; disables finish row + pace where needed)
   * @returns { rows:[{ label, distMi, cumSec, segSec, segDistMi, pacePerMi }],
   *            overallPacePerMi, splitType: 'negative'|'even'|'positive'|'' }
   */
  function board(splits, finishSec, totalDistMi) {
    finishSec = Number(finishSec) || 0;
    totalDistMi = Number(totalDistMi) || 0;
    // Clean + sort split points by cumulative time; drop non-positive.
    var pts = (splits || [])
      .map(function (s) { return { label: String(s.label || s.marker || ''), distMi: Number(s.distMi) || 0, cumSec: Number(s.cumSec) || 0 }; })
      .filter(function (s) { return s.cumSec > 0; })
      .sort(function (a, b) { return a.cumSec - b.cumSec; });

    // Assemble segment points: synthetic start, each marker, then finish (if known
    // and after the last marker). The start is used only to size the first segment.
    var seq = [{ label: 'Start', distMi: 0, cumSec: 0 }].concat(pts);
    if (finishSec > 0 && finishSec >= seq[seq.length - 1].cumSec) {
      seq.push({ label: 'Finish', distMi: totalDistMi, cumSec: finishSec });
    }

    var rows = [];
    for (var i = 1; i < seq.length; i++) {
      var prev = seq[i - 1], cur = seq[i];
      var segSec = cur.cumSec - prev.cumSec;
      var segDistMi = (cur.distMi && prev.distMi >= 0) ? (cur.distMi - prev.distMi) : 0;
      var pace = segDistMi > 0 ? segSec / segDistMi : null;
      rows.push({ label: cur.label, distMi: cur.distMi, cumSec: cur.cumSec, segSec: segSec, segDistMi: segDistMi, pacePerMi: pace });
    }

    var overallPace = (finishSec > 0 && totalDistMi > 0) ? finishSec / totalDistMi : null;
    return { rows: rows, overallPacePerMi: overallPace, splitType: splitType_(seq, totalDistMi) };
  }

  /** Negative (2nd half faster) / positive / even, comparing the average pace of
   *  the first vs second half of the total distance. '' if we can't tell. */
  function splitType_(seq, totalDistMi) {
    var last = seq[seq.length - 1];
    if (!totalDistMi || seq.length < 3 || last.distMi <= 0 || Math.abs(last.distMi - totalDistMi) > 1e-6) return '';
    var mid = totalDistMi / 2;
    var firstSec = cumSecAtDistance_(seq, mid);
    if (firstSec == null) return '';
    var secondSec = last.cumSec - firstSec;
    var firstPace = firstSec / mid, secondPace = secondSec / (totalDistMi - mid);
    var rel = (secondPace - firstPace) / firstPace;
    if (rel < -0.01) return 'negative';
    if (rel > 0.01) return 'positive';
    return 'even';
  }

  /** Linearly interpolate cumulative seconds at a given distance-from-start. */
  function cumSecAtDistance_(seq, dist) {
    for (var i = 1; i < seq.length; i++) {
      var prev = seq[i - 1], cur = seq[i];
      if (!(cur.distMi > prev.distMi)) continue;
      if (dist <= cur.distMi + 1e-9) {
        var frac = (dist - prev.distMi) / (cur.distMi - prev.distMi);
        return prev.cumSec + frac * (cur.cumSec - prev.cumSec);
      }
    }
    return null;
  }

  return {
    fmt: fmt, parseClock: parseClock, distanceMiles: distanceMiles,
    markerCatalog: markerCatalog, board: board
  };
})();

    // ---------- Interval training timer (XT-5) ----------

    function ivStart() {

      if (spec.workSec <= 0) { TalonUI.toast('Set a work time first.'); return; }
      try { localStorage.setItem(IV_KEY, JSON.stringify(spec)); } catch (e) {}

    function ivElapsed() { var v = state.iv; if (!v) return 0; return v.running ? (v.pausedElapsed + (Date.now() - v.startedMs) / 1000) : v.pausedElapsed; }

    function splitBoardHtml(run, totalDistMi) {

    // Trigger a client-side file download for text content. Falls back to copy

    function openSyncedRace(teamId, eventId, distance, sport) {
      state.raceInit = { teamId: teamId, eventId: eventId, distance: distance, sport: sport };
      var h = '<button class="link" id="race-exit">‹ Back</button><div class="sectlabel">🏁 Time this meet</div>' +
        '<div class="card"><div class="s" style="font-weight:700">How are you recording finishers?</div>' +

    function armSyncedRace(method) {
      var init = state.raceInit || {};
      setContent('<p class="placeholder">Setting up synced race…</p>');
      var t0 = Date.now();
      call('getServerNow').then(function (sn) {
        var rtt = Date.now() - t0;
        var offset = (sn && sn.now ? sn.now : Date.now()) - Date.now() - Math.round(rtt / 2);

          if (!r || !r.ok) { setContent('<p class="placeholder">Could not start (' + ((r && (r.msg || r.code)) || 'error') + ').</p>'); return; }
          state.race = { sessionId: r.session.sessionId, role: null, offset: offset, startedAtMs: r.session.startedAtMs || 0, status: r.session.status, distance: r.session.distance, scoreMethod: r.session.scoreMethod || 'sticks', teamId: init.teamId, eventId: init.eventId, marker: null, seq: { boys: 0, girls: 0, time: 0, spot: 0, marker: 0 } };

    function racePickRole(role) {

    function raceStart() {

      });
    }
    function raceStopTimers() { var r = state.race; if (r) { if (r.timer) clearInterval(r.timer); if (r.poll) clearInterval(r.poll); r.timer = r.poll = null; } }
    function raceExit() { raceStopTimers(); state.race = null; state.pv = 'scrim'; renderContent(); }
    function raceTap(role) {
      var r = state.race; if (!r || r.status !== 'Running') return;
      var bibEl = $('race-bib'); var bib = bibEl ? String(bibEl.value || '').trim() : '';
      if (role === 'marker') {
        var mk = r.marker || ''; if (!mk) { TalonUI.toast('Pick a marker first.'); return; }

        call('raceTap', { sessionId: r.sessionId, role: 'marker', marker: mk, seq: r.seq.marker, elapsedMs: raceElapsed(), bib: bib }).catch(function () {});

    function renderRace() {

      } else if (r.role === 'marker') {
        var cat = (typeof XcSplits !== 'undefined') ? (XcSplits.markerCatalog(r.distance).markers || []) : [];
        var opts = cat.map(function (m) { return '<option value="' + esc(m.marker) + '"' + (m.marker === r.marker ? ' selected' : '') + '>' + esc(m.label) + '</option>'; }).join('');
        h += '<div class="xs" style="color:var(--muted);margin-bottom:.3rem">Type each passing runner\'s bib, then tap. Splits attach to that runner when the race is finalized.</div>' +
          '<select id="race-marker" class="input" style="width:100%;margin-bottom:.4rem"><option value="">Pick marker…</option>' + opts + '</select>' +
          '<input id="race-bib" class="input" inputmode="numeric" placeholder="Bib #" style="width:100%;text-align:center;font-size:1.3rem;margin-bottom:.4rem"/>' +
          '<div class="s">Recorded here: <b>' + (r.seq.marker || 0) + '</b></div>' +
          '<button class="btn block gd-btn" id="race-tap" style="margin-top:.4rem;font-size:1.3rem;padding:1.2rem"' + (r.marker ? '' : ' disabled') + '>＋ Record split</button>';
      } else if (r.role === 'boys' || r.role === 'girls' || r.role === 'time' || r.role === 'spot') {

          ? '<input id="race-bib" class="input" inputmode="numeric" placeholder="Bib # (optional)" style="width:100%;text-align:center;font-size:1.3rem;margin:.3rem 0 .4rem"/>' : '';
        h += '<div class="s">Recorded: <b id="race-mycount">' + (r.seq[r.role] || 0) + '</b></div>' + bibField +
          '<button class="btn block gd-btn" id="race-tap" style="margin-top:.5rem;font-size:1.4rem;padding:1.4rem">＋ ' + (r.role === 'time' || r.role === 'spot' ? 'Finish' : myLetter + (( r.seq[r.role] || 0) + 1)) + '</button>' +

    function racePoll() {

    // ---------- Design Wizard: per-team setup (modules + sport knobs) --------
    function openTeamWizard(team) {
      var box = $('wizard-box'); if (!box || !team) return;

      box.hidden = false; box.setAttribute('data-for', team.TeamID);
      box.innerHTML = '<div class="admin-box"><p class="s">Loading setup…</p></div>';
      call('getTeamConfig', { teamId: team.TeamID }).then(function (r) {
        if (!r || !r.ok) { box.innerHTML = '<div class="admin-box"><p class="s">Could not load setup (' + ((r && r.code) || 'error') + ').</p></div>'; return; }
        renderWizard(team, r.config);
      }).catch(function () { box.innerHTML = '<div class="admin-box"><p class="s">Network error.</p></div>'; });
    }
    var MODULE_LABELS = [['tryouts', 'Tryouts'], ['practices', 'Practices & drills'], ['gameLive', 'Live game / scrimmage tool'], ['scoreboard', 'Scores & results'], ['travel', 'Travel & logistics']];
    function renderWizard(team, cfg) {
      var box = $('wizard-box'); var mods = cfg.modules || {};
      var chk = function (k, label, on) { return '<label class="s" style="display:block;margin-top:.3rem"><input type="checkbox" class="wz-mod" data-k="' + k + '"' + (on ? ' checked' : '') + '/> ' + esc(label) + '</label>'; };
      var numO = function (k, label, val) { return '<label class="s" style="display:inline-block;margin:.2rem .6rem .2rem 0">' + esc(label) + '<br><input class="input wz-ov" data-k="' + k + '" type="number" value="' + (val != null ? val : '') + '" style="width:5rem"/></label>'; };
      // Un-set-up team → pre-check from the sport-recommended packs (matches the demo
      // "Choose my setup" panel); a completed team shows its saved modules.
      var seeded = mods;
      if (cfg.wizardComplete === false) { try { seeded = FeaturePacks.modulesForPacks(FeaturePacks.recommend(bpFor(team))); } catch (e) { seeded = mods; } }
      var modHtml = MODULE_LABELS.map(function (m) { return chk(m[0], m[1], seeded[m[0]] !== false); }).join('');
      var game = '';
      if (cfg.clockModel === 'timed-periods') game = numO('periods', '# periods', cfg.periods) + numO('periodMin', 'Period length', cfg.periodMin) + numO('breakMin', 'Break', cfg.breakMin);
      else if (cfg.clockModel === 'sets') game = numO('setsToWin', 'Sets to win', cfg.setsToWin) + numO('pointsPerSet', 'Points/set', cfg.pointsPerSet) + numO('decidingSetPoints', 'Deciding set', cfg.decidingSetPoints) + numO('winBy', 'Win by', cfg.winBy);
      else if (cfg.clockModel === 'innings') game = numO('innings', 'Innings', cfg.innings);
      else if (cfg.clockModel === 'single-race') game = numO('topN', 'Scoring runners', cfg.topN);
      box.innerHTML = '<div class="admin-box"><div class="s" style="font-weight:700;color:var(--maroon)">⚙ ' + esc(team.label) + ' — setup</div>' +
        '<div class="xs" style="color:var(--muted)">Sport: <b>' + esc(cfg.name) + '</b> — change it by editing the team.</div>' +
        '<div class="sectlabel">Tools this team uses</div>' + modHtml +
        (game ? '<div class="sectlabel">Game setup</div>' + game : '') +
        '<div class="sectlabel">Squad</div>' + numO('squadDefault', 'On-field size', cfg.squadDefault) +
        '<div style="margin-top:.6rem"><button class="btn" id="wz-save">Save setup</button><span class="s" id="wz-save-msg"></span></div></div>';
      $('wz-save').addEventListener('click', function () {
        var modules = {}; Array.prototype.forEach.call(box.querySelectorAll('.wz-mod'), function (c) { modules[c.getAttribute('data-k')] = c.checked; });
        var overrides = {}; Array.prototype.forEach.call(box.querySelectorAll('.wz-ov'), function (i) { var v = i.value.trim(); if (v !== '') overrides[i.getAttribute('data-k')] = parseInt(v, 10); });
        $('wz-save-msg').textContent = ' Saving…';
        call('setTeamConfig', { teamId: team.TeamID, modules: modules, overrides: overrides, wizardComplete: true }).then(function (r) {
          if (r && r.ok) { TalonUI.toast('Team setup saved'); reload(); } else $('wz-save-msg').textContent = ' ' + ((r && (r.msg || r.code)) || 'Error');
        }).catch(function () { $('wz-save-msg').textContent = ' Network error'; });
      });

    // AD team form: sport is a dropdown from the blueprint code catalog (Sports.codes)

    function tfSport(cur) {
      cur = cur || '';
      var codes = (typeof Sports !== 'undefined' && Sports.codes) ? Sports.codes() : {};

      Object.keys(codes).forEach(function (code) {

        var nm = (Sports.get ? Sports.get(code).name : code);
        opts += '<option value="' + esc(code) + '"' + (cur === code ? ' selected' : '') + '>' + esc(code + ' — ' + nm) + '</option>';
      });

      return '<label style="display:block;font-size:.78rem;color:var(--muted);margin-top:.35rem">Sport<select id="tf-sport" style="width:100%;padding:.45rem;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--text)">' + opts + '</select></label>';

    function archivePreview() {

        if (!r.total) { out.textContent = 'Nothing to archive for ' + season + '.'; return; }

      var pills = (d.Category ? '<span class="pill plain">' + esc(d.Category) + '</span> ' : '') + (d.Scope === 'Program' ? '<span class="pill gold">Program</span>' : '');
      return '<div class="result-row"><div><span class="who">' + esc(d.Name) + '</span> ' + pills +
        (d.Tags ? '<div class="xs">' + esc(d.Tags) + '</div>' : '') + (links ? '<div class="xs">' + links + '</div>' : '') + '</div>' +
        '<div><button class="act dr-edit" data-id="' + esc(d.DrillID) + '">Edit</button><button class="act dr-del" data-id="' + esc(d.DrillID) + '">✕</button></div></div>';
    }
    function loadDrills(q) {
      call('listDrills', { q: q || '' }).then(function (r) {
        var box = $('drill-list'); if (!box) return;
        if (!r || !r.ok) { box.innerHTML = '<p class="s">Could not load.</p>'; return; }
        state.drills = r.drills || [];
        box.innerHTML = state.drills.length ? state.drills.map(drillRow).join('') : '<p class="s">No drills yet — add one above.</p>';
        Array.prototype.forEach.call(box.querySelectorAll('.dr-edit'), function (b) { b.addEventListener('click', function () { editDrill(b.getAttribute('data-id')); }); });
        Array.prototype.forEach.call(box.querySelectorAll('.dr-del'), function (b) { b.addEventListener('click', async function () { if (!(await TalonUI.confirm('Remove this drill?', { title: 'Remove drill?', danger: true, okLabel: 'Remove' }))) return; call('deleteDrill', { drillId: b.getAttribute('data-id') }).then(function (rr) { if (rr && rr.ok) { invalidateDrills(); loadDrills($('dr-search') ? $('dr-search').value : ''); } }); }); });
      });
    }
    function editDrill(id) {
      var d = (state.drills || []).filter(function (x) { return String(x.DrillID) === String(id); })[0];
      if (!d) return;
      state.drillEdit = id;
      $('dr-name').value = d.Name || '';
      $('dr-scope').value = d.Scope === 'Program' ? 'Program' : 'Team';
      if (d.TeamID) $('dr-team').value = d.TeamID;
      $('dr-team').style.display = $('dr-scope').value === 'Team' ? '' : 'none';
      $('dr-category').value = d.Category || '';
      $('dr-tags').value = d.Tags || '';
      $('dr-desc').value = d.Description || '';
      $('dr-links').value = (d.links || []).map(function (l) { return l.label + ' | ' + l.url; }).join('\n');
      $('dr-equip').value = d.Equipment || '';
      $('dr-mins').value = d.DurationMinDefault || '';
      $('dr-new').hidden = false; $('dr-save').textContent = 'Update drill'; $('dr-msg').textContent = '';
      window.scrollTo(0, 0);
    }
    function saveDrill() {
      var name = $('dr-name').value.trim();
      if (!name) { $('dr-msg').textContent = ' Add a name.'; return; }
      var links = $('dr-links').value.split(/\r?\n/).map(function (line) { var p = line.split('|'); return p.length >= 2 ? { label: p[0].trim(), url: p.slice(1).join('|').trim() } : { label: '', url: line.trim() }; }).filter(function (l) { return l.url; });
      var args = { drillId: state.drillEdit || '', name: name, scope: $('dr-scope').value, teamId: $('dr-team').value, category: $('dr-category').value, tags: $('dr-tags').value, description: $('dr-desc').value, links: links, equipment: $('dr-equip').value, durationMinDefault: $('dr-mins').value };
      $('dr-msg').textContent = ' Saving…';
      call('upsertDrill', args).then(function (r) {
        if (r && r.ok) { invalidateDrills(); TalonUI.toast('Drill saved'); state.drillEdit = null; resetDrillForm(); loadDrills($('dr-search') ? $('dr-search').value : ''); }
        else $('dr-msg').textContent = ' ' + ((r && (r.msg || r.code)) || 'Error');
      }).catch(function () { $('dr-msg').textContent = ' Network error'; });
    }

    // ---------- Player stats (FS-B, coaches only) ----------
    function statsView() {
      var t = ctxTeam(); if (!t) return placeholder('Stats', 'Tap the team name up top to pick a team.');
      if (!Stats.hasStats(t.Sport)) return placeholder('Stats', 'Box-score stats aren\'t tracked for ' + esc(t.label) + '. See race Results & PRs in the Game tool.');
      // Games played (with a recorded result) for this team, newest first.
      var games = (state.bundle.events || []).filter(function (e) { return e.Sport === t.Sport && e.Level === t.Level && e.Season === t.Season && ['Game', 'Match', 'Meet', 'Tournament'].indexOf(e.EventType) !== -1; })
        .sort(function (a, b) { return String(b.Date) < String(a.Date) ? -1 : 1; });
      if (!state.statsGame && games.length) state.statsGame = games[0].EventID;
      var gOpts = games.length ? games.map(function (e) { return '<option value="' + esc(e.EventID) + '"' + (e.EventID === state.statsGame ? ' selected' : '') + '>' + esc(fmtDate(e.Date) + ' · ' + eventTitle(e).replace(/<[^>]+>/g, '')) + '</option>'; }).join('') : '';
      var h = '<div class="sectlabel">' + esc(t.label) + ' · Stats</div>' +
        (games.length ? '<label class="s" style="display:block;margin-bottom:.3rem">Game <select id="st-game" style="width:100%;padding:.4rem;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--text)">' + gOpts + '</select></label>' +
          '<div class="xs" style="color:var(--muted);margin-bottom:.3rem">Tap a player to enter their box score for this game.</div><div id="st-grid"><p class="s">Loading…</p></div>'
          : '<p class="s">No games with results yet. Record a game in the Game tool first.</p>') +
        '<div class="sectlabel" style="margin-top:.8rem">Season box</div><div id="st-box"><p class="s">Loading…</p></div>' +
        '<div class="sectlabel" style="margin-top:.8rem">Season leaders</div><div id="st-leaders"><p class="s">Loading…</p></div>';
      setContent(h);
      var gs = $('st-game');
      if (gs) gs.addEventListener('change', function () { state.statsGame = gs.value; loadStatCards(t); });
      if (games.length) loadStatCards(t);
      loadSeasonBox(t);
      loadSeasonLeaders(t);
    }
    // Per-player stat card (playbook: tap a player → grouped box-score fields →
    // Save just that player). Groups come from Stats.groups (sport-aware; diamond
    // splits Batting/Pitching with pitching keys prefixed P_).
    function loadStatCards(t) {
      var box = $('st-grid'); if (!box) return; box.innerHTML = '<p class="s">Loading…</p>';
      var groups = Stats.groups(t.Sport);
      Promise.all([call('getTeamRoster', { teamId: t.TeamID }), call('getGameStats', { teamId: t.TeamID, eventId: state.statsGame })]).then(function (out) {
        var roster = (out[0] && out[0].roster) || [], cur = (out[1] && out[1].stats) || {};
        if (!roster.length) { box.innerHTML = '<p class="s">No roster.</p>'; return; }
        box.innerHTML = roster.map(function (p) {
          var s = cur[p.athleteId] || {}; var filled = Object.keys(s).length;
          var body = groups.map(function (g) {
            return (g.label ? '<div class="xs" style="font-weight:800;margin:.4rem 0 .15rem">' + esc(g.label) + '</div>' : '') +
              '<div class="stcard-grid">' + g.stats.map(function (d) {
                return '<label class="stcard-f"><span>' + esc(d.label) + '</span><input class="stin2" data-a="' + esc(p.athleteId) + '" data-k="' + esc(d.key) + '" type="number" inputmode="numeric" min="0" value="' + (s[d.key] || '') + '"/></label>';
              }).join('') + '</div>';
          }).join('');
          return '<details class="stcard"><summary>' + esc((p.first + ' ' + p.last).trim()) + (filled ? ' <span class="pill ok">' + filled + '</span>' : '') + '</summary>' + body +
            '<button class="btn small stcard-save" data-a="' + esc(p.athleteId) + '" style="margin-top:.4rem">Save player</button></details>';
        }).join('');
        Array.prototype.forEach.call(box.querySelectorAll('.stcard-save'), function (btn) {
          btn.addEventListener('click', function () { savePlayerStats(t, btn.getAttribute('data-a'), btn); });
        });
      });
    }
    function savePlayerStats(t, athleteId, btn) {
      var stats = {};
      Array.prototype.forEach.call($('content').querySelectorAll('.stin2[data-a="' + athleteId + '"]'), function (inp) {
        var v = parseInt(inp.value, 10); if (isFinite(v) && v) stats[inp.getAttribute('data-k')] = v;
      });
      btn.disabled = true; btn.textContent = 'Saving…';
      call('saveGameStats', { teamId: t.TeamID, eventId: state.statsGame, rows: [{ athleteId: athleteId, stats: stats }] }).then(function (r) {
        btn.disabled = false; btn.textContent = 'Save player';
        if (r && r.ok) { TalonUI.toast('Saved'); loadSeasonBox(t); loadSeasonLeaders(t); }
        else TalonUI.toast((r && (r.msg || r.code)) || 'Error');
      }).catch(function () { btn.disabled = false; btn.textContent = 'Save player'; TalonUI.toast('Network error'); });
    }
    // Season box: derived per-player lines (averages, %, AVG/OBP/ERA…) computed
    // client-side from raw season totals via the sport module.
    function loadSeasonBox(t) {
      var box = $('st-box'); if (!box) return;
      call('getSeasonStatMaps', { teamId: t.TeamID }).then(function (r) {
        if (!r || !r.ok) { box.innerHTML = '<p class="s">Unavailable.</p>'; return; }
        box.innerHTML = seasonBoxHtml(t.Sport, r.players || []);
      });
    }
    function statModule(sport) {
      var fam = (typeof Sports !== 'undefined' && Sports.keyFor) ? Sports.keyFor(sport) : '';
      if (fam === 'soccer') return { kind: 'single', mod: SoccerStats };
      if (fam === 'basketball') return { kind: 'single', mod: Hoops };
      if (fam === 'volleyball') return { kind: 'single', mod: VolleyStats };
      if (fam === 'baseball' || fam === 'softball') return { kind: 'diamond' };
      return null;
    }
    function boxTable(cols, rows) {
      var head = '<tr><th class="bx-name">Player</th>' + cols.map(function (c) { return '<th' + (c.derived ? ' class="bx-d"' : '') + '>' + esc(c.label) + '</th>'; }).join('') + '</tr>';
      var body = rows.map(function (r) {
        return '<tr><td class="bx-name">' + esc(r.name) + '</td>' + cols.map(function (c) { var v = r.line[c.key]; return '<td' + (c.derived ? ' class="bx-d"' : '') + '>' + esc(v == null ? '' : String(v)) + '</td>'; }).join('') + '</tr>';
      }).join('');
      return '<div class="box-wrap"><table class="boxtbl">' + head + body + '</table></div>';
    }
    function pitchingOf(totals) { var o = {}; Object.keys(totals || {}).forEach(function (k) { if (k.indexOf('P_') === 0) o[k.slice(2)] = totals[k]; }); return o; }
    function anyPitching(totals) { return Object.keys(totals || {}).some(function (k) { return k.indexOf('P_') === 0 && totals[k] > 0; }); }
    function seasonBoxHtml(sport, players) {
      if (!players.length) return '<p class="s">No stats recorded yet this season.</p>';
      var sm = statModule(sport);
      if (!sm) {
        var cols = (Stats.defs(sport) || []).map(function (d) { return { key: d.key, label: d.label, derived: false }; });
        if (!cols.length) return '';
        return boxTable(cols, players.map(function (p) { var line = {}; cols.forEach(function (c) { line[c.key] = p.totals[c.key] || 0; }); return { name: p.name + ' (' + p.games + ')', line: line }; }));
      }
      if (sm.kind === 'single') {
        return boxTable(sm.mod.columns(), players.map(function (p) { return { name: p.name + ' (' + p.games + ')', line: sm.mod.seasonLine([p.totals], p.games) }; }));
      }
      // diamond: batting (everyone) + pitching (only players with pitching stats)
      var bat = boxTable(Diamond.battingColumns(), players.map(function (p) { return { name: p.name + ' (' + p.games + ')', line: Diamond.battingLine([p.totals]) }; }));
      var pitchers = players.filter(function (p) { return anyPitching(p.totals); });
      var pit = pitchers.length ? boxTable(Diamond.pitchingColumns(), pitchers.map(function (p) { return { name: p.name, line: Diamond.pitchingLine([pitchingOf(p.totals)]) }; }))
        : '<p class="s">No pitching stats yet.</p>';
      return '<div class="xs" style="font-weight:800;margin:.2rem 0">Batting</div>' + bat + '<div class="xs" style="font-weight:800;margin:.5rem 0 .2rem">Pitching</div>' + pit;
    }
    function loadSeasonLeaders(t) {
      var box = $('st-leaders'); if (!box) return;
      call('getSeasonStats', { teamId: t.TeamID }).then(function (r) {
        if (!r || !r.ok) { box.innerHTML = '<p class="s">Unavailable.</p>'; return; }
        var any = (r.leaders || []).some(function (L) { return L.top.length; });
        box.innerHTML = any ? r.leaders.filter(function (L) { return L.top.length; }).map(function (L) {
          return '<div class="card tight"><div class="s" style="font-weight:700">' + esc(L.label) + '</div>' + L.top.map(function (x, i) { return '<div class="result-row"><span>' + (i + 1) + '. ' + esc(x.name) + '</span><span class="pill plain">' + x.value + '</span></div>'; }).join('') + '</div>';
        }).join('') : '<p class="s">No stats recorded yet this season.</p>';
      });
    }

    // ---------- Depth chart / lineup (FS-C) ----------
    function lineupView() {
      var t = ctxTeam(); if (!t) return placeholder('Depth chart', 'Tap the team name up top to pick a team.');
      setContent('<div class="sectlabel">' + esc(t.label) + ' · Depth chart</div><p class="s">Loading…</p>');
      call('getLineup', { teamId: t.TeamID }).then(function (r) {
        if (!r || !r.ok) { setContent('<p class="placeholder">Could not load.</p>'); return; }
        state._lineup = r.roster; var poss = r.positions || [];
        var posOpts = function (cur) { return '<option value="">—</option>' + poss.map(function (p) { return '<option' + (p === cur ? ' selected' : '') + '>' + esc(p) + '</option>'; }).join('') + (cur && poss.indexOf(cur) === -1 ? '<option selected>' + esc(cur) + '</option>' : ''); };
        var rows = r.roster.map(function (p) {
          return '<div class="lurow"><span class="luname">' + esc(p.name) + '</span>' +
            '<select class="lu-pos" data-a="' + esc(p.athleteId) + '">' + posOpts(p.position) + '</select>' +
            '<select class="lu-role" data-a="' + esc(p.athleteId) + '"><option value="Bench"' + (p.role !== 'Starter' ? ' selected' : '') + '>Bench</option><option value="Starter"' + (p.role === 'Starter' ? ' selected' : '') + '>Starter</option></select></div>';
        }).join('') || '<p class="s">No roster.</p>';
        setContent('<div class="sectlabel">' + esc(t.label) + ' · Depth chart</div>' +
          '<div class="xs" style="color:var(--muted);margin-bottom:.3rem">Set each player\'s position + starter/bench. Players see their own in the student app.</div>' +
          '<div class="lugrid">' + rows + '</div><button class="btn block" id="lu-save" style="margin-top:.5rem">💾 Save depth chart</button><span class="s" id="lu-msg"></span>');
        $('lu-save').addEventListener('click', function () { saveLineup(t); });
      });
    }
    function saveLineup(t) {
      var byA = {};
      Array.prototype.forEach.call($('content').querySelectorAll('.lu-pos'), function (s) { var a = s.getAttribute('data-a'); (byA[a] = byA[a] || { athleteId: a }).position = s.value; });
      Array.prototype.forEach.call($('content').querySelectorAll('.lu-role'), function (s) { var a = s.getAttribute('data-a'); (byA[a] = byA[a] || { athleteId: a }).role = s.value; });
      $('lu-msg').textContent = ' Saving…';
      call('saveLineup', { teamId: t.TeamID, rows: Object.keys(byA).map(function (k) { return byA[k]; }) }).then(function (r) {
        if (r && r.ok) { TalonUI.toast('Depth chart saved'); $('lu-msg').textContent = ' Saved.'; }
        else $('lu-msg').textContent = ' ' + ((r && (r.msg || r.code)) || 'Error');
      }).catch(function () { $('lu-msg').textContent = ' Network error'; });
    }

    // ---------- wire ----------
    var tbBtn = $('team-btn'); if (tbBtn) tbBtn.addEventListener('click', function () { if (!inConsole()) openTeamPicker(); });
    var mbSel = $('mode-select'); if (mbSel) mbSel.addEventListener('change', function () {
      var m = this.value;
      if (m === 'parentself') { openParentBridge(); renderModeBtn(); return; } // my own family (read-write)
      if (m === 'parent' || m === 'player') { openImpersonatePicker(m); renderModeBtn(); return; } // owner impersonation (others), reset select
      if ((m === 'coach' || m === 'console') && m !== state.mode) setMode(m);
    });
    // Delegated: the tabbar's buttons are rebuilt on mode switches.
    var tabbarEl = $('tabbar');
    if (tabbarEl) tabbarEl.addEventListener('click', function (ev) {
      var b = ev.target.closest ? ev.target.closest('.tb') : null;
      if (!b) return;
      var tab = b.getAttribute('data-tab');
      if (tab === '__more') { openMoreSheet(); return; } // mobile-only "More"
      state.tab = tab; remember(TAB_KEY, state.tab); renderApp();
    });
    // A running practice timer keeps ticking as you navigate (mini-bar); reconcile + re-arm on return.
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible' && state.live) {
        var done = liveCatchUp(state.live, Date.now()); if (done > 0 && state.live.toneOn !== false) liveBeep(); liveSave();
        if (!state.live.done && state.live.running) liveWakeLock(true);
        if (state._liveMounted) renderLive(); else updateLiveBar();
      }
    });
    boot();
  })();
</script>
</body>
</html>
