<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Door Automation — Dashboard</title>
<!-- Bootstrap 5.3 + Inter (CDN) so this page wears the shared HCS "Eagle Eye" look. -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
     HCS shared design system (inlined from design/system/hcs-ui.css).
     This page is a self-contained HtmlService template (NOT included into
     Index), so the token layer is inlined here rather than shared. The
     Dashboard APP layer follows AFTER this block and keeps its EXISTING
     class names (nav, window-bar, kpi-card, card, badge-*, data-table,
     action-item, btn-action, btn-refresh, …) because the inline script
     builds/queries them by name — only their STYLING is re-skinned to the
     shared token system. Legacy :root tokens are re-aliased to the hcs
     tokens so every literal var(--x) reference is byte-untouched.
     ===================================================================== */
  :root {
    --hcs-red:#B22222; --hcs-red-dark:#8f1b1b; --hcs-red-soft:#fff5f5;
    --hcs-gold:#D4AF37; --hcs-gold-soft:#fffdf4;
    --hcs-ink:#23272e; --hcs-muted:#6b7280; --hcs-line:#e7e9ee;
    --hcs-bg:#f6f7f9; --hcs-surface:#ffffff; --hcs-surface-2:#f7f8fa;
    --hcs-ok:#1f8a4c; --hcs-ok-bg:#e9f7ef; --hcs-ok-line:#bfe6cd;
    --hcs-warn:#b5751a; --hcs-warn-bg:#fdf3e2; --hcs-warn-line:#f1d9a8;
    --hcs-closed:#8a8f98; --hcs-closed-bg:#f1f0ee;
    --hcs-radius-sm:8px; --hcs-radius:12px; --hcs-radius-lg:16px; --hcs-radius-xl:18px;

    /* ---- legacy-token aliases ----
       The markup + chart options still read these `var(--x)` names; alias
       each onto an hcs token so the palette becomes the shared one while
       all that markup/JS stays byte-untouched. */
    --bg:          var(--hcs-bg);
    --surface:     var(--hcs-surface);
    --surface2:    var(--hcs-surface-2);
    --border:      var(--hcs-line);
    --accent:      var(--hcs-red);     /* brand chrome → hcs red */
    --accent2:     var(--hcs-muted);
    --accent-red:  var(--hcs-red);
    --text:        var(--hcs-ink);
    --muted:       var(--hcs-muted);
    --green:       var(--hcs-ok);
    --red:         var(--hcs-red);
    --yellow:      var(--hcs-warn);
    --radius:      var(--hcs-radius-lg);
    --glow-yellow: 0 2px 8px rgba(178,34,34,0.12);
    --glow-green:  0 2px 8px rgba(31,138,76,0.18);
    --glow-red:    0 2px 8px rgba(178,34,34,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--hcs-bg);
    color: var(--hcs-ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Nav (shared HCS brand bar) */
  .nav {
    background: var(--hcs-surface);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--hcs-line);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav h1 {
    font-size: 1.12rem;
    font-weight: 800;
    padding: 0;
    margin-right: 24px;
    color: var(--hcs-ink);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .nav-btn {
    background: none;
    border: 1.5px solid var(--hcs-red);
    color: var(--hcs-red);
    padding: 7px 15px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    border-radius: 999px;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    text-decoration: none;
    display: inline-block;
  }
  .nav-btn:hover { background: var(--hcs-red); color: #fff; }

  /* Window selector bar */
  .window-bar {
    background: var(--hcs-surface);
    border-bottom: 1px solid var(--hcs-line);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.85rem;
    color: var(--hcs-muted);
  }
  .window-bar label { font-weight: 700; color: var(--hcs-muted); }
  .window-bar select {
    border: 1.5px solid var(--hcs-line);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.85rem;
    color: var(--hcs-ink);
    background: var(--hcs-surface);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .window-bar select:focus { border-color: var(--hcs-red); box-shadow: 0 0 0 3px rgba(178,34,34,0.12); }
  .window-bar select option { background: #fff; }
  .btn-refresh {
    margin-left: auto;
    background: var(--hcs-red);
    color: #fff;
    border: 1px solid var(--hcs-red);
    border-radius: 9px;
    padding: 7px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .btn-refresh:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: var(--hcs-red-dark); border-color: var(--hcs-red-dark); }
  .btn-refresh:disabled { background: var(--hcs-surface-2); color: var(--hcs-muted); border-color: var(--hcs-line); cursor: default; box-shadow: none; transform: none; }
  .btn-spinner {
    display: inline-block; width: 11px; height: 11px;
    border: 2px solid transparent; border-top-color: currentColor; border-right-color: currentColor;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* Loading / error state */
  #loading, #error-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--hcs-muted);
    font-size: 0.95rem;
  }
  #error-msg { color: var(--hcs-red); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--hcs-line);
    border-top-color: var(--hcs-red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #dashboard { display: none; }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--hcs-surface);
    border-radius: var(--hcs-radius-lg);
    padding: 20px;
    border: 1px solid var(--hcs-line);
    border-left: 4px solid var(--hcs-gold);
    box-shadow: 0 1px 2px rgba(20,20,40,0.04);
  }
  .kpi-card.green  { border-left-color: var(--hcs-ok); }
  .kpi-card.red    { border-left-color: var(--hcs-red); }
  .kpi-card.orange { border-left-color: var(--hcs-warn); }
  .kpi-card.blue   { border-left-color: var(--hcs-gold); }
  .kpi-label {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--hcs-muted); margin-bottom: 6px;
  }
  .kpi-value { font-size: 2rem; font-weight: 800; line-height: 1; color: var(--hcs-ink); }
  .kpi-sub   { font-size: 0.75rem; color: var(--hcs-muted); margin-top: 4px; }

  /* Section cards (signature gold-accent surface) */
  .card {
    background: var(--hcs-surface);
    border-radius: var(--hcs-radius-lg);
    border: 1px solid var(--hcs-line);
    box-shadow: 0 1px 2px rgba(20,20,40,0.04);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--hcs-line);
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--hcs-ink);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-left: 4px solid var(--hcs-gold);
  }
  .card-body { padding: 20px; }

  /* Tables */
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .data-table th {
    text-align: left;
    padding: 9px 12px;
    background: var(--hcs-surface-2);
    color: var(--hcs-muted);
    font-weight: 700;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--hcs-line);
  }
  .data-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--hcs-line);
    vertical-align: top;
    color: var(--hcs-ink);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tbody tr:nth-child(even) td { background: #fafbfc; }
  .data-table tr:hover td { background: var(--hcs-gold-soft); }

  /* Badges (HCS 4-state palette) */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: var(--hcs-radius-sm);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-success { background: var(--hcs-ok-bg);     color: var(--hcs-ok); }
  .badge-failed  { background: var(--hcs-red-soft);  color: var(--hcs-red); }
  .badge-skipped { background: #eef2f7;              color: #516074; }
  .badge-pending { background: var(--hcs-warn-bg);   color: var(--hcs-warn); }
  .badge-orange  { background: var(--hcs-warn-bg);   color: var(--hcs-warn); }

  /* Action type breakdown grid */
  .action-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .action-item {
    background: var(--hcs-surface-2);
    border-radius: var(--hcs-radius-sm);
    padding: 12px 14px;
    border: 1px solid var(--hcs-line);
  }
  .action-item-name {
    font-size: 0.72rem; font-weight: 800; color: var(--hcs-ink);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
  }
  .action-item-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-pill { font-size: 0.73rem; padding: 2px 8px; border-radius: var(--hcs-radius-sm); font-weight: 700; }
  .stat-success { background: var(--hcs-ok-bg);    color: var(--hcs-ok); }
  .stat-failed  { background: var(--hcs-red-soft); color: var(--hcs-red); }
  .stat-skipped { background: #eef2f7;             color: #516074; }
  .action-item-total { font-size: 0.7rem; color: var(--hcs-muted); margin-top: 6px; }

  /* Two-col layout */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  .empty-state {
    color: var(--hcs-muted); font-size: 0.83rem; font-style: italic;
    text-align: center; padding: 20px 0;
  }

  .generated-at {
    text-align: right; font-size: 0.72rem;
    color: var(--hcs-muted); margin-top: 8px;
  }
  .notes-cell { max-width: 320px; word-break: break-word; }
  .bar-cell { width: 140px; }
  .bar-track { background: var(--hcs-line); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill  { height: 8px; border-radius: 4px; background: var(--hcs-ok); transition: width 0.3s; }
  .bar-fill.red { background: var(--hcs-red); }

  /* Scheduling action buttons */
  .action-btns { display: flex; flex-wrap: wrap; gap: 12px; }
  .btn-action {
    background: var(--hcs-surface);
    color: var(--hcs-red);
    border: 1.5px solid var(--hcs-red);
    border-radius: 11px;
    padding: 10px 18px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-action:hover { background: var(--hcs-red); color: #fff; border-color: var(--hcs-red); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .btn-action:disabled { opacity: 0.5; cursor: default; box-shadow: none; }
  .action-feedback { font-size: 0.8rem; color: var(--hcs-muted); margin-top: 10px; min-height: 18px; }
  .action-feedback.ok  { color: var(--hcs-ok); }
  .action-feedback.err { color: var(--hcs-red); }

  @media (max-width: 640px) { main { padding: 12px; } }
</style>

<body>

<nav class="nav">
  <h1>&#x1F511; Door Automation — Dashboard</h1>
  <a id="cp-link" class="nav-btn" style="margin-left:auto;" href="index.html" target="_top">To Control Panel</a>
</nav>

<div class="window-bar">
  <label for="window-select">Showing last</label>
  <select id="window-select">
    <option value="7" selected>7 days</option>
    <option value="30">30 days</option>
    <option value="60">60 days</option>
    <option value="90">90 days</option>
  </select>
  <span id="generated-at-header" style="font-size:0.78rem;"></span>
  <button class="btn-refresh" id="btn-refresh" onclick="loadData()">Refresh</button>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div>
    Loading dashboard data…
  </div>
  <div id="error-msg" style="display:none"></div>
  <div id="dashboard">

    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- Action Type Breakdown -->
    <div class="card">
      <div class="card-header">Action Type Breakdown</div>
      <div class="card-body">
        <div class="action-grid" id="action-grid"></div>
      </div>
    </div>

    <!-- Emergency Operations -->
    <div class="card">
      <div class="card-header">Emergency Operations (all time)</div>
      <div class="card-body" id="emergency-card"></div>
    </div>

    <!-- Door Performance -->
    <div class="card">
      <div class="card-header">Door Performance</div>
      <div class="card-body" id="door-performance-card"></div>
    </div>

    <!-- Peak Hours + Operation Sources -->
    <div class="two-col">
      <div class="card">
        <div class="card-header">Peak Unlock Hours</div>
        <div class="card-body" id="peak-hours-card"></div>
      </div>
      <div class="card">
        <div class="card-header">Operation Sources</div>
        <div class="card-body" id="source-stats-card"></div>
      </div>
    </div>

    <!-- Scheduling Actions -->
    <div class="card">
      <div class="card-header">Scheduling Actions</div>
      <div class="card-body">
        <div class="action-btns">
          <button class="btn-action" onclick="runAction(this, 'scanEventCalendar', 'Scanning…')">&#128197; Scan Event Calendar</button>
          <button class="btn-action" onclick="runAction(this, 'syncSportsCalendar', 'Syncing…')">&#127944; Sync Sports Calendar</button>
          <button class="btn-action" onclick="runAction(this, 'syncTodaySchedule', 'Rebuilding…')">&#128260; Rebuild Today Schedule</button>
        </div>
        <div class="action-feedback" id="action-feedback"></div>
      </div>
    </div>

    <!-- Recent Failures + Warnings -->
    <div class="card">
      <div class="card-header">Recent Failures &amp; Warnings (last 20 per type)</div>
      <div class="card-body" id="failures-card"></div>
    </div>

    <div class="generated-at" id="generated-at"></div>
  </div>
</main>

<script>
var CSRF = 'demo-csrf-0';
var _data = null;

document.addEventListener('DOMContentLoaded', loadData);

function loadData() {
  var btn = document.getElementById('btn-refresh');
  if (btn) {
    btn.disabled = true;
    btn._origHtml = btn.innerHTML;
    btn.innerHTML = '<span class="btn-spinner"></span>Refreshing…';
  }
  document.getElementById('loading').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  var days = parseInt(document.getElementById('window-select').value, 10);
  google.script.run
    .withSuccessHandler(onData)
    .withFailureHandler(onError)
    .processPost({ action: 'getDashboardData', days: days });
}

function onData(resp) {
  var btn = document.getElementById('btn-refresh');
  if (btn) { btn.disabled = false; btn.innerHTML = btn._origHtml || 'Refresh'; }
  document.getElementById('loading').style.display = 'none';

  if (!resp || !resp.success) {
    showError((resp && resp.error) || 'Unknown error from server.');
    return;
  }

  _data = resp;
  render(_data);
  document.getElementById('dashboard').style.display = 'block';
}

function onError(err) {
  var btn = document.getElementById('btn-refresh');
  if (btn) { btn.disabled = false; btn.innerHTML = btn._origHtml || 'Refresh'; }
  document.getElementById('loading').style.display = 'none';
  showError('Failed to load data: ' + (err.message || err));
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function render(d) {
  renderKPIs(d);
  renderActionGrid(d.byActionType);
  renderFailures(d.failuresByAction, d.failureActionTypes, d.failureDoors);
  renderEmergency(d.emergencyOps);
  renderDoorPerformance(d.doorStats);
  renderPeakHours(d.peakHours);
  renderSourceStats(d.sourceStats, d.manualOperators);
  document.getElementById('generated-at').textContent = 'Generated at ' + d.generatedAt;
  document.getElementById('generated-at-header').textContent = '— as of ' + d.generatedAt;
}

function renderKPIs(d) {
  var rate = d.successRate !== null ? d.successRate + '%' : '—';
  var fail = d.failRate    !== null ? d.failRate + '%'    : '—';
  var rateColor = (d.successRate !== null && d.successRate >= 95) ? 'green' : 'orange';
  var failColor = (d.failRate    !== null && d.failRate    === 0)  ? 'green' : 'red';

  var skippedNote = d.doorOpsSkipped > 0 ? ' (' + d.doorOpsSkipped + ' skipped)' : '';
  var cards = [
    { label: 'Door Action Success Rate', value: rate,
      sub: d.doorOpsAttempted + ' attempted' + skippedNote + ' — of ops that ran',   color: rateColor },
    { label: 'Door Action Fail Rate',    value: fail,
      sub: d.doorOpsFailed + ' failed' + (d.doorOpsPartial > 0 ? ', ' + d.doorOpsPartial + ' partial' : '') + ' of ' + d.doorOpsAttempted + ' attempted', color: failColor },
    { label: 'Scheduling Errors', value: d.schedulingErrors,
      sub: 'invalid schedule type or build failure',   color: d.schedulingErrors  === 0 ? 'green' : 'red'    },
    { label: 'Remediations',    value: d.remediationCount,   sub: 'auto-corrections in window', color: d.remediationCount   === 0 ? 'green' : 'orange' },
    { label: 'Stale Triggers',  value: d.staleTriggersCount, sub: 'missed-fire events in window', color: d.staleTriggersCount === 0 ? 'green' : 'red'   },
    { label: 'Device Offline',  value: d.deviceOfflineCount, sub: 'offline events in window',   color: d.deviceOfflineCount  === 0 ? 'green' : 'red'    },
  ];

  document.getElementById('kpi-grid').innerHTML = cards.map(function(c) {
    return '<div class="kpi-card ' + c.color + '">' +
           '<div class="kpi-label">' + escHtml(c.label) + '</div>' +
           '<div class="kpi-value">' + escHtml(String(c.value)) + '</div>' +
           '<div class="kpi-sub">'   + escHtml(c.sub) + '</div>' +
           '</div>';
  }).join('');
}

function renderActionGrid(byType) {
  var LABELS = {
    UNLOCK: 'Unlock', LOCK: 'Lock', FIRE_BATCH: 'Fire Batch',
    POST_OP_CHECK: 'Post-op Check', STATE_CHECK: 'State Check',
    REBUILD: 'Rebuild', DAILY_RESET: 'Daily Reset', STALE_TRIGGERS: 'Stale Triggers',
    UPDATE_TRIGGERS: 'Update Triggers', BUILD_DAY_EVENTS: 'Build Day Events',
    CE_SYNC: 'Custom Event Sync', EVENT_SYNC: 'Event Calendar Sync',
    INVALID_SCHEDULE_TYPE: 'Invalid Schedule Type', BUILD_ACTIONS: 'Build Actions'
  };
  var html = Object.keys(byType).map(function(at) {
    var s = byType[at];
    if (s.total === 0) return '';
    var pills = '';
    if (s.success > 0) pills += '<span class="stat-pill stat-success">✓ ' + s.success + '</span>';
    if (s.failed  > 0) pills += '<span class="stat-pill stat-failed">✗ '  + s.failed  + '</span>';
    if (s.skipped > 0) pills += '<span class="stat-pill stat-skipped">— ' + s.skipped + '</span>';
    return '<div class="action-item">' +
           '<div class="action-item-name">' + escHtml(LABELS[at] || at) + '</div>' +
           '<div class="action-item-stats">' + pills + '</div>' +
           '<div class="action-item-total">' + s.total + ' total</div>' +
           '</div>';
  }).join('');
  document.getElementById('action-grid').innerHTML = html || '<p class="empty-state">No data in window.</p>';
}

function renderFailures(failuresByAction, actionTypes, failureDoors) {
  var el = document.getElementById('failures-card');
  if (!actionTypes || actionTypes.length === 0) {
    el.innerHTML = '<p class="empty-state">No failures or warnings on record.</p>';
    return;
  }
  var selectedAction = el._filterAction || 'ALL';
  var selectedDoor   = el._filterDoor   || 'ALL';
  var byAction = (failuresByAction && failuresByAction[selectedAction]) || [];
  var visible = selectedDoor === 'ALL' ? byAction : byAction.filter(function(f) {
    return String(f.doors || '').split(',').some(function(d) { return d.trim() === selectedDoor; });
  });

  var selectStyle = 'font-size:0.85rem;padding:4px 8px;border:1px solid var(--hcs-line);border-radius:6px;background:var(--hcs-surface)';
  var actionOpts = '<option value="ALL"' + (selectedAction === 'ALL' ? ' selected' : '') + '>All types (last 20)</option>' +
    actionTypes.map(function(a) {
      return '<option value="' + escHtml(a) + '"' + (a === selectedAction ? ' selected' : '') + '>' + escHtml(a) + '</option>';
    }).join('');
  var doorOpts = '<option value="ALL"' + (selectedDoor === 'ALL' ? ' selected' : '') + '>All doors</option>' +
    (failureDoors || []).map(function(d) {
      return '<option value="' + escHtml(d) + '"' + (d === selectedDoor ? ' selected' : '') + '>' + escHtml(d) + '</option>';
    }).join('');
  var filterHtml = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">' +
    '<select id="failure-filter-action" style="' + selectStyle + '">' + actionOpts + '</select>' +
    '<select id="failure-filter-door"   style="' + selectStyle + '">' + doorOpts   + '</select>' +
    '</div>';

  var rows = visible.map(function(f) {
    var resultBadge = f.result === 'WARNING'
      ? '<span class="badge badge-pending">Warning</span>'
      : '<span class="badge badge-failed">Failed</span>';
    return '<tr>' +
      '<td>' + escHtml(f.timestamp) + '</td>' +
      '<td>' + escHtml(f.action) + '</td>' +
      '<td>' + resultBadge + '</td>' +
      '<td>' + escHtml(f.doors || '—') + '</td>' +
      '<td class="notes-cell">' + escHtml(f.notes || '—') + '</td>' +
      '</tr>';
  }).join('');

  el.innerHTML = filterHtml +
    (visible.length === 0 ? '<p class="empty-state">No failures or warnings match these filters.</p>' :
      '<table class="data-table">' +
      '<thead><tr><th>Timestamp</th><th>Action</th><th>Result</th><th>Doors</th><th>Notes</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>');

  document.getElementById('failure-filter-action').addEventListener('change', function() {
    el._filterAction = this.value;
    renderFailures(_data.failuresByAction, _data.failureActionTypes, _data.failureDoors);
  });
  document.getElementById('failure-filter-door').addEventListener('change', function() {
    el._filterDoor = this.value;
    renderFailures(_data.failuresByAction, _data.failureActionTypes, _data.failureDoors);
  });
}

function renderEmergency(ops) {
  if (!ops || ops.length === 0) {
    document.getElementById('emergency-card').innerHTML = '<p class="empty-state">No emergency operations on record.</p>';
    return;
  }
  var rows = ops.map(function(op) {
    var badge = op.result === 'SUCCESS'
      ? '<span class="badge badge-success">Success</span>'
      : op.result === 'PARTIAL'
      ? '<span class="badge badge-orange">Partial</span>'
      : '<span class="badge badge-failed">' + escHtml(op.result) + '</span>';
    return '<tr>' +
      '<td>' + escHtml(op.timestamp) + '</td>' +
      '<td>' + escHtml(op.action) + '</td>' +
      '<td>' + badge + '</td>' +
      '<td class="notes-cell">' + escHtml(op.notes || '—') + '</td>' +
      '</tr>';
  }).join('');
  document.getElementById('emergency-card').innerHTML =
    '<table class="data-table">' +
    '<thead><tr><th>Timestamp</th><th>Operation</th><th>Result</th><th>Notes</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

function renderDoorPerformance(doorStats) {
  var el = document.getElementById('door-performance-card');
  if (!doorStats || doorStats.length === 0) {
    el.innerHTML = '<p class="empty-state">No door operation data in the selected window.</p>';
    return;
  }
  var rows = doorStats.map(function(d) {
    var rate = (d.successRate !== null && d.successRate !== undefined) ? d.successRate : null;
    var rateBadge = rate === null
      ? '<span class="badge badge-skipped">—</span>'
      : rate >= 95 ? '<span class="badge badge-success">' + rate + '%</span>'
      : rate >= 80 ? '<span class="badge badge-pending">' + rate + '%</span>'
      : '<span class="badge badge-failed">' + rate + '%</span>';
    var issueBadge = d.checksFailed > 0
      ? '<span class="badge badge-failed">' + d.checksFailed + '</span>'
      : (d.checkTotal > 0 ? '<span class="badge badge-success">0</span>' : '<span class="badge badge-skipped">—</span>');
    var remBadge = (d.remediations || 0) > 0
      ? '<span class="badge badge-pending">' + d.remediations + '</span>'
      : '<span class="badge badge-skipped">0</span>';
    return '<tr>' +
      '<td>' + escHtml(d.door) + '</td>' +
      '<td style="text-align:right">' + d.unlocks + '</td>' +
      '<td style="text-align:right">' + (d.checkTotal > 0 ? d.checksSuccess + ' / ' + d.checkTotal : '—') + '</td>' +
      '<td>' + issueBadge + '</td>' +
      '<td>' + remBadge + '</td>' +
      '<td>' + rateBadge + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML =
    '<p style="font-size:0.75rem;color:var(--hcs-muted);margin-bottom:10px">Reliability based on post-op verification checks (60 s after each unlock)</p>' +
    '<table class="data-table">' +
    '<thead><tr><th>Door</th><th style="text-align:right">Unlocks</th><th style="text-align:right">Verified OK / Checks</th><th>Issues</th><th>Remediations</th><th>Reliability</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

function renderPeakHours(peakHours) {
  var el = document.getElementById('peak-hours-card');
  var active = (peakHours || []).filter(function(h) { return h.count > 0; });
  if (active.length === 0) {
    el.innerHTML = '<p class="empty-state">No unlock data in the selected window.</p>';
    return;
  }
  var maxCount = Math.max.apply(null, active.map(function(h) { return h.count; }));
  var rows = active.map(function(h) {
    var pct = maxCount > 0 ? Math.round(h.count / maxCount * 100) : 0;
    var label = h.hour === 0 ? '12 AM'
      : h.hour < 12 ? h.hour + ' AM'
      : h.hour === 12 ? '12 PM'
      : (h.hour - 12) + ' PM';
    return '<tr>' +
      '<td style="width:52px;white-space:nowrap">' + escHtml(label) + '</td>' +
      '<td class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div></td>' +
      '<td style="width:36px;text-align:right">' + h.count + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML =
    '<table class="data-table">' +
    '<thead><tr><th>Hour</th><th class="bar-cell">Volume</th><th style="text-align:right">Count</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

function renderSourceStats(s, ops) {
  var el = document.getElementById('source-stats-card');
  if (!s || s.total === 0) {
    el.innerHTML = '<p class="empty-state">No operation data in the selected window.</p>';
    return;
  }
  var maxCount = Math.max(s.scheduled, s.manual, s.emergency, s.relock);
  function sourceRow(label, count, barClass) {
    var pct = maxCount > 0 ? Math.round(count / maxCount * 100) : 0;
    return '<tr>' +
      '<td>' + escHtml(label) + '</td>' +
      '<td class="bar-cell"><div class="bar-track"><div class="bar-fill' + (barClass ? ' ' + barClass : '') + '" style="width:' + pct + '%"></div></div></td>' +
      '<td style="width:36px;text-align:right">' + count + '</td>' +
      '</tr>';
  }
  var html =
    '<table class="data-table">' +
    '<thead><tr><th>Source</th><th class="bar-cell">Volume</th><th style="text-align:right">Count</th></tr></thead>' +
    '<tbody>' +
    sourceRow('Auto-scheduled (calendar)', s.scheduled) +
    sourceRow('Quick Control (manual)', s.manual) +
    sourceRow('Emergency ops', s.emergency, 'red') +
    sourceRow('Relock on closure', s.relock) +
    '</tbody></table>';
  if (ops && ops.length > 0) {
    html += '<div style="margin-top:16px;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:var(--hcs-muted);margin-bottom:6px">Manual Operators</div>';
    var opRows = ops.map(function(o) {
      return '<tr><td>' + escHtml(o.email) + '</td><td style="text-align:right">' + o.count + '</td></tr>';
    }).join('');
    html += '<table class="data-table"><thead><tr><th>User</th><th style="text-align:right">Ops</th></tr></thead><tbody>' + opRows + '</tbody></table>';
  }
  el.innerHTML = html;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;');
}

function runAction(btn, action, loadText) {
  var fb = document.getElementById('action-feedback');
  btn.disabled = true;
  btn._origHtml = btn.innerHTML;
  btn.innerHTML = '<span class="btn-spinner"></span>' + loadText;
  fb.textContent = '';
  fb.className = 'action-feedback';
  google.script.run
    .withSuccessHandler(function(r) {
      btn.disabled = false;
      btn.innerHTML = btn._origHtml;
      if (r && r.csrfToken) CSRF = r.csrfToken;
      if (r && r.error) {
        fb.textContent = r.error;
        fb.className = 'action-feedback err';
      } else {
        fb.textContent = 'Done.';
        fb.className = 'action-feedback ok';
        setTimeout(function() { fb.textContent = ''; fb.className = 'action-feedback'; }, 4000);
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      btn.innerHTML = btn._origHtml;
      fb.textContent = e.message || 'Error';
      fb.className = 'action-feedback err';
    })
    .processPost({ action: action, csrf: CSRF });
}
</script>
</body>
