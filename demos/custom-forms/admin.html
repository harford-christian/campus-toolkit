<!DOCTYPE html><html lang="en"><head>
<meta name="theme-color" content="#8B1E1E">
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>HCS Forms — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --hcs-red:#8B1E1E; --hcs-red-hover:#701818; --hcs-gold:#D4AF37; --hcs-gold-soft:#f6ecd0;
    --bg:#f4f5f7; --card:#ffffff; --panel:#fbfafa;
    --text:#2b2b2b; --muted:#6b7280; --line:#e2e4e8; --line-strong:#cfd3da;
    --ok:#2e7d32; --ok-bg:#e8f5e9; --err:#b42318; --err-bg:#fdeceb; --warn:#b45309; --warn-bg:#fdf3e7;
    --radius:12px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 6px 22px rgba(16,24,40,.06);
    --ring:0 0 0 3px rgba(139,30,30,.16);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body { background:var(--bg); color:var(--text); line-height:1.5;
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; -webkit-font-smoothing:antialiased; }

  /* ---- layout ---- */
  .page { max-width:680px; margin:0 auto; padding:24px 16px 64px; }
  .page.wide { max-width:1080px; }
  .brandbar { display:flex; align-items:center; gap:12px; background:var(--hcs-red); color:#fff;
    padding:12px 18px; border-radius:var(--radius) var(--radius) 0 0; }
  .brandbar .logo { height:34px; width:auto; background:#fff; border-radius:6px; padding:3px 5px; }
  .brandbar .name { font-weight:800; letter-spacing:-.01em; font-size:1rem; }
  .brandbar .spacer { margin-left:auto; }
  .goldrule { height:4px; background:var(--hcs-gold); }

  /* ---- card / surfaces ---- */
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
  .card.flush-top { border-top-left-radius:0; border-top-right-radius:0; }
  .card-pad { padding:22px; }
  .stack > * + * { margin-top:16px; }
  .divider { height:1px; background:var(--line); border:0; margin:20px 0; }

  /* ---- headings / text ---- */
  .form-title { font-size:1.5rem; font-weight:800; margin:0 0 4px; letter-spacing:-.02em; }
  .form-desc { color:var(--muted); margin:0; }
  .section-head { font-size:1.05rem; font-weight:700; color:var(--hcs-red); margin:8px 0 2px;
    padding-bottom:6px; border-bottom:2px solid var(--hcs-gold-soft); }
  .help { font-size:.83rem; color:var(--muted); margin:3px 0 0; }
  .muted { color:var(--muted); } .center { text-align:center; }

  /* ---- fields ---- */
  .field { margin:0; }
  .field > label { display:block; font-weight:600; font-size:.92rem; margin-bottom:6px; }
  .req { color:var(--err); margin-left:2px; }
  .control, input.control, select.control, textarea.control {
    width:100%; font:inherit; font-size:1rem; color:var(--text); background:var(--card);
    border:1px solid var(--line-strong); border-radius:var(--radius-sm); padding:10px 12px; transition:border-color .12s, box-shadow .12s; }
  textarea.control { min-height:96px; resize:vertical; }
  .control:focus, .control:focus-visible { outline:none; border-color:var(--hcs-red); box-shadow:var(--ring); }
  .control:disabled, .control[readonly] { background:#f3f4f6; color:#4b5563; cursor:not-allowed; }
  .field.invalid .control { border-color:var(--err); }
  .field .error { display:none; color:var(--err); font-size:.82rem; margin-top:5px; }
  .field.invalid .error { display:block; }

  /* choice groups (radio/checkbox) */
  .choices { display:flex; flex-direction:column; gap:8px; }
  .choice { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border:1px solid var(--line);
    border-radius:var(--radius-sm); cursor:pointer; background:var(--card); }
  .choice:hover { border-color:var(--line-strong); }
  .choice:focus-within { border-color:var(--hcs-red); box-shadow:var(--ring); }
  .choice input { margin-top:2px; accent-color:var(--hcs-red); width:18px; height:18px; }
  .choice.selected { border-color:var(--hcs-red); background:#fbf4f4; }

  /* ---- buttons ---- */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
    border:1px solid transparent; border-radius:var(--radius-sm); font-weight:700; font-size:.95rem;
    padding:11px 18px; background:var(--hcs-red); color:#fff; transition:background .12s, box-shadow .12s; }
  .btn:hover { background:var(--hcs-red-hover); }
  .btn:focus-visible { outline:none; box-shadow:var(--ring); }
  .btn:disabled { opacity:.55; cursor:not-allowed; }
  .btn.block { width:100%; }
  .btn.ghost { background:transparent; color:var(--hcs-red); border-color:var(--line-strong); }
  .btn.ghost:hover { background:#fbf4f4; }
  .btn.gold { background:var(--hcs-gold); color:#3a2e00; }
  .btn.sm { padding:7px 12px; font-size:.85rem; }

  /* ---- badges / pills (status system, reused from purchasing) ---- */
  .pill { display:inline-block; font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:999px; text-transform:capitalize; }
  .pill.draft { background:#eef1f5; color:#475467; }
  .pill.published, .pill.open, .pill.approved { background:var(--ok-bg); color:var(--ok); }
  .pill.private { background:var(--hcs-gold-soft); color:#7a5b00; }
  .pill.staff { background:#e7edfb; color:#2b4a9b; }
  .pill.locked, .pill.closed, .pill.rejected { background:var(--err-bg); color:var(--err); }
  .pill.pending { background:var(--warn-bg); color:var(--warn); }

  /* ---- notices ---- */
  .notice { border-radius:var(--radius-sm); padding:12px 14px; font-size:.9rem; }
  .notice.info { background:var(--hcs-gold-soft); border:1px solid #ecd9a3; color:#6b5200; }
  .notice.err { background:var(--err-bg); border:1px solid #f3c6c2; color:var(--err); }
  .notice.ok { background:var(--ok-bg); border:1px solid #bfe0c1; color:var(--ok); }

  /* ---- toast + spinner ---- */
  .toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#1f2430; color:#fff;
    padding:11px 18px; border-radius:999px; font-size:.88rem; font-weight:600; box-shadow:var(--shadow); z-index:60; }
  .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%;
    display:inline-block; animation:spin .7s linear infinite; }
  .btn.ghost .spinner { border-color:rgba(139,30,30,.3); border-top-color:var(--hcs-red); }
  @keyframes spin { to { transform:rotate(360deg); } }

  .modal-overlay { position:fixed; inset:0; background:rgba(16,24,40,.5); display:flex; align-items:center; justify-content:center; z-index:70; padding:16px; }
  .modal { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); max-width:440px; width:100%; padding:22px; }
  .modal h3 { margin:0 0 8px; font-size:1.15rem; color:var(--hcs-red); }
  .modal .mbody { margin:0 0 16px; color:var(--text); font-size:.92rem; line-height:1.5; }
  .sigpad { border:1px dashed var(--line-strong); border-radius:var(--radius-sm); width:100%; height:180px; background:#fff; touch-action:none; display:block; }
  .sigbar { margin-top:6px; }
  .filelist { margin-top:6px; }
  .filelist .fitem { display:flex; align-items:center; gap:8px; font-size:.82rem; color:var(--text); }
  .desc-block { font-size:.9rem; color:var(--text); white-space:pre-wrap; line-height:1.5; margin:0; }
  .progress { height:6px; background:var(--line); border-radius:999px; overflow:hidden; margin-bottom:4px; }
  .progress-bar { height:100%; background:var(--hcs-red); transition:width .2s ease; }
  .calc-value { font-weight:800; color:var(--hcs-red); background:#f7f8fa; }
  .footer { text-align:center; color:var(--muted); font-size:.75rem; padding:22px 0 0; }
  @media (max-width:520px){ .card-pad{ padding:16px; } .page{ padding:14px 10px 48px; } }
  /* inline SVG icons (FormsUI.icon) — inherit color/size from context */
  .hcsi { display:inline-block; vertical-align:middle; flex:none; }
  .hcsi-lg { width:44px; height:44px; }
  .infoicon { color:var(--muted); cursor:help; }
  .infoicon:hover { color:var(--hcs-red); }
</style>
<style>
  #pvbar { position:sticky; top:0; z-index:80; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:#2b2b2b; color:#fff; padding:8px 14px; font-family:'Inter',sans-serif; }
  #pvbar .pvtag { font-size:.66rem; font-weight:800; letter-spacing:.06em; background:var(--hcs-gold); color:#3a2e00; padding:3px 8px; border-radius:999px; }
  #pvbar a, #pvbar .pvlink { color:#fff; font-size:.8rem; text-decoration:none; }
  #pvbar select { font:inherit; padding:3px 6px; border-radius:6px; }
  #pvbar .sp { margin-left:auto; }
  .chooser { max-width:820px; margin:0 auto; padding:48px 16px; }
  .chooser h1 { font-size:1.8rem; margin:0 0 6px; }
  .chooser .cards { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:26px; }
  @media (max-width:640px){ .chooser .cards { grid-template-columns:1fr; } }
  .chooser a.choice-card { display:block; text-decoration:none; color:var(--text); background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; transition:border-color .12s, transform .08s; }
  .chooser a.choice-card:hover { border-color:var(--hcs-red); transform:translateY(-2px); }
  .chooser .ic { font-size:2rem; }
  .chooser h2 { margin:8px 0 4px; color:var(--hcs-red); font-size:1.2rem; }
</style>
<style>
  .bwrap { max-width:1080px; margin:0 auto; padding:0 16px 64px; }
  .topbar { display:flex; align-items:center; gap:12px; background:var(--hcs-red); color:#fff; padding:12px 18px; }
  .topbar .logo { height:32px; background:#fff; border-radius:6px; padding:3px 5px; }
  .topbar .name { font-weight:800; }
  .topbar .who { margin-left:auto; font-size:.8rem; opacity:.92; display:flex; align-items:center; gap:8px; min-width:0; }
  .topbar .who span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  @media (max-width:520px){ .bwrap { padding:0 10px 48px; } .topbar { padding:10px 12px; } .editor { gap:12px; } }
  .adminchip { background:var(--hcs-gold); color:#3a2e00; font-size:.62rem; font-weight:800; padding:2px 7px; border-radius:999px; text-transform:uppercase; }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin:18px 0; flex-wrap:wrap; }
  .tab { padding:9px 14px; font-weight:600; font-size:.9rem; color:var(--muted); background:none; border:0; border-bottom:2px solid transparent; cursor:pointer; }
  .tab.on { color:var(--hcs-red); border-bottom-color:var(--hcs-red); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr)); gap:14px; }
  .fcard { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; display:flex; flex-direction:column; gap:10px; }
  .fcard h3 { margin:0; font-size:1.02rem; }
  .fcard .meta { font-size:.78rem; color:var(--muted); }
  .fcard .pills { display:flex; gap:6px; flex-wrap:wrap; }
  .fcard .acts { display:flex; gap:6px; flex-wrap:wrap; margin-top:auto; align-items:center; }
  .moremenu { position:relative; display:inline-block; }
  .moremenu > .btn { display:inline-flex; align-items:center; gap:5px; }
  .moremenu .menu { position:absolute; right:0; top:calc(100% + 4px); min-width:180px; background:var(--card); border:1px solid var(--line-strong); border-radius:10px; box-shadow:0 10px 26px rgba(0,0,0,.16); padding:5px; z-index:30; display:flex; flex-direction:column; gap:2px; }
  .moremenu .menu[hidden] { display:none; }
  .moremenu .menu button { display:flex; align-items:center; gap:9px; width:100%; text-align:left; background:none; border:0; border-radius:7px; padding:8px 10px; font:inherit; font-size:.85rem; cursor:pointer; color:var(--text); }
  .moremenu .menu button:hover { background:var(--panel); }
  .moremenu .menu button.danger { color:var(--hcs-red); }
  .moremenu .menu button.danger:hover { background:#fbeaea; }
  .btn.ghost.danger { color:var(--hcs-red); border-color:var(--hcs-red); background:none; }
  .btn.ghost.danger:hover { background:#fbeaea; }
  .editor { display:grid; grid-template-columns:1fr 300px; gap:18px; align-items:start; }
  @media (max-width:820px){ .editor { grid-template-columns:1fr; } }
  .palette { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .palette button { font-size:.8rem; padding:6px 10px; border:1px solid var(--line-strong); border-radius:999px; background:var(--card); cursor:pointer; }
  .palette button:hover { border-color:var(--hcs-red); color:var(--hcs-red); }
  .fieldcard { border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px; margin-bottom:10px; background:var(--panel); }
  .fieldcard { cursor:default; }
  .fieldcard .fchead { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .draghandle { cursor:grab; color:var(--muted); font-size:1.05rem; user-select:none; }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
  .toolbar input, .toolbar select { padding:8px 10px; border:1px solid var(--line-strong); border-radius:var(--radius-sm); font:inherit; }
  .toolbar input { flex:1; min-width:180px; }
  .fieldcard .ftype { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:800; background:#eef1f5; padding:2px 7px; border-radius:6px; }
  .fieldcard .fcacts { margin-left:auto; display:flex; gap:4px; }
  .fieldcard .fclabel { font-weight:600; font-size:.9rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:38%; }
  .fieldcard.collapsed .fcbody { display:none; }
  .col-chevron { transition:transform .15s ease; }
  .fieldcard.collapsed .col-chevron { transform:rotate(-90deg); }
  .iconbtn { display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line-strong); background:var(--card); border-radius:7px; width:30px; height:30px; cursor:pointer; font-size:.9rem; line-height:1; color:var(--muted); }
  .iconbtn:hover { border-color:var(--hcs-red); color:var(--hcs-red); }
  .frow { display:flex; gap:8px; flex-wrap:wrap; }
  .frow > * { flex:1; min-width:120px; }
  .side { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; position:sticky; top:12px; }
  .side h4 { margin:0 0 10px; font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .side label.lbl { display:block; font-size:.8rem; font-weight:600; margin:12px 0 4px; }
  .switchrow { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:10px 0; font-size:.9rem; }
  .toggle { position:relative; width:42px; height:24px; flex:none; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle .sl { position:absolute; inset:0; background:#cbd0d8; border-radius:999px; transition:.15s; }
  .toggle .sl:before { content:''; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s; }
  .toggle input:checked + .sl { background:var(--hcs-red); }
  .toggle input:checked + .sl:before { transform:translateX(18px); }
  .rtable { width:100%; border-collapse:collapse; font-size:.82rem; }
  .rtable th, .rtable td { border:1px solid var(--line); padding:6px 9px; text-align:left; vertical-align:top; }
  .rtable th { background:var(--panel); font-weight:700; position:sticky; top:0; }
  .adv { margin-top:8px; }
  .adv summary { font-size:.78rem; color:var(--muted); cursor:pointer; }
  .banner { background:var(--hcs-gold-soft); border:1px solid #ecd9a3; color:#6b5200; border-radius:var(--radius-sm); padding:10px 12px; font-size:.85rem; margin-bottom:14px; }
</style>

<script>
(function () {
  var app = document.getElementById('app');
  var ME = null;                // { email, isAdmin, name }
  var EDITING = null;           // { meta, schema, structureLocked }
  var TAB = 'mine';
  var FIELD_TYPES = [
    ['sectionHeader', 'Section'], ['description', 'Text block'], ['text', 'Short text'],
    ['textarea', 'Paragraph'], ['email', 'Email'], ['phone', 'Phone'], ['number', 'Number'],
    ['date', 'Date'], ['time', 'Time'], ['dropdown', 'Dropdown'], ['radio', 'Multiple choice'],
    ['checkboxes', 'Checkboxes'], ['yesno', 'Yes / No'], ['rating', 'Rating'],
    ['studentPicker', 'Student picker'], ['staffPicker', 'Staff / teacher picker'],
    ['file', 'File upload'], ['signature', 'Signature'],
    ['pageBreak', 'Page break'], ['calculation', 'Calculation']
  ];
  var OPTION_TYPES = { dropdown: 1, radio: 1, checkboxes: 1 };
  var DIRTY = false, SAVING = false, AUTOSAVE_T = null, DRAG_FROM = null;
  window.addEventListener('beforeunload', function (e) { if (DIRTY) { e.preventDefault(); e.returnValue = ''; } });
  var esc = FormsUI.esc;

  function call(fn, args) {
    return new Promise(function (resolve, reject) {
      var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
      runner[fn].apply(runner, args || []);
    });
  }
  function uid() { return 'fld_' + Math.random().toString(36).slice(2, 8); }

  // ---------- shell ----------
  function chrome(inner) {
    app.innerHTML =
      '<div class="topbar">' +
        '<img class="logo" src="' + HCS_LOGO + '" alt="HCS">' +
        '<span class="name">HCS Forms</span>' +
        '<span class="who">' + (ME ? esc(ME.email) + (ME.isAdmin ? ' <span class="adminchip">admin</span>' : '') : '') + '</span>' +
      '</div><div class="goldrule"></div><div class="bwrap">' + inner + '</div>';
  }

  boot();
  function boot() {
    chrome('<p class="help" style="padding:24px">Loading…</p>');
    call('whoAmI').then(function (me) {
      ME = me;
      var v = new URLSearchParams(location.search).get('view');
      if (v === 'approvals') TAB = 'approvals';
      renderDashboard();
    }).catch(function (e) { chrome('<div class="card card-pad"><h1 class="form-title">Access denied</h1><p class="form-desc">' + esc(String(e && e.message || e)) + '</p></div>'); });
  }

  // ---------- dashboard ----------
  function renderDashboard() {
    var tabs = '<div class="tabs">' +
      tabBtn('mine', 'My forms') + tabBtn('library', 'Template library') +
      (ME.isAdmin ? tabBtn('all', 'All forms') : '') + tabBtn('approvals', 'Approvals') + '</div>';
    var header = '<div style="display:flex;align-items:center;gap:10px;margin-top:18px">' +
      '<h1 class="form-title" style="margin:0">Forms</h1>' +
      '<div style="margin-left:auto;display:flex;gap:8px">' +
        '<button class="btn" id="newBlank">+ New form</button>' +
        '<button class="btn ghost" id="newTpl">From template</button>' +
        (ME.isAdmin ? '<button class="btn ghost" id="mngAdmins">Manage admins</button>' : '') +
      '</div></div>';
    chrome(header + tabs + '<div id="list"><p class="help">Loading…</p></div>');
    document.getElementById('newBlank').onclick = newBlank;
    document.getElementById('newTpl').onclick = function () { TAB = 'library'; renderDashboard(); };
    var ma = document.getElementById('mngAdmins'); if (ma) ma.onclick = manageAdmins;
    ['mine', 'library', 'all', 'approvals'].forEach(function (t) { var b = document.getElementById('tab_' + t); if (b) b.onclick = function () { TAB = t; renderDashboard(); }; });
    loadList();
  }
  function tabBtn(id, label) { return '<button class="tab ' + (TAB === id ? 'on' : '') + '" id="tab_' + id + '">' + esc(label) + '</button>'; }

  function loadList() {
    var host = function () { return document.getElementById('list'); };
    if (TAB === 'approvals') {
      call('getApprovalQueue').then(function (res) { renderApprovalQueue(res.items || []); }).catch(err);
    } else if (TAB === 'library') {
      call('listLibrary').then(function (items) { renderLibrary(items); }).catch(err);
    } else {
      call(TAB === 'all' ? 'listAllForms' : 'listMyForms').then(function (items) { renderForms(items); }).catch(err);
    }
    function err(e) { host().innerHTML = '<div class="notice err">' + esc(String(e && e.message || e)) + '</div>'; }
  }

  function renderApprovalQueue(items) {
    var host = document.getElementById('list');
    if (!items.length) { host.innerHTML = '<p class="help">Nothing is awaiting your approval right now. 🎉</p>'; return; }
    host.innerHTML = '<div class="grid">' + items.map(function (it) {
      return '<div class="fcard"><h3>' + esc(it.formTitle) + '</h3>' +
        '<div class="meta">from ' + esc(it.respondentEmail || '—') + ' · ' + esc(it.timestamp) + '</div>' +
        '<div class="help">' + esc(it.summary || '') + '</div>' +
        '<div class="acts"><button class="btn sm" data-ap="Approved" data-f="' + esc(it.formId) + '" data-s="' + esc(it.submissionId) + '">Approve</button>' +
        '<button class="btn ghost sm" data-ap="Rejected" data-f="' + esc(it.formId) + '" data-s="' + esc(it.submissionId) + '">Reject</button></div></div>';
    }).join('') + '</div>';
    document.querySelectorAll('[data-ap]').forEach(function (b) {
      b.onclick = function () { decide(b.getAttribute('data-ap'), b.getAttribute('data-f'), b.getAttribute('data-s')); };
    });
  }
  function decide(decision, formId, subId) {
    FormsUI.prompt(decision, { body: '<p class="help">Add a note for the requester (optional).</p>', placeholder: 'Note (optional)', okLabel: decision, multiline: true }).then(function (comment) {
      if (comment === null) return;
      call('decideApproval', [formId, subId, decision, comment]).then(function (res) {
        FormsUI.toast(res.ok ? ('Marked ' + res.status) : (res.message || 'Error'));
        loadList();
      }).catch(alertErr);
    });
  }

  function renderForms(items) {
    var host = document.getElementById('list');
    if (!items.length) { host.innerHTML = '<p class="help">No forms yet. Click “New form” to start.</p>'; return; }
    host.innerHTML =
      '<div class="toolbar"><input id="fSearch" type="search" placeholder="Search forms…" aria-label="Search forms">' +
        '<select id="fStatus" aria-label="Filter by status"><option value="">All statuses</option><option>draft</option><option>published</option><option>closed</option></select>' +
        '<select id="fSort" aria-label="Sort"><option value="updated">Recently updated</option><option value="title">Title A–Z</option><option value="responses">Most responses</option></select></div>' +
      '<div id="grid"></div>';
    var draw = function () {
      var q = (document.getElementById('fSearch').value || '').toLowerCase();
      var st = document.getElementById('fStatus').value;
      var sort = document.getElementById('fSort').value;
      var list = items.filter(function (m) {
        return (!q || String(m.title || '').toLowerCase().indexOf(q) > -1 || String(m.owner || '').toLowerCase().indexOf(q) > -1) && (!st || m.lifecycle === st);
      });
      if (sort === 'title') list.sort(function (a, b) { return String(a.title).localeCompare(String(b.title)); });
      else if (sort === 'responses') list.sort(function (a, b) { return (b.submissions || 0) - (a.submissions || 0); });
      document.getElementById('grid').innerHTML = list.length ? '<div class="grid">' + list.map(formCardHtml).join('') + '</div>' : '<p class="help">No forms match.</p>';
      wireCardButtons();
    };
    document.getElementById('fSearch').oninput = draw;
    document.getElementById('fStatus').onchange = draw;
    document.getElementById('fSort').onchange = draw;
    draw();
  }
  function formCardHtml(m) {
    var id = m.id;
    var canDel = ME.isAdmin || String(m.owner || '').toLowerCase() === ME.email.toLowerCase();
    var menu =
      menuItem('Duplicate', 'dup', id, 'dup') +
      menuItem('Save as template', 'tpl', id, 'dup') +
      (canDel ? menuItem('Delete', 'del', id, 'trash', 'danger') : '');
    return '<div class="fcard"><h3>' + esc(m.title || '(untitled)') + '</h3>' +
        '<div class="pills">' + statePills(m) + '</div>' +
        '<div class="meta">' + m.submissions + ' response' + (m.submissions === 1 ? '' : 's') +
          (TAB === 'all' ? ' · ' + esc(m.owner) : '') + '</div>' +
        '<div class="acts">' +
          btn('Edit', 'edit', id) + btn('Preview', 'preview', id, 'ghost') + btn('Responses', 'resp', id) + btn('Share', 'share', id, 'ghost') +
          '<div class="moremenu">' +
            '<button class="btn ghost sm" data-act="more" data-id="' + id + '" aria-haspopup="true" aria-expanded="false" title="More actions">' + FormsUI.icon('more') + ' More</button>' +
            '<div class="menu" id="menu_' + id + '" hidden>' + menu + '</div>' +
          '</div>' +
        '</div></div>';
  }
  function menuItem(label, act, id, iconName, cls) {
    return '<button class="' + (cls || '') + '" data-act="' + act + '" data-id="' + id + '">' + FormsUI.icon(iconName, { size: 15 }) + esc(label) + '</button>';
  }

  function renderLibrary(items) {
    var host = document.getElementById('list');
    if (!items.length) { host.innerHTML = '<p class="help">No templates yet.</p>'; return; }
    host.innerHTML = '<div class="grid">' + items.map(function (m) {
      var lock = m.layoutLock === 'useAsIs' ? '<span class="pill locked">use as-is</span>' : '<span class="pill draft">starter</span>';
      var scope = m.templateScope === 'shared' ? '<span class="pill staff">shared</span>' : '<span class="pill private">personal</span>';
      var canEdit = ME.isAdmin || m.owner.toLowerCase() === ME.email.toLowerCase();
      // Admin curation: publish/unpublish from the school-wide shared library.
      var curate = ME.isAdmin
        ? (m.templateScope === 'shared'
            ? btn('Unpublish', 'unpub', m.id, 'ghost')
            : btn('Make shared', 'pub', m.id, 'ghost'))
        : '';
      return '<div class="fcard"><h3>' + esc(m.title || '(untitled)') + '</h3>' +
        '<div class="pills">' + scope + lock + (m.category ? '<span class="pill draft">' + esc(m.category) + '</span>' : '') + '</div>' +
        '<div class="meta">by ' + esc(m.owner) + '</div>' +
        '<div class="acts">' + btn('Use this template', 'use', m.id) + btn('Preview', 'preview', m.id, 'ghost') +
          (canEdit ? btn('Edit', 'edit', m.id, 'ghost') : '') + curate +
          (canEdit
            ? '<button class="btn ghost danger sm" data-act="del" data-id="' + m.id + '" title="Delete template" style="display:inline-flex;align-items:center;gap:5px">' + FormsUI.icon('trash', { size: 15 }) + ' Delete</button>' : '') +
        '</div></div>';
    }).join('') + '</div>';
    wireCardButtons();
  }

  function statePills(m) {
    var p = '<span class="pill ' + m.lifecycle + '">' + m.lifecycle + '</span>' +
            '<span class="pill ' + m.access + '">' + accessLabel(m.access) + '</span>';
    if (m.locked) p += '<span class="pill locked">not accepting</span>';
    return p;
  }
  function accessLabel(a) { return a === 'staff' ? 'staff-only' : a; }
  function btn(label, act, id, cls) { return '<button class="btn ' + (cls || '') + ' sm" data-act="' + act + '" data-id="' + id + '">' + esc(label) + '</button>'; }

  function closeMenus() {
    document.querySelectorAll('.moremenu .menu').forEach(function (mn) { mn.setAttribute('hidden', 'hidden'); });
    document.querySelectorAll('[data-act="more"]').forEach(function (bb) { bb.setAttribute('aria-expanded', 'false'); });

  function wireCardButtons() {

    document.querySelectorAll('[data-act]').forEach(function (b) {
      b.onclick = function () {
        var id = b.getAttribute('data-id'), act = b.getAttribute('data-act');
        if (act === 'more') {
          var menu = document.getElementById('menu_' + id), wasHidden = menu && menu.hasAttribute('hidden');
          closeMenus();
          if (menu && wasHidden) { menu.removeAttribute('hidden'); b.setAttribute('aria-expanded', 'true'); }
          return;
        }
        closeMenus();
        if (act === 'edit') return openEditor(id);
        if (act === 'preview') return doPreview(id);

  // ---------- editor ----------
  function openEditor(formId) {
    chrome('<p class="help" style="padding:24px">Loading editor…</p>');
    call('loadFormForEdit', [formId]).then(function (res) {
      EDITING = { meta: res.meta, schema: normalizeSchema(res.schema), structureLocked: res.structureLocked, isAdmin: res.isAdmin };
      renderEditor();
    }).catch(function (e) { chrome('<div class="card card-pad"><p class="notice err">' + esc(String(e && e.message || e)) + '</p></div>'); });
  }
  function normalizeSchema(s) {
    s = s || {}; s.settings = s.settings || {}; s.pages = s.pages && s.pages.length ? s.pages : [{ title: 'Main', fields: [] }];
    s.pages[0].fields = s.pages[0].fields || [];
    return s;
  }
  function fields() { return EDITING.schema.pages[0].fields; }

  function renderEditor() {
    var locked = EDITING.structureLocked;
    var back = '<button class="btn ghost sm" id="back">← All forms</button>';
    var palette = locked ? '' : '<div class="palette">' + FIELD_TYPES.map(function (t) {

    var lockBanner = locked ? '<div class="banner">This form’s layout is locked (use as-is). You can change most settings, but its fields, access, and approval routing are locked to the HCS template. An admin can change them.</div>' : '';

    DIRTY = false; clearTimeout(AUTOSAVE_T);
    chrome(
      '<div style="display:flex;align-items:center;gap:10px;margin:16px 0">' + back +

      '<div class="editor" id="editorRoot"><div>' + lockBanner +
        '<div class="field"><label for="fTitle">Form title</label><input class="control" id="fTitle" value="' + esc(EDITING.schema.title || '') + '"' + (locked ? ' readonly' : '') + '></div>' +
        '<div class="field" style="margin-top:10px"><label for="fDesc">Description</label><textarea class="control" id="fDesc"' + (locked ? ' readonly' : '') + '>' + esc(EDITING.schema.description || '') + '</textarea></div>' +
        '<div class="divider"></div>' + palette +

      '</div>' + sidePanel() + '</div>');

    document.getElementById('back').onclick = function () {

    };
    if (!locked) {
      document.querySelectorAll('.palette button').forEach(function (b) { b.onclick = function () { addField(b.getAttribute('data-type')); }; });
      document.getElementById('fTitle').oninput = function () { EDITING.schema.title = this.value; };

  function renderCanvas() {
    var host = document.getElementById('canvas');
    var locked = EDITING.structureLocked;
    var fs = fields();
    if (!fs.length) { host.innerHTML = '<p class="help">No fields yet. Add one from the palette above' + (EDITING.structureLocked ? '' : '') + '.</p>'; return; }
    host.innerHTML = fs.map(function (f, i) { return fieldCard(f, i, locked); }).join('');
    if (locked) return;
    fs.forEach(function (f, i) {
      bindInput('lbl_' + f.id, function (v) { f.label = v; var lp = document.querySelector('.fieldcard[data-fid="' + f.id + '"] .fclabel'); if (lp) lp.textContent = v; });
      bindInput('help_' + f.id, function (v) { f.help = v; });
      var reqEl = document.getElementById('req_' + f.id); if (reqEl) reqEl.onchange = function () { f.required = this.checked; };
      var optEl = document.getElementById('opt_' + f.id); if (optEl) optEl.oninput = function () { f.options = this.value.split('\n').map(function (s) { return s.trim(); }).filter(Boolean); };

      var multEl = document.getElementById('mult_' + f.id); if (multEl) multEl.onchange = function () { f.multiple = this.checked; };

      var capEl = document.getElementById('cap_' + f.id); if (capEl) capEl.oninput = function () { f.capacity = parseCap(this.value); };
      var cif = document.getElementById('cif_' + f.id), cop = document.getElementById('cop_' + f.id), cval = document.getElementById('cval_' + f.id);
      var updCond = function () { if (!cif || !cif.value) { delete f.showIf; } else { f.showIf = { field: cif.value, op: cop.value, value: cval.value }; } };
      if (cif) cif.onchange = updCond; if (cop) cop.onchange = updCond; if (cval) cval.oninput = updCond;
      var calcop = document.getElementById('calcop_' + f.id), calcsrc = document.getElementById('calcsrc_' + f.id);
      var updCalc = function () { if (!f.calc) f.calc = { op: 'sum', fields: [] }; if (calcop) f.calc.op = calcop.value; if (calcsrc) f.calc.fields = Array.prototype.slice.call(calcsrc.querySelectorAll('input:checked')).map(function (i) { return i.value; }); };

      var rmaxEl = document.getElementById('rmax_' + f.id); if (rmaxEl) rmaxEl.oninput = function () { f.max = Number(this.value) || 5; };
      [['vmin_', 'min', 1], ['vmax_', 'max', 1], ['vminl_', 'minLen', 1], ['vmaxl_', 'maxLen', 1], ['vpat_', 'pattern', 0], ['vpmsg_', 'patternMsg', 0], ['vmind_', 'minDate', 0], ['vmaxd_', 'maxDate', 0], ['vnb_', 'notBefore', 0]].forEach(function (spec) {
        var el = document.getElementById(spec[0] + f.id); if (!el) return;
        var h = function () { if (!f.validation) f.validation = {}; f.validation[spec[1]] = spec[2] ? (this.value === '' ? null : Number(this.value)) : this.value; };
        if (el.tagName === 'SELECT') el.onchange = h; else el.oninput = h;
      });
      var colEl = document.getElementById('col_' + f.id);
      if (colEl) colEl.onclick = function () { var c = document.querySelector('.fieldcard[data-fid="' + f.id + '"]'); if (c) c.classList.toggle('collapsed'); };
      document.getElementById('up_' + f.id).onclick = function () { move(i, -1); markDirty(); };
      document.getElementById('dn_' + f.id).onclick = function () { move(i, 1); markDirty(); };
      document.getElementById('dup_' + f.id).onclick = function () { duplicateFieldAt(i); };
      document.getElementById('del_' + f.id).onclick = function () { deleteFieldAt(i); };
    });
    // drag-and-drop reorder (dragging from within an input is ignored)
    host.querySelectorAll('.fieldcard').forEach(function (card) {
      card.addEventListener('dragstart', function (e) {
        if (/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) { e.preventDefault(); return; }
        DRAG_FROM = Number(card.getAttribute('data-idx')); try { e.dataTransfer.effectAllowed = 'move'; } catch (x) {} card.style.opacity = '.45';
      });

      card.addEventListener('drop', function (e) {

        var to = Number(card.getAttribute('data-idx'));
        if (DRAG_FROM == null || DRAG_FROM === to) return;
        var fs2 = fields(); var moved = fs2.splice(DRAG_FROM, 1)[0]; fs2.splice(to, 0, moved);
        DRAG_FROM = null; renderCanvas(); markDirty();
      });
    });
  }

          '<input class="control" id="cval_' + f.id + '" value="' + esc((f.showIf && f.showIf.value) || '') + '" placeholder="value"></div></details>';
    }
    return '<div class="fieldcard" draggable="true" data-idx="' + i + '" data-fid="' + f.id + '"><div class="fchead">' +
      '<span class="draghandle" title="Drag to reorder" aria-hidden="true">' + FormsUI.icon('grip') + '</span>' +
      '<span class="ftype">' + esc(typeLabel) + '</span>' +
      '<span class="fclabel">' + esc(f.label || '') + '</span>' +
      '<div class="fcacts">' +
      '<button class="iconbtn" id="col_' + f.id + '" title="Collapse / expand" aria-label="Collapse or expand this field">' + FormsUI.icon('chevron', { cls: 'col-chevron' }) + '</button>' +
      '<button class="iconbtn" id="up_' + f.id + '" title="Move up" aria-label="Move up">' + FormsUI.icon('up') + '</button>' +
      '<button class="iconbtn" id="dn_' + f.id + '" title="Move down" aria-label="Move down">' + FormsUI.icon('down') + '</button>' +
      '<button class="iconbtn" id="dup_' + f.id + '" title="Duplicate field" aria-label="Duplicate field">' + FormsUI.icon('dup') + '</button>' +
      '<button class="iconbtn" id="del_' + f.id + '" title="Delete field" aria-label="Delete field">' + FormsUI.icon('trash') + '</button></div></div>' +
      '<div class="fcbody">' + body + '</div></div>';
  }
  function condFieldOpts(cur) {
    var sel = (cur.showIf && cur.showIf.field) || '';
    var opts = '<option value="">— always show —</option>';
    fields().forEach(function (f) {
      if (f.id === cur.id || f.type === 'sectionHeader' || f.type === 'description') return;
      opts += '<option value="' + f.id + '"' + (sel === f.id ? ' selected' : '') + '>' + esc(f.label || f.id) + '</option>';
    });
    return opts;
  }
  function condOpOpts(showIf) {
    var sel = (showIf && showIf.op) || 'equals';
    return [['equals', 'equals'], ['notEquals', 'does not equal'], ['contains', 'contains'], ['notEmpty', 'is not empty'], ['empty', 'is empty']]
      .map(function (o) { return '<option value="' + o[0] + '"' + (sel === o[0] ? ' selected' : '') + '>' + o[1] + '</option>'; }).join('');
  }
  function dateFieldOpts(cur, sel) {
    var o = '<option value="">— none —</option>';
    fields().forEach(function (f) { if (f.id === cur.id || f.type !== 'date') return; o += '<option value="' + f.id + '"' + (sel === f.id ? ' selected' : '') + '>' + esc(f.label || f.id) + '</option>'; });
    return o;
  }
  function valBlock(f) {
    var vr = f.validation || {}, inner = '';
    if (f.type === 'number') {
      inner = '<div class="frow"><input class="control" type="number" id="vmin_' + f.id + '" value="' + esc(vr.min != null ? vr.min : '') + '" placeholder="Min"><input class="control" type="number" id="vmax_' + f.id + '" value="' + esc(vr.max != null ? vr.max : '') + '" placeholder="Max"></div>';
    } else if (['text', 'textarea', 'email', 'phone'].indexOf(f.type) > -1) {
      inner = '<div class="frow"><input class="control" type="number" id="vminl_' + f.id + '" value="' + esc(vr.minLen || '') + '" placeholder="Min length"><input class="control" type="number" id="vmaxl_' + f.id + '" value="' + esc(vr.maxLen || '') + '" placeholder="Max length"></div>' +
        '<input class="control" id="vpat_' + f.id + '" value="' + esc(vr.pattern || '') + '" placeholder="Pattern (regex, optional)" style="margin-top:6px">' +
        '<input class="control" id="vpmsg_' + f.id + '" value="' + esc(vr.patternMsg || '') + '" placeholder="Message if pattern fails" style="margin-top:6px">';
    } else if (f.type === 'date') {
      inner = '<div class="frow"><input class="control" type="date" id="vmind_' + f.id + '" value="' + esc(vr.minDate || '') + '"><input class="control" type="date" id="vmaxd_' + f.id + '" value="' + esc(vr.maxDate || '') + '"></div>' +
        '<label class="lbl">Must be on/after another date field</label><select class="control" id="vnb_' + f.id + '">' + dateFieldOpts(f, vr.notBefore) + '</select>';
    } else { return ''; }
    return '<details class="adv"><summary>Validation</summary>' + inner + '</details>';
  }
  function capToText(cap) { cap = cap || {}; return Object.keys(cap).map(function (k) { return k + ' = ' + cap[k]; }).join('\n'); }
  function parseCap(text) {
    var m = {};
    String(text).split('\n').forEach(function (line) {
      var i = line.lastIndexOf('='); if (i < 0) return;
      var k = line.slice(0, i).trim(); var n = parseInt(line.slice(i + 1).trim(), 10);
      if (k && isFinite(n) && n >= 0) m[k] = n;
    });
    return m;
  }
  function sourceFieldChecks(cur) {
    var sel = (cur.calc && cur.calc.fields) || [];
    var eligible = fields().filter(function (f) {
      return f.id !== cur.id && ['number', 'checkboxes', 'radio', 'dropdown', 'studentPicker', 'staffPicker'].indexOf(f.type) > -1;
    });
    if (!eligible.length) return '<p class="help">Add number or choice fields first, then pick them here.</p>';
    return eligible.map(function (f) {
      return '<label class="choice" style="padding:6px 10px"><input type="checkbox" value="' + f.id + '"' + (sel.indexOf(f.id) > -1 ? ' checked' : '') + '><span>' + esc(f.label || f.id) + '</span></label>';
    }).join('');
  }
  function prefillOpts(sel) {
    return [['', '— none —'], ['parentFirst', 'Parent first name'], ['parentLast', 'Parent last name'],
      ['parentEmail', 'Parent email (locked)'], ['studentGrade', 'Student grade'], ['studentName', 'Student name']]
      .map(function (o) { return '<option value="' + o[0] + '"' + (sel === o[0] ? ' selected' : '') + '>' + o[1] + '</option>'; }).join('');
  }
  function bindInput(id, cb) { var el = document.getElementById(id); if (el) el.oninput = function () { cb(this.value); }; }
  function move(i, d) { var fs = fields(); var j = i + d; if (j < 0 || j >= fs.length) return; var t = fs[i]; fs[i] = fs[j]; fs[j] = t; renderCanvas(); }

  function addField(type) {
    var f = { id: uid(), type: type, label: '', required: false };
    if (OPTION_TYPES[type]) f.options = ['Option 1'];
    if (type === 'sectionHeader') f.label = 'Section title';
    if (type === 'calculation') f.calc = { op: 'sum', fields: [] };
    if (type === 'rating') f.max = 5;
    fields().push(f); renderCanvas(); markDirty();
    setTimeout(function () { var el = document.getElementById('lbl_' + f.id); if (el) el.focus(); }, 30);
  }

  function addParentBlock() {
    if (!confirm('Add the parent identity block?\n\nThis inserts First/Last name, a locked verified Email, and a student picker, and sets the form to Private (parents verify by email).')) return;
    var blk = [
      { id: uid(), type: 'sectionHeader', label: 'Parent / guardian' },
      { id: uid(), type: 'text', label: 'First name', required: true, prefillFrom: 'parentFirst' },
      { id: uid(), type: 'text', label: 'Last name', required: true, prefillFrom: 'parentLast' },
      { id: uid(), type: 'email', label: 'Your email', required: true, prefillFrom: 'parentEmail', help: 'Verified — the email you sign in with.' },
      { id: uid(), type: 'sectionHeader', label: 'Student' },
      { id: uid(), type: 'studentPicker', label: 'Which student?', required: true, help: 'Only your students are listed.' },
      { id: uid(), type: 'text', label: 'Grade', required: false, prefillFrom: 'studentGrade' }
    ];
    EDITING.schema.pages[0].fields = blk.concat(fields());
    EDITING.schema.settings.access = 'private';
    renderCanvas(); syncSideAccess();
    FormsUI.toast('Parent block added · access set to Private');
  }

  // ---------- side settings panel ----------
  function sidePanel() {
    var s = EDITING.schema.settings, m = EDITING.meta;
    var ap = s.approval || {};
    return '<div class="side"><h4>Settings</h4>' +
      '<label class="lbl">Access</label><select class="control" id="sAccess">' +
        opt('open', 'Open (anyone with link)', s.access) + opt('private', 'Private (FACTS email)', s.access) + opt('staff', 'Staff only (SSO)', s.access) + '</select>' +
      '<label class="lbl">Status</label><select class="control" id="sLife">' +
        opt('draft', 'Draft', s.lifecycle) + opt('published', 'Published', s.lifecycle) + opt('closed', 'Closed', s.lifecycle) + '</select>' +
      '<div class="switchrow"><span>Not accepting responses' + info('Temporarily closes the form to new submissions without unpublishing it — submitters see a friendly “not accepting responses” message.') + '</span><span class="toggle"><input type="checkbox" id="sLock"' + (s.locked ? ' checked' : '') + '><span class="sl"></span></span></div>' +
      '<div class="switchrow"><span>Review mode — send both emails to the submitter' + info('The email the submitter enters gets BOTH the confirmation (as the requester) and a copy of the owner notification (as the reviewer). Useful when one person builds and submits the form.') + '</span><span class="toggle"><input type="checkbox" id="sReview"' + (s.reviewMode ? ' checked' : '') + '><span class="sl"></span></span></div>' +
      '<div class="switchrow"><span>Limit to one response per person' + info('Blocks a second submission from the same email address (verified email for parent/staff forms, or the entered email on open forms).') + '</span><span class="toggle"><input type="checkbox" id="sOnce"' + (s.onePerEmail ? ' checked' : '') + '><span class="sl"></span></span></div>' +
      '<label class="lbl">Notify on submit (emails, comma-sep)</label><input class="control" id="sNotify" value="' + esc((s.notifyEmails || []).join(', ')) + '"><div id="sNotifyWarn" class="help" style="color:var(--hcs-red);display:none">Only @harfordchristian.org addresses are allowed — others are dropped when you save.</div>' +
      '<label class="lbl">Confirmation message</label><textarea class="control" id="sConfirm">' + esc(s.confirmationMessage || '') + '</textarea>' +
      '<div class="divider"></div><h4>Response record</h4>' +
      '<div class="switchrow"><span>Attach a PDF copy to the confirmation email' + info('The submitter’s receipt email includes a branded PDF of their answers. Great for signed permission slips, physicals, and KI forms. A copy is also saved in the form’s Uploads folder.') + '</span><span class="toggle"><input type="checkbox" id="sPdf"' + (s.pdfCopy ? ' checked' : '') + '><span class="sl"></span></span></div>' +
      '<div class="switchrow"><span>Let people edit or withdraw their response' + info('Adds a secure “Edit or withdraw” link to the receipt email. They can change answers or cancel while the response is still Submitted or Pending Approval — no login needed.') + '</span><span class="toggle"><input type="checkbox" id="sEdit"' + (s.allowEdit ? ' checked' : '') + '><span class="sl"></span></span></div>' +
      '<div class="divider"></div><h4>Scheduling &amp; limits</h4>' +
      '<label class="lbl">Opens (optional)</label><input class="control" id="sOpen" type="datetime-local" value="' + esc(s.openDate || '') + '">' +
      '<label class="lbl">Closes (optional)</label><input class="control" id="sClose" type="datetime-local" value="' + esc(s.closeDate || '') + '">' +
      '<label class="lbl">Max total responses (0 = unlimited)</label><input class="control" id="sMax" type="number" min="0" value="' + esc(s.maxResponses || 0) + '">' +
      '<div class="divider"></div><h4>Approvals</h4>' +
      '<div class="switchrow"><span>Require approval before it’s final' + info('Submissions land as “Pending Approval” and route to the approvers below. They approve/reject from the Approvals tab; the submitter is emailed the decision.') + '</span><span class="toggle"><input type="checkbox" id="aEn"' + (ap.enabled ? ' checked' : '') + '><span class="sl"></span></span></div>' +
      '<label class="lbl">Approvers (emails or group names, comma-sep)</label><input class="control" id="aWho" value="' + esc((ap.approvers || []).join(', ')) + '">' +
      '<label class="lbl">Require</label><select class="control" id="aMode">' + opt('any', 'Any one approver', ap.mode || 'any') + opt('all', 'All approvers', ap.mode || 'any') + '</select>' +
      '<div class="divider"></div>' +
      (EDITING.structureLocked ? '' : '<button class="btn gold block" id="btnParent" style="margin-bottom:8px;display:inline-flex;align-items:center;justify-content:center;gap:6px">' + FormsUI.icon('plus') + ' This form is for Parents</button>') +
      '<button class="btn block" id="btnSave">Save</button>' +
      '<button class="btn ghost block" id="btnPreview" style="margin-top:8px">Preview as submitter</button>' +
      '<button class="btn ghost block" id="btnShare" style="margin-top:8px">Get share link</button>' +
      '<button class="btn ghost block" id="btnResp" style="margin-top:8px">View responses</button>' +
      '<div class="divider"></div>' +
      '<button class="btn ghost danger block" id="btnDelete" style="display:inline-flex;align-items:center;justify-content:center;gap:6px">' + FormsUI.icon('trash') + ' Delete this form</button>' +
      '<p class="help" style="margin-top:6px">To simply stop accepting responses, set <strong>Status</strong> to Closed instead — the form and its data stay put.</p>' +
      '</div>';
  }
  function opt(v, label, sel) { return '<option value="' + v + '"' + (sel === v ? ' selected' : '') + '>' + esc(label) + '</option>'; }
  // Small hover/focus tooltip icon for settings — native title + accessible label.
  function info(text) { return ' <span class="infoicon" tabindex="0" role="img" title="' + esc(text) + '" aria-label="' + esc(text) + '">' + FormsUI.icon('info', { size: 14 }) + '</span>'; }
  function syncSideAccess() { var el = document.getElementById('sAccess'); if (el) el.value = EDITING.schema.settings.access; }

  function wireSide() {
    var s = EDITING.schema.settings;
    document.getElementById('sAccess').onchange = function () { s.access = this.value; };
    document.getElementById('sLife').onchange = function () { s.lifecycle = this.value; };
    document.getElementById('sLock').onchange = function () { s.locked = this.checked; };
    document.getElementById('sReview').onchange = function () { s.reviewMode = this.checked; };
    document.getElementById('sOnce').onchange = function () { s.onePerEmail = this.checked; };
    document.getElementById('sPdf').onchange = function () { s.pdfCopy = this.checked; };
    document.getElementById('sEdit').onchange = function () { s.allowEdit = this.checked; };
    document.getElementById('sOpen').onchange = function () { s.openDate = this.value; };
    document.getElementById('sClose').onchange = function () { s.closeDate = this.value; };
    document.getElementById('sMax').oninput = function () { s.maxResponses = Number(this.value) || 0; };
    if (!s.approval) s.approval = { enabled: false, approvers: [], mode: 'any' };
    document.getElementById('aEn').onchange = function () { s.approval.enabled = this.checked; };
    document.getElementById('aWho').oninput = function () { s.approval.approvers = this.value.split(',').map(function (x) { return x.trim(); }).filter(Boolean); };
    document.getElementById('aMode').onchange = function () { s.approval.mode = this.value; };
    document.getElementById('sNotify').oninput = function () {
      s.notifyEmails = this.value.split(',').map(function (x) { return x.trim(); }).filter(Boolean);
      var bad = s.notifyEmails.some(function (e) { return e.indexOf('@') > -1 && !/@harfordchristian\.org$/i.test(e); });
      var w = document.getElementById('sNotifyWarn'); if (w) w.style.display = bad ? 'block' : 'none';
    };
    // Use-as-is (layout-locked) forms freeze access + approval for non-admins.
    if (EDITING.structureLocked) {
      ['sAccess', 'aEn', 'aWho', 'aMode'].forEach(function (idd) { var el = document.getElementById(idd); if (el) el.disabled = true; });
    }
    document.getElementById('sConfirm').oninput = function () { s.confirmationMessage = this.value; };
    var bp = document.getElementById('btnParent'); if (bp) bp.onclick = addParentBlock;
    document.getElementById('btnSave').onclick = saveAll;
    document.getElementById('btnPreview').onclick = function () {
      // save current edits first so the preview reflects them, then open
      doSave(true).then(function () { doPreview(EDITING.meta.id); });
    };
    document.getElementById('btnShare').onclick = function () { doShare(EDITING.meta.id); };
    document.getElementById('btnResp').onclick = function () { openResponses(EDITING.meta.id); };
    var bd = document.getElementById('btnDelete'); if (bd) bd.onclick = function () { doDelete(EDITING.meta.id, function () { DIRTY = false; renderDashboard(); }); };
  }

  function stateFromSettings_(s) {
    return { lifecycle: s.lifecycle, access: s.access, locked: s.locked, reviewMode: !!s.reviewMode, onePerEmail: !!s.onePerEmail, pdfCopy: !!s.pdfCopy, allowEdit: !!s.allowEdit, openDate: s.openDate || '', closeDate: s.closeDate || '', maxResponses: Number(s.maxResponses) || 0, approval: s.approval || { enabled: false, approvers: [], mode: 'any' }, notifyEmails: s.notifyEmails, confirmationMessage: s.confirmationMessage };
  }
  function markDirty() { DIRTY = true; setDirtyDot(true); scheduleAutosave(); }
  function setDirtyDot(on) { var d = document.getElementById('saveState'); if (d) d.innerHTML = on ? '● Unsaved…' : FormsUI.icon('check', { size: 14 }) + ' Saved'; }
  function scheduleAutosave() { if (EDITING && EDITING.structureLocked) return; clearTimeout(AUTOSAVE_T); AUTOSAVE_T = setTimeout(function () { doSave(true); }, 1500); }
  /** Save schema + settings. silent=true for autosave (no toast, no button spinner). Returns a promise. */
  function doSave(silent) {
    if (!EDITING) return Promise.resolve();
    if (SAVING) { scheduleAutosave(); return Promise.resolve(); }
    SAVING = true;
    var s = EDITING.schema.settings;
    var btn = document.getElementById('btnSave');
    if (!silent && btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…'; }
    var save1 = EDITING.structureLocked ? Promise.resolve({ ok: true }) : call('saveForm', [EDITING.meta.id, EDITING.schema]);
    return save1
      .then(function () { return call('setFormState', [EDITING.meta.id, stateFromSettings_(s)]); })
      .then(function (res) {
        SAVING = false; DIRTY = false; setDirtyDot(false); if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
        if (res && res.droppedNotify && res.droppedNotify.length) {
          // off-domain notify addresses are never stored (parent/student PII stays in-house)
          var dropped = res.droppedNotify.map(function (x) { return String(x).toLowerCase(); });
          s.notifyEmails = (s.notifyEmails || []).filter(function (e) { return dropped.indexOf(String(e).toLowerCase()) < 0; });
          var nEl = document.getElementById('sNotify'); if (nEl) nEl.value = (s.notifyEmails || []).join(', ');
          FormsUI.toast('Removed non-HCS notify address: ' + res.droppedNotify.join(', '));
        } else if (!silent) FormsUI.toast('Saved');
      })
      .catch(function (e) {
        SAVING = false; if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
        var msg = String(e && e.message || e) === 'LAYOUT_LOCKED' ? 'This form’s layout is locked and can’t be changed.' : String(e && e.message || e);
        if (!silent) alert(msg);
      });
  }
  function saveAll() { return doSave(false); }

  // ---------- responses ----------
  function openResponses(formId) {
    chrome('<p class="help" style="padding:24px">Loading responses…</p>');
    call('getResponses', [formId, 100]).then(function (r) {
      var head = '<div style="display:flex;align-items:center;gap:10px;margin:16px 0">' +
        '<button class="btn ghost sm" id="back">← Back</button>' +
        '<h1 class="form-title" style="margin:0;font-size:1.2rem">Responses (' + r.count + ')</h1>' +
        '<button class="btn ghost sm" id="exportCsv" style="margin-left:auto">Export CSV</button>' +
        (r.sheetUrl ? '<a class="btn ghost sm" style="text-decoration:none" target="_blank" href="' + esc(r.sheetUrl) + '">Open Sheet ↗</a>' : '') + '</div>';
      var table = !r.rows.length ? '<p class="help">No responses yet.</p>' :
        '<div style="overflow:auto"><table class="rtable"><thead><tr>' +
          r.headers.map(function (h) { return '<th>' + esc(h) + '</th>'; }).join('') + '</tr></thead><tbody>' +
          r.rows.map(function (row) { return '<tr>' + row.map(function (c) { return '<td>' + esc(c) + '</td>'; }).join('') + '</tr>'; }).join('') +
          '</tbody></table></div>';
      chrome(head + table);
      document.getElementById('back').onclick = renderDashboard;
      var ex = document.getElementById('exportCsv');
      if (ex) ex.onclick = function () {
        call('exportResponsesCsv', [formId]).then(function (res) {
          var blob = new Blob([res.csv], { type: 'text/csv;charset=utf-8' });
          var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = res.filename; a.click();
          setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
        }).catch(alertErr);
      };
    }).catch(alertErr);
  }

  function alertErr(e) { alert(String(e && e.message || e)); }
})();
</script>
</body></html>
