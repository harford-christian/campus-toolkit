<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>HCS Lunch — Inventory Count</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --black:#0f0f0f; --white:#fafaf8; --ink:#1c1c1a; --muted:#767670;
      --border:#e2e2de; --surface:#f5f5f2;
      --green:#1a7a3c; --green-bg:#e8f5ed;
      --amber:#92600a; --amber-bg:#fef3dc;
      --red:#b82c2c;   --red-bg:#fdeaea;
      --orange:#c45a10; --orange-bg:#fef0e6;
      --blue:#1a4f8a;  --blue-bg:#e8f0fb;
      --pizza:#b84000; --pizza-bg:#fff3ee;
      --radius:12px; --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
    }
    body { font-family:var(--font); background:var(--surface); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased; }

    #loadingOverlay { position:fixed; inset:0; background:var(--surface); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:999; }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--black); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    header { background:var(--black); color:var(--white); padding:11px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:10px; }
    header h1 { font-size:15px; font-weight:600; letter-spacing:-0.2px; flex:1; }
    .date-chip { font-family:var(--mono); font-size:11px; background:rgba(255,255,255,0.12); padding:4px 9px; border-radius:20px; color:rgba(255,255,255,0.75); white-space:nowrap; }
    .btn-home-header { background:rgba(255,255,255,0.1); border:none; color:white; padding:6px 13px; border-radius:20px; font-family:var(--font); font-size:12px; cursor:pointer; white-space:nowrap; transition:background .15s; }
    .btn-home-header:hover { background:rgba(255,255,255,0.2); }

    #idleBanner { display:none; background:var(--amber-bg); border-bottom:1px solid #e0c070; padding:9px 20px; font-size:13px; color:var(--amber); font-weight:500; text-align:center; }
    #idleBanner.visible { display:block; }

    main { padding:14px 16px 88px; max-width:680px; margin:0 auto; }

    /* ── BUON GUSTO CARDS ── */
    .bg-section-header {
      display:flex; align-items:center; gap:10px;
      margin:4px 0 10px;
    }
    .bg-section-title { font-size:15px; font-weight:600; }
    .bg-day-badge {
      font-size:11px; font-weight:600; letter-spacing:.6px;
      background:var(--pizza-bg); color:var(--pizza);
      padding:2px 9px; border-radius:20px; border:1px solid #f5c4a8;
    }
    .bg-note {
      font-size:12px; color:var(--muted); margin-bottom:10px;
      padding:8px 12px; background:white; border-radius:8px;
      border:1px solid var(--border);
    }
    /* BG cards use the same .item-card style but with a warm left accent */
    .item-card.bg-card { border-left:3px solid var(--pizza); }

    /* ── EXPIRY STRIP ── */
    .expiry-strip { background:var(--red-bg); border:1px solid #f0b8b8; border-radius:var(--radius); padding:12px 14px; margin-bottom:14px; }
    .expiry-strip-title { font-size:12px; font-weight:600; color:var(--red); margin-bottom:8px; }
    .expiry-alert-item { display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:4px 0; border-bottom:1px solid rgba(184,44,44,0.1); }
    .expiry-alert-item:last-child { border-bottom:none; }
    .days-urgent { color:var(--red); font-family:var(--mono); font-size:12px; font-weight:500; }
    .days-warning { color:var(--orange); font-family:var(--mono); font-size:12px; font-weight:500; }

    /* ── CATEGORY HEADER ── */
    .category-header { display:flex; align-items:center; justify-content:space-between; padding-bottom:5px; border-bottom:1px solid var(--border); margin:18px 0 8px; }
    .cat-name { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    .cat-amount { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; width:195px; text-align:center; padding-right:65px; }

    /* ── ITEM CARD ── */
    .item-card { background:white; border:1px solid var(--border); border-radius:var(--radius); padding:11px 14px; margin-bottom:8px; display:flex; align-items:center; gap:8px; position:relative; }
    .item-card.low-stock      { border-left:3px solid var(--red); }
    .item-card.expiry-urgent  { border-left:3px solid var(--red); }
    .item-card.expiry-warning { border-left:3px solid var(--orange); }
    .confirmed-dot { position:absolute; top:8px; left:8px; width:8px; height:8px; border-radius:50%; background:var(--green); opacity:0; transition:opacity .2s; }
    .item-card.is-confirmed .confirmed-dot { opacity:1; }

    .item-info { flex:1; min-width:0; padding-left:4px; }
    .item-name { font-size:15px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-meta { font-size:12px; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

    .expiry-chip { font-size:11px; font-weight:500; font-family:var(--mono); padding:1px 6px; border-radius:4px; white-space:nowrap; }
    .chip-safe    { background:var(--green-bg);  color:var(--green); }
    .chip-warning { background:var(--amber-bg);  color:var(--amber); }
    .chip-urgent  { background:var(--orange-bg); color:var(--orange); }
    .chip-expired { background:var(--red-bg);    color:var(--red); }

    .btn-batches { font-size:11px; color:var(--blue); background:transparent; border:none; cursor:pointer; padding:0; font-family:var(--font); white-space:nowrap; text-decoration:underline; text-underline-offset:2px; }
    .batch-drawer { display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
    .batch-drawer.open { display:block; }
    .batch-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:4px 0; border-bottom:1px solid var(--border); }
    .batch-row:last-child { border-bottom:none; }
    .batch-row-left { color:var(--muted); }
    .batch-row-right { font-family:var(--mono); display:flex; align-items:center; gap:6px; }

    /* ── STEPPER ── */
    .item-right { display:flex; align-items:center; gap:5px; flex-shrink:0; }
    .stepper-btn { width:34px; height:34px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink); user-select:none; -webkit-user-select:none; transition:background .1s; flex-shrink:0; }
    .stepper-btn:active { background:var(--border); }
    .stepper-qty { font-family:var(--mono); font-size:22px; font-weight:500; width:52px; text-align:center; flex-shrink:0; border:none; background:transparent; color:var(--ink); -moz-appearance:textfield; outline:none; border-bottom:2px solid transparent; transition:border-color .15s; padding:2px 0; cursor:pointer; }
    .stepper-qty::-webkit-outer-spin-button, .stepper-qty::-webkit-inner-spin-button { -webkit-appearance:none; }
    .stepper-qty:focus { border-bottom-color:var(--black); background:var(--surface); border-radius:4px; cursor:text; }

    .btn-ok { background:var(--black); color:white; border:none; border-radius:8px; padding:8px 14px; font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; margin-left:3px; transition:background .15s; }
    .btn-ok:active { opacity:.75; }
    .btn-ok.confirmed { background:var(--green); }

    /* ── BOTTOM BAR ── */
    .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:10px; z-index:50; }
    .progress-track { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--black); border-radius:3px; transition:width .35s ease; }
    .progress-label { font-family:var(--mono); font-size:12px; color:var(--muted); white-space:nowrap; }
    .btn-exit { border:none; border-radius:8px; padding:9px 16px; font-family:var(--font); font-size:13px; font-weight:600; white-space:nowrap; flex-shrink:0; cursor:pointer; transition:background .2s, color .2s; }
    .btn-exit.state-exit { background:var(--surface); color:var(--muted); border:1.5px solid var(--border); }
    .btn-exit.state-exit:active { background:var(--border); }
    .btn-exit.state-save { background:var(--black); color:white; }
    .btn-exit.state-save:active { opacity:.8; }

    /* ── MODAL ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:flex; align-items:flex-end; justify-content:center; z-index:200; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-sheet { background:white; border-radius:20px 20px 0 0; width:100%; max-width:500px; padding:0 0 36px; transform:translateY(100%); transition:transform .3s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-overlay.open .modal-sheet { transform:translateY(0); }
    .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:14px auto 0; }
    .modal-body { padding:20px 22px; }
    .modal-title { font-size:17px; font-weight:600; margin-bottom:6px; }
    .modal-sub { font-size:14px; color:var(--muted); margin-bottom:16px; line-height:1.5; }
    .unsaved-list { background:var(--amber-bg); border-radius:8px; padding:10px 14px; margin-bottom:18px; }
    .unsaved-item { font-size:13px; color:var(--amber); padding:3px 0; display:flex; align-items:center; gap:6px; }
    .unsaved-item::before { content:'↳'; }
    .modal-actions { display:flex; flex-direction:column; gap:8px; }
    .btn-modal-primary { width:100%; background:var(--black); color:white; border:none; border-radius:10px; padding:14px; font-family:var(--font); font-size:15px; font-weight:600; cursor:pointer; }
    .btn-modal-primary:active { opacity:.8; }
    .btn-modal-secondary { width:100%; background:transparent; border:1.5px solid var(--border); border-radius:10px; padding:13px; font-family:var(--font); font-size:15px; color:var(--muted); cursor:pointer; }
    .btn-modal-secondary:active { background:var(--surface); }
  </style>
<!-- ===== Showcase demo shim (standalone build) ===== -->
<link rel="stylesheet" href="../../assets/demo-banner.css">
<script>window.DEMO_META = { name: "Lunch Inventory — Count Kiosk" };</script>
<script src="../../assets/gsr-shim.js"></script>
<script src="data.js"></script>
<script src="mock.js"></script>
<script src="../../assets/demo-banner.js" defer></script>
</head>
<body>

  <div id="loadingOverlay"><div class="spinner"></div><p>Loading inventory...</p></div>

  <header>
    <h1>🍱 HCS Lunch — Inventory Count</h1>
    <span class="date-chip" id="headerDate">—</span>
    <button class="btn-home-header" onclick="requestHome()">⌂ Home</button>
  </header>

  <div id="idleBanner">Returning to home screen in <span id="idleCountdown">60</span> seconds due to inactivity…</div>

  <main id="mainContent"></main>

  <div class="bottom-bar">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
    <button class="btn-exit state-exit" id="exitBtn" onclick="handleExit()">Exit</button>
  </div>

  <div class="modal-overlay" id="warnModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-body">
        <div class="modal-title" id="warnTitle">Unsaved changes</div>
        <div class="modal-sub" id="warnSub"></div>
        <div class="unsaved-list" id="warnList" style="display:none"></div>
        <div class="modal-actions">
          <button class="btn-modal-primary" onclick="closeWarnModal()">Go back &amp; finish</button>
          <button class="btn-modal-secondary" id="warnProceedBtn">Leave anyway</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── IN-APP DIALOGS ──────────────────────────────────────────────────────────
    // Promise-based replacements for native alert()/confirm()/prompt(). Native
    // dialogs in an Apps Script web app carry a browser banner ("An embedded page
    // at …googleusercontent.com says"); these in-page modals don't. They reuse this
    // page's existing .modal-* bottom-sheet styling, so there's no new CSS.
    // Shared drop-in block — keep identical across pages.
    //   await appConfirm(msg, {title, okLabel, cancelLabel, danger}) -> true/false
    //   await appPrompt(msg,  {title, okLabel, cancelLabel, defaultValue}) -> string|null
    //   await appAlert(msg,   {title, okLabel}) -> undefined
    function _dlgEsc(s){ var d = document.createElement('div'); d.textContent = (s == null ? '' : String(s)); return d.innerHTML; }
    function _dlg(opts){
      return new Promise(function(resolve){
        var ov = document.createElement('div');
        ov.className = 'modal-overlay';
        var msg = _dlgEsc(opts.message).replace(/\n/g, '<br>');
        var inputHtml = opts.prompt
          ? '<input type="text" id="_dlgInput" value="' + _dlgEsc(opts.defaultValue || '') + '" ' +
            'style="width:100%;border:1px solid var(--border);border-radius:7px;padding:10px 12px;' +
            'font-family:var(--font);font-size:15px;background:white;color:var(--ink);margin-bottom:20px">'
          : '';
        ov.innerHTML =
          '<div class="modal-sheet" role="dialog" aria-modal="true">' +
            '<div class="modal-handle"></div>' +
            '<div class="modal-body">' +
              (opts.title ? '<div class="modal-title">' + _dlgEsc(opts.title) + '</div>' : '') +
              '<div class="modal-sub">' + msg + '</div>' +
              inputHtml +
              '<div class="modal-actions">' +
                '<button class="btn-modal-primary" id="_dlgOk">' + _dlgEsc(opts.okLabel || 'OK') + '</button>' +
                (opts.showCancel ? '<button class="btn-modal-secondary" id="_dlgCancel">' + _dlgEsc(opts.cancelLabel || 'Cancel') + '</button>' : '') +
              '</div>' +
            '</div>' +
          '</div>';
        document.body.appendChild(ov);
        var input  = ov.querySelector('#_dlgInput');
        var okBtn  = ov.querySelector('#_dlgOk');
        var cancel = ov.querySelector('#_dlgCancel');
        if (opts.danger) okBtn.style.background = 'var(--red)';
        void ov.offsetWidth;             // force reflow so the slide-up transition runs
        ov.classList.add('open');
        var done = false;
        function close(val){
          if (done) return; done = true;
          ov.classList.remove('open');
          setTimeout(function(){ ov.remove(); }, 300);   // let the slide-down finish
          resolve(val);
        }
        okBtn.onclick = function(){ close(opts.prompt ? (input ? input.value : '') : true); };
        if (cancel) cancel.onclick = function(){ close(opts.prompt ? null : false); };
        ov.addEventListener('click', function(e){ if (e.target === ov) close(opts.prompt ? null : (opts.showCancel ? false : true)); });
        ov.addEventListener('keydown', function(e){
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); okBtn.click(); }
          else if (e.key === 'Escape') { e.preventDefault(); (cancel || okBtn).click(); }
        });
        setTimeout(function(){ (input || okBtn).focus(); }, 60);
      });
    }
    function appAlert(message, opts){ opts = opts || {}; return _dlg({ title:opts.title, message:message, okLabel:opts.okLabel || 'OK', showCancel:false }); }
    function appConfirm(message, opts){ opts = opts || {}; return _dlg({ title:opts.title, message:message, okLabel:opts.okLabel || 'OK', cancelLabel:opts.cancelLabel || 'Cancel', showCancel:true, danger:opts.danger }); }
    function appPrompt(message, opts){ opts = opts || {}; return _dlg({ title:opts.title, message:message, okLabel:opts.okLabel || 'OK', cancelLabel:opts.cancelLabel || 'Cancel', showCancel:true, prompt:true, defaultValue:opts.defaultValue || '' }); }

    const BASE_URL = '';
    function navigateHome(idle) {
      const url = BASE_URL + 'home.html' + (idle ? '&idle=1' : '');
      try { window.location.href = url; } catch(e) { window.location.href = url; }
    }

    let appData      = null;
    let confirmedIds = new Set();  // pseudo-IDs that have been OK'd this session
    let changedIds   = new Set();  // pseudo-IDs changed but not OK'd
    let originalQtys = {};         // itemId → original qty (or BG value) on load
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    // Virtual IDs for the two Buon Gusto fields — treated exactly like item IDs
    const BG_RECV = 'BG_RECEIVED';
    const BG_SOLD = 'BG_SOLD';

    // ── IDLE TIMER ────────────────────────────────────────────────────────────
    const IDLE_TIMEOUT = 5 * 60 * 1000;
    const IDLE_WARN_AT = 4 * 60 * 1000;
    let idleTimer = null, warnTimer = null, countdownTimer = null, countdownSeconds = 60;

    function resetIdle() {
      clearTimeout(idleTimer); clearTimeout(warnTimer); clearInterval(countdownTimer);
      document.getElementById('idleBanner').classList.remove('visible');
      countdownSeconds = 60;
      warnTimer = setTimeout(() => {
        document.getElementById('idleBanner').classList.add('visible');
        countdownSeconds = 60;
        document.getElementById('idleCountdown').textContent = 60;
        countdownTimer = setInterval(() => {
          countdownSeconds--;
          document.getElementById('idleCountdown').textContent = countdownSeconds;
          if (countdownSeconds <= 0) clearInterval(countdownTimer);
        }, 1000);
      }, IDLE_WARN_AT);
      idleTimer = setTimeout(() => {
        clearInterval(countdownTimer);
        navigateHome(true);
      }, IDLE_TIMEOUT);
    }
    ['touchstart','click','keydown'].forEach(e => document.addEventListener(e, resetIdle, { passive:true }));

    // ── BOOT ──────────────────────────────────────────────────────────────────
    window.onload = () => {
      google.script.run
        .withSuccessHandler(boot)
        .withFailureHandler(err => {
          document.getElementById('loadingOverlay').innerHTML =
            '<p style="color:#b82c2c;padding:20px">Error: ' + err.message + '</p>';
        })
        .getLunchData();
    };

    function boot(data) {
      appData = data;
      data.items.forEach(i => { originalQtys[i.id] = i.qty; });
      // Snapshot BG values from today's log (0 if not yet logged)
      const bg = data.bgLog || {};
      originalQtys[BG_RECV] = bg.received || 0;
      originalQtys[BG_SOLD] = bg.sold     || 0;
      const today = new Date(data.serverTime);
      document.getElementById('headerDate').textContent =
        DAYS[today.getDay()] + ', ' + today.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      renderAll();
      document.getElementById('loadingOverlay').style.display = 'none';
      resetIdle();
    }

    // ── RENDER ────────────────────────────────────────────────────────────────
    function renderAll() {
      const today    = new Date(appData.serverTime);
      const todayDay = today.getDay();
      const isBGDay  = (todayDay === 2 || todayDay === 4);
      let html = '';

      // ── BUON GUSTO — two item-style cards, Tue/Thu only ──
      if (isBGDay) {
        const bg     = appData.bgLog || {};
        const recVal = bg.received || 0;
        const solVal = bg.sold     || 0;
        const recConfirmed = confirmedIds.has(BG_RECV);
        const solConfirmed = confirmedIds.has(BG_SOLD);

        html += `
        <div class="bg-section-header">
          <span class="bg-section-title">Buon Gusto Pizza</span>
          <span class="bg-day-badge">${DAYS[todayDay].toUpperCase()}</span>
        </div>
        <div class="bg-note">Hot delivery — no carryover. Log slices received in the morning, slices sold at end of lunch.</div>

        <div class="category-header" style="margin-top:4px">
          <span class="cat-name">Buon Gusto</span>
          <span class="cat-amount">Amount</span>
        </div>

        <div class="item-card bg-card ${recConfirmed ? 'is-confirmed' : ''}" id="card-${BG_RECV}">
          <div class="confirmed-dot"></div>
          <div class="item-info">
            <div class="item-name">Slices Received</div>
            <div class="item-meta"><span>Log when delivery arrives</span></div>
          </div>
          <div class="item-right">
            <button class="stepper-btn" onclick="stepBg('${BG_RECV}',-1)">−</button>
            <input type="number" class="stepper-qty" id="qty-${BG_RECV}"
              value="${recVal}" min="0" inputmode="numeric"
              onchange="handleBgInput('${BG_RECV}',this)" onfocus="this.select()">
            <button class="stepper-btn" onclick="stepBg('${BG_RECV}',1)">+</button>
            <button class="btn-ok ${recConfirmed ? 'confirmed' : ''}" id="okbtn-${BG_RECV}"
              onclick="confirmBg('${BG_RECV}')">OK</button>
          </div>
        </div>

        <div class="item-card bg-card ${solConfirmed ? 'is-confirmed' : ''}" id="card-${BG_SOLD}">
          <div class="confirmed-dot"></div>
          <div class="item-info">
            <div class="item-name">Slices Sold</div>
            <div class="item-meta"><span>Log at end of lunch service</span></div>
          </div>
          <div class="item-right">
            <button class="stepper-btn" onclick="stepBg('${BG_SOLD}',-1)">−</button>
            <input type="number" class="stepper-qty" id="qty-${BG_SOLD}"
              value="${solVal}" min="0" inputmode="numeric"
              onchange="handleBgInput('${BG_SOLD}',this)" onfocus="this.select()">
            <button class="stepper-btn" onclick="stepBg('${BG_SOLD}',1)">+</button>
            <button class="btn-ok ${solConfirmed ? 'confirmed' : ''}" id="okbtn-${BG_SOLD}"
              onclick="confirmBg('${BG_SOLD}')">OK</button>
          </div>
        </div>`;
      }

      // ── EXPIRY ALERTS ──
      const urgent = appData.items.filter(i =>
        !i.isBuonGusto && i.trackExpiry &&
        i.daysUntilExpiry !== null && i.daysUntilExpiry <= appData.config.EXPIRY_URGENT_DAYS);
      if (urgent.length) {
        html += `<div class="expiry-strip"><div class="expiry-strip-title">⚠ Expiring very soon — use first</div>`;
        urgent.forEach(i => {
          const lbl = i.daysUntilExpiry <= 0 ? 'EXPIRED'
            : i.daysUntilExpiry === 1 ? 'expires tomorrow'
            : 'expires in ' + i.daysUntilExpiry + ' days';
          html += `<div class="expiry-alert-item"><span>${i.name}</span>
            <span class="${i.daysUntilExpiry<=0?'days-urgent':'days-warning'}">${lbl}</span></div>`;
        });
        html += `</div>`;
      }

      // ── REGULAR ITEMS ──
      const items = appData.items.filter(i => !i.isBuonGusto);
      const cats  = [...new Set(items.map(i => i.category))];
      cats.forEach(cat => {
        html += `<div class="category-header">
          <span class="cat-name">${cat}</span>
          <span class="cat-amount">Amount</span>
        </div>`;
        items.filter(i => i.category === cat).forEach(item => { html += renderCard(item); });
      });

      document.getElementById('mainContent').innerHTML = html;
      updateExitBtn();
    }

    function renderCard(item) {
      const isLow       = item.qty <= item.minLevel;
      const isConfirmed = confirmedIds.has(item.id);
      let expiryHtml = '', cardClass = '';

      if (item.trackExpiry && item.daysUntilExpiry !== null) {
        let cc = 'chip-safe', ct = item.expiryStr || '';
        if      (item.daysUntilExpiry <= 0)                                  { cc='chip-expired'; ct='EXPIRED';              cardClass='expiry-urgent'; }
        else if (item.daysUntilExpiry <= appData.config.EXPIRY_URGENT_DAYS)  { cc='chip-urgent';  ct=item.daysUntilExpiry+'d'; cardClass='expiry-urgent'; }
        else if (item.daysUntilExpiry <= appData.config.EXPIRY_WARNING_DAYS) { cc='chip-warning'; ct=item.daysUntilExpiry+'d'; cardClass='expiry-warning'; }
        expiryHtml = `<span class="expiry-chip ${cc}">${ct}</span>`;
      } else if (item.trackExpiry && !item.expiryStr) {
        expiryHtml = `<span class="expiry-chip chip-warning">No date set</span>`;
      }
      if (isLow && !cardClass) cardClass = 'low-stock';

      let batchHtml = '';
      if (item.batches && item.batches.length > 0) {
        const batchRows = item.batches.map(b => {
          let bc='chip-safe', bt=b.expiryStr||'No date';
          if (!b.expiryStr)                                               { bc='chip-warning'; }
          else if (b.daysUntilExpiry<=0)                                  { bc='chip-expired'; bt='EXPIRED'; }
          else if (b.daysUntilExpiry<=appData.config.EXPIRY_URGENT_DAYS)  { bc='chip-urgent';  bt=b.daysUntilExpiry+'d'; }
          else if (b.daysUntilExpiry<=appData.config.EXPIRY_WARNING_DAYS) { bc='chip-warning'; bt=b.daysUntilExpiry+'d'; }
          return `<div class="batch-row">
            <span class="batch-row-left">Received ${b.receivedStr}</span>
            <span class="batch-row-right">${b.qtyRemaining} remaining <span class="expiry-chip ${bc}">${bt}</span></span>
          </div>`;
        }).join('');
        const label = item.batches.length > 1
          ? item.batches.length + ' shipment batches'
          : '1 batch · exp ' + (item.batches[0].expiryStr || 'unknown');
        batchHtml = `
          <button class="btn-batches" onclick="toggleBatches('${item.id}')">▸ ${label}</button>
          <div class="batch-drawer" id="batches-${item.id}">${batchRows}</div>`;
      }

      return `
      <div class="item-card ${cardClass} ${isConfirmed?'is-confirmed':''}" id="card-${item.id}">
        <div class="confirmed-dot"></div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">
            <span>$${parseFloat(item.price).toFixed(2)}</span>
            ${isLow ? '<span style="color:var(--red);font-weight:600">LOW STOCK</span>' : ''}
            ${expiryHtml}
          </div>
          ${batchHtml}
        </div>
        <div class="item-right">
          <button class="stepper-btn" onclick="stepQty('${item.id}',-1)">−</button>
          <input type="number" class="stepper-qty" id="qty-${item.id}"
            value="${item.qty}" min="0" inputmode="numeric"
            onchange="handleQtyInput('${item.id}',this)" onfocus="this.select()">
          <button class="stepper-btn" onclick="stepQty('${item.id}',1)">+</button>
          <button class="btn-ok ${isConfirmed?'confirmed':''}" id="okbtn-${item.id}"
            onclick="confirmOk('${item.id}')">OK</button>
        </div>
      </div>`;
    }

    function toggleBatches(itemId) {
      const drawer = document.getElementById('batches-' + itemId);
      const btn    = drawer ? drawer.previousElementSibling : null;
      if (!drawer) return;
      const isOpen = drawer.classList.toggle('open');
      if (btn) btn.textContent = btn.textContent.replace(isOpen?'▸':'▾', isOpen?'▾':'▸');
    }

    // ── BUON GUSTO STEPPERS & CONFIRM ────────────────────────────────────────
    // BG fields use virtual IDs (BG_RECEIVED / BG_SOLD).
    // They plug into the same confirmedIds/changedIds/updateExitBtn machinery.

    function stepBg(bgId, delta) {
      const input = document.getElementById('qty-' + bgId);
      const cur   = parseInt(input.value) || 0;
      input.value = Math.max(0, cur + delta);
      markBgChanged(bgId);
    }

    function handleBgInput(bgId, inputEl) {
      inputEl.value = Math.max(0, parseInt(inputEl.value) || 0);
      markBgChanged(bgId);
    }

    function markBgChanged(bgId) {
      const input = document.getElementById('qty-' + bgId);
      const cur   = parseInt(input.value) || 0;
      if (cur !== originalQtys[bgId]) {
        changedIds.add(bgId);
      } else {
        changedIds.delete(bgId);
      }
      if (confirmedIds.has(bgId)) {
        confirmedIds.delete(bgId);
        const card = document.getElementById('card-' + bgId);
        if (card) card.classList.remove('is-confirmed');
        const btn = document.getElementById('okbtn-' + bgId);
        if (btn) btn.classList.remove('confirmed');
      }
      updateExitBtn();
    }

    function confirmBg(bgId) {
      const input = document.getElementById('qty-' + bgId);
      const val   = Math.max(0, parseInt(input.value) || 0);
      input.value = val;
      changedIds.delete(bgId);
      confirmedIds.add(bgId);
      const card = document.getElementById('card-' + bgId);
      if (card) card.classList.add('is-confirmed');
      const btn = document.getElementById('okbtn-' + bgId);
      if (btn) btn.classList.add('confirmed');
      updateExitBtn();

      // Read both current values and save the whole BG log in one call
      const recVal = parseInt(document.getElementById('qty-' + BG_RECV)?.value) || 0;
      const solVal = parseInt(document.getElementById('qty-' + BG_SOLD)?.value) || 0;
      google.script.run
        .withFailureHandler(err => console.warn('BG sync failed:', err))
        .logBuonGusto({ date: appData.todayStr, slicesReceived: recVal, slicesSold: solVal });
    }

    // ── REGULAR ITEM STEPPER ─────────────────────────────────────────────────
    async function stepQty(itemId, delta) {
      const item  = appData.items.find(i => i.id === itemId);
      if (!item) return;
      const input    = document.getElementById('qty-' + itemId);
      const proposed = Math.max(0, item.qty + delta);
      if (delta < 0 && item.qty >= 10 && Math.abs(delta) / item.qty > 0.3) {
        if (!(await appConfirm('Reducing ' + item.name + ' from ' + item.qty + ' to ' + proposed + '. Is that right?',
              { title: 'Confirm reduction', okLabel: "Yes, that's right", cancelLabel: 'Cancel' }))) return;
      }
      item.qty = proposed;
      input.value = proposed;
      markChanged(itemId);
    }

    async function handleQtyInput(itemId, inputEl) {
      const item = appData.items.find(i => i.id === itemId);
      if (!item) return;
      const proposed = Math.max(0, parseInt(inputEl.value) || 0);
      if (item.qty >= 10 && (item.qty - proposed) > item.qty * 0.3 && proposed < item.qty) {
        if (!(await appConfirm('Changing ' + item.name + ' from ' + item.qty + ' to ' + proposed + '. Is that right?',
              { title: 'Confirm big change', okLabel: "Yes, that's right", cancelLabel: 'Cancel' }))) {
          inputEl.value = item.qty; return;
        }
      }
      item.qty = proposed;
      inputEl.value = proposed;
      markChanged(itemId);
    }

    function markChanged(itemId) {
      const item = appData.items.find(i => i.id === itemId);
      if (item && item.qty !== originalQtys[itemId]) {
        changedIds.add(itemId);
      } else {
        changedIds.delete(itemId);
      }
      if (confirmedIds.has(itemId)) {
        confirmedIds.delete(itemId);
        const card = document.getElementById('card-' + itemId);
        if (card) card.classList.remove('is-confirmed');
        const btn = document.getElementById('okbtn-' + itemId);
        if (btn) btn.classList.remove('confirmed');
      }
      updateExitBtn();
    }

    function confirmOk(itemId) {
      const item = appData.items.find(i => i.id === itemId);
      if (!item) return;
      const inputEl = document.getElementById('qty-' + itemId);
      if (inputEl) { item.qty = Math.max(0, parseInt(inputEl.value)||0); inputEl.value = item.qty; }
      changedIds.delete(itemId);
      confirmedIds.add(itemId);
      const card = document.getElementById('card-' + itemId);
      if (card) card.classList.add('is-confirmed');
      const btn = document.getElementById('okbtn-' + itemId);
      if (btn) btn.classList.add('confirmed');
      updateExitBtn();
      google.script.run
        .withFailureHandler(err => console.warn('Sync failed:', err))
        .processLunchAction({ itemId, newQty: item.qty, changeAmount: 0, actionType: 'Count', notes: '' });
    }

    // ── EXIT / SAVE & EXIT LOGIC ──────────────────────────────────────────────
    function updateExitBtn() {
      const btn = document.getElementById('exitBtn');
      // Progress counts ALL confirmable things — regular items + BG fields on BG days
      const today    = new Date(appData.serverTime);
      const isBGDay  = (today.getDay() === 2 || today.getDay() === 4);
      const bgCount  = isBGDay ? 2 : 0;
      const total    = appData.items.filter(i => !i.isBuonGusto).length + bgCount;
      const done     = confirmedIds.size;

      document.getElementById('progressFill').style.width = total > 0 ? (done / total * 100) + '%' : '0%';
      document.getElementById('progressLabel').textContent = done + ' / ' + total;

      const hasConfirmed = confirmedIds.size > 0;
      const hasUnsaved   = changedIds.size  > 0;

      if (!hasConfirmed && !hasUnsaved) {
        btn.textContent = 'Exit'; btn.className = 'btn-exit state-exit';
      } else if (hasConfirmed && !hasUnsaved) {
        btn.textContent = 'Save & Exit'; btn.className = 'btn-exit state-save';
      } else {
        btn.textContent = hasConfirmed ? 'Save & Exit' : 'Exit';
        btn.className = 'btn-exit ' + (hasConfirmed ? 'state-save' : 'state-exit');
      }
    }

    function handleExit() {
      if (changedIds.size > 0) {
        showWarnModal('Changed but not confirmed', () => navigateHome(false));
        return;
      }
      navigateHome(false);
    }

    function requestHome() {
      const hasConfirmed = confirmedIds.size > 0;
      const hasUnsaved   = changedIds.size  > 0;
      if (!hasConfirmed && !hasUnsaved) { navigateHome(false); return; }
      if (hasUnsaved) {
        showWarnModal('You have unsaved changes', () => navigateHome(false));
      } else {
        showWarnModal('Leave inventory count?', () => navigateHome(false),
          confirmedIds.size + ' item' + (confirmedIds.size !== 1 ? 's' : '') + ' already saved. Any unsaved edits will be lost.');
      }
    }

    // ── WARN MODAL ────────────────────────────────────────────────────────────
    let warnProceedCallback = null;

    // Human-readable label for virtual BG IDs
    function idLabel(id) {
      if (id === BG_RECV) return 'Buon Gusto — Slices Received';
      if (id === BG_SOLD) return 'Buon Gusto — Slices Sold';
      const item = appData.items.find(i => i.id === id);
      return item ? item.name : id;
    }

    function showWarnModal(title, onProceed, customSub) {
      warnProceedCallback = onProceed;
      document.getElementById('warnTitle').textContent = title;
      if (customSub) {
        document.getElementById('warnSub').textContent = customSub;
        document.getElementById('warnList').style.display = 'none';
      } else {
        document.getElementById('warnSub').textContent = 'These were changed but not confirmed with OK:';
        document.getElementById('warnList').style.display = 'block';
        document.getElementById('warnList').innerHTML = [...changedIds]
          .map(id => `<div class="unsaved-item">${idLabel(id)}</div>`).join('');
      }
      document.getElementById('warnProceedBtn').onclick = () => {
        closeWarnModal();
        if (warnProceedCallback) warnProceedCallback();
      };
      document.getElementById('warnModal').classList.add('open');
    }

    function closeWarnModal() {
      document.getElementById('warnModal').classList.remove('open');
      warnProceedCallback = null;
    }
    document.getElementById('warnModal').addEventListener('click', function(e) {
      if (e.target === this) closeWarnModal();
    });
  </script>
</body>
</html>
