<!DOCTYPE html>
<!--
  GymDisplay.html — the page the Raspberry Pi loads (?page=display).
  v3: full-screen self-rotating SLIDE DECK for a 98" gym TV.
  One 1920x1080 fixed stage (fit()-scaled), a double-buffered #deck, and a token-pattern
  playlist that cycles: sport photos (current team) → menu ad (game) → events → this-sport
  events → all-sports 2-week schedule → promo ads. Data comes from one getGymState() poll
  (~15s). See CLAUDE.md. Chrome = tiny logo+clock only. Emergency/night-off = full overlays.
-->
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --maroon:#800000; --gold:#FFD700; --cooking:#5bc0de; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; background:#000; overflow:hidden; font-family:Inter,Arial,sans-serif; color:#fff; cursor:none; }
    * { cursor:none !important; }
    #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
    #tv { width:1920px; height:1080px; transform-origin:top left; position:relative; background:#000; overflow:hidden; }

    /* ---- deck: two cross-fading layers ---- */
    #deck { position:absolute; inset:0; }
    .layer { position:absolute; inset:0; opacity:0; transition:opacity .6s ease; }
    .layer.on { opacity:1; }

    /* ---- shared slide chrome ---- */
    .slide { position:absolute; inset:0; }
    .slide-header { height:110px; background:var(--maroon); display:flex; align-items:center; padding:0 48px; }
    .slide-header h1 { font-family:'Bangers',cursive; color:var(--gold); font-size:76px; letter-spacing:2px;
                       text-shadow:3px 3px 0 #400, 6px 6px 14px rgba(128,0,0,.6); text-transform:uppercase; line-height:1; }
    .slide-body { position:absolute; top:110px; left:0; right:0; bottom:0; padding:32px 48px; overflow:hidden; }

    /* ---- persistent chrome (logo + clock) ---- */
    #chrome { position:absolute; inset:0; z-index:5; pointer-events:none; }
    #cbug { position:absolute; top:22px; right:28px; display:flex; align-items:center; gap:12px;
            background:rgba(0,0,0,.45); border-radius:999px; padding:8px 18px; }
    #cbug .logo { font-size:34px; line-height:1; }
    #cbug .clock { font-family:Inter; font-weight:800; font-size:30px; }

    /* ---- photo slide ---- */
    .ph-box { position:absolute; inset:0; overflow:hidden; background:#000; }
    .ph-box img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1.1s ease; }
    .ph-box img.active { opacity:1; }
    @keyframes kb { from { transform:scale(1); } to { transform:scale(1.09); } }
    .ph-box img.active { animation:kb 30s ease-out both; }
    .ph-scrim { position:absolute; left:0; right:0; bottom:0; height:360px;
                background:linear-gradient(0deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,.55) 45%, transparent 100%); }
    .ph-info { position:absolute; left:56px; bottom:56px; right:520px; border-left:8px solid var(--gold); padding-left:26px; }
    .ph-sport { font-family:'Bangers',cursive; color:var(--gold); font-size:72px; letter-spacing:2px; line-height:1; text-transform:uppercase; }
    .ph-opp { font-family:'Oswald',sans-serif; font-weight:700; font-size:52px; margin-top:8px; }
    .ph-chips { margin-top:16px; display:flex; gap:14px; }
    .chip { font-family:Inter; font-weight:800; font-size:26px; padding:6px 18px; border-radius:10px; }
    .chip.home { background:var(--gold); color:#111; animation:pulse 1.6s infinite; }
    .chip.away { background:transparent; color:#fff; border:3px solid var(--maroon); }
    .chip.time { background:var(--maroon); color:#fff; }
    @keyframes pulse { 50% { opacity:.55; } }
    /* reserved live-score box (future Daktronics) */
    .ph-score { position:absolute; right:56px; bottom:56px; width:420px; text-align:center; display:none; }

    /* ---- menu slide ---- */
    #mHalf { display:none; background:var(--gold); color:var(--maroon); text-align:center; font-family:'Bangers',cursive;
             font-size:40px; letter-spacing:3px; padding:8px 0; }
    .menu-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:22px; align-content:start; }
    .menu-cat { grid-column:1/-1; font-family:'Bangers',cursive; color:var(--gold); font-size:44px; letter-spacing:2px; margin:6px 0 -4px; }
    .tile { position:relative; background:#0a0a0a; border:5px solid var(--maroon); border-radius:20px; padding:22px 26px; min-height:150px; overflow:hidden; }
    .tile-name { font-family:'Bangers',cursive; color:var(--gold); font-size:46px; letter-spacing:1px; text-transform:uppercase; line-height:1.02; }
    .tile-price { color:#fff; font-weight:800; font-size:88px; line-height:1; margin-top:10px; }
    .price-was { text-decoration:line-through; color:#888; font-size:0.5em; margin-right:12px; font-weight:600; }
    .cooking-status { color:var(--cooking); font-weight:700; font-size:52px; margin-top:10px; animation:cook 1.5s infinite alternate; }
    @keyframes cook { from{opacity:.55;} to{opacity:1;color:#7fd4e6;} }
    .tile.out { }
    .tile.out .tile-name, .tile.out .tile-price { filter:grayscale(1); opacity:.35; }
    .soldout-banner { position:absolute; top:50%; left:50%; width:150%; transform:translate(-50%,-50%) rotate(-15deg);
                      background:var(--maroon); color:#fff; font-family:'Bangers',cursive; font-size:44px; letter-spacing:3px;
                      text-align:center; text-transform:uppercase; padding:8px 0; border-top:3px solid var(--gold); border-bottom:3px solid var(--gold); z-index:3; }
    .chip-low { position:absolute; top:14px; right:14px; background:var(--gold); color:var(--maroon); font-weight:900;
                font-size:24px; padding:5px 12px; border-radius:10px; text-transform:uppercase; z-index:2; }
    .ribbon-half { position:absolute; top:16px; left:-10px; background:var(--gold); color:var(--maroon); font-family:'Bangers',cursive;
                   font-size:30px; letter-spacing:1px; padding:4px 20px; transform:rotate(-8deg); border-radius:6px; box-shadow:3px 3px 10px rgba(0,0,0,.8); z-index:2; }
    .tile.has-ribbon .tile-name { padding-top:26px; }

    /* ---- row-board slides (events / sportEvents) ---- */
    .rows { display:flex; flex-direction:column; gap:16px; }
    .row { display:flex; align-items:center; gap:24px; background:#141414; border-radius:16px; padding:0 26px; height:112px; overflow:hidden; }
    .row .day { flex:0 0 150px; height:80px; background:var(--maroon); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .row .day .d { font-family:'Bangers',cursive; color:var(--gold); font-size:40px; line-height:.9; }
    .row .day .n { font-family:Inter; font-weight:700; font-size:22px; color:#eee; }
    .row .lvl { flex:0 0 200px; font-family:'Oswald',sans-serif; font-weight:700; font-size:44px; color:#fff; border-left:6px solid var(--gold); padding-left:18px; }
    .row .opp { flex:1; font-family:'Oswald',sans-serif; font-weight:700; font-size:48px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row .ha  { flex:0 0 auto; }
    .row .tm  { flex:0 0 200px; text-align:right; font-family:Inter; font-weight:800; font-size:54px; color:var(--gold); }
    .row.simple .ttl { flex:1; font-family:'Oswald',sans-serif; font-weight:700; font-size:46px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .empty-note { text-align:center; color:var(--gold); font-family:'Bangers',cursive; font-size:64px; letter-spacing:3px; padding-top:120px; }

    /* ---- all-sports 2-week board ---- */
    .days { display:flex; gap:20px; height:100%; }
    .daycol { flex:1 1 0; background:#111; border-radius:16px; overflow:hidden; display:flex; flex-direction:column; }
    .daycol .dh { background:var(--maroon); border-left:6px solid var(--gold); padding:10px 16px; }
    .daycol .dh .d { font-family:'Bangers',cursive; color:var(--gold); font-size:38px; line-height:1; }
    .daycol .dh .n { font-family:Inter; font-weight:700; font-size:22px; color:#eee; }
    .daycol .evs { padding:12px 16px; display:flex; flex-direction:column; gap:12px; }
    .mini .s { font-family:Inter; font-weight:800; font-size:26px; color:var(--gold); line-height:1.05; }
    .mini .o { font-family:'Oswald',sans-serif; font-weight:600; font-size:26px; color:#fff; }
    .mini .t { font-family:Inter; font-weight:700; font-size:24px; color:#bbb; }
    .daymore { color:#999; font-size:22px; font-weight:700; }
    .moredays { position:absolute; right:48px; bottom:20px; color:var(--gold); font-weight:800; font-size:28px; }

    /* ---- promo slide ---- */
    .promo { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
             --pbg1:#000; --pbg2:#1a0000; --pink:#ff5fa2; --ink:#fff; --acc:var(--gold);
             background:radial-gradient(ellipse at center, var(--pbg2) 0%, var(--pbg1) 75%); }
    .promo.redout  { --pbg1:#3a0000; --pbg2:#b30000; --ink:#fff; --acc:var(--gold); }
    .promo.pinkout { --pbg1:#000; --pbg2:#2a0016; --acc:var(--pink); }
    .promo.gold    { --pbg1:#000; --pbg2:#2a2000; --acc:var(--gold); }
    .promo .eyebrow { font-family:'Oswald',sans-serif; font-weight:700; font-size:56px; letter-spacing:8px; color:var(--acc); text-transform:uppercase; }
    .promo .hero { font-family:'Bangers',cursive; color:var(--acc); font-size:210px; line-height:.95; letter-spacing:3px; text-transform:uppercase;
                   text-shadow:5px 5px 0 var(--maroon), 10px 10px 26px rgba(0,0,0,.7); margin:12px 0; animation:heroIn .5s ease-out both; }
    @keyframes heroIn { from{transform:scale(1.06);opacity:0;} to{transform:scale(1);opacity:1;} }
    .promo .when { font-family:'Oswald',sans-serif; font-weight:700; font-size:60px; color:var(--ink); }
    .promo .ribbon { margin-top:26px; background:var(--acc); color:#111; font-family:'Bangers',cursive; font-size:52px; letter-spacing:2px; padding:12px 44px; border-radius:10px; }

    /* ---- standby ---- */
    .standby { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .standby .l { font-size:200px; } .standby .t { font-family:'Bangers',cursive; color:var(--gold); font-size:80px; letter-spacing:4px; margin-top:10px; }

    /* ---- overlays ---- */
    #emergency { position:absolute; inset:0; background:#b00; z-index:9999; display:none; align-items:center; justify-content:center; font-size:80px; font-weight:800; text-align:center; padding:80px; }
    body.emergency #emergency { display:flex; }
    #nightOff { position:absolute; inset:0; background:#000; z-index:9000; display:none; align-items:center; justify-content:center; }
    #nightOff.on { display:flex; }
    #nightOff .l { font-size:180px; opacity:.25; } #nightOff .c { color:#333; font-weight:700; letter-spacing:3px; margin-top:12px; }
  </style>
<!-- ===== Showcase demo shim (standalone build) ===== -->
<link rel="stylesheet" href="../../assets/demo-banner.css">
<script>window.DEMO_META = { name: "Gym TV Display" };</script>
<script src="../../assets/gsr-shim.js"></script>
<script src="data.js"></script>
<script src="mock.js"></script>
<script src="../../assets/demo-banner.js" defer></script>
</head>
<body>
  <div id="stage">
    <div id="tv">
      <div id="deck">
        <div id="slideA" class="layer"></div>
        <div id="slideB" class="layer"></div>
      </div>
      <div id="chrome">
        <div id="cbug"><span class="logo">🦅</span><span class="clock" id="clock">--:--</span></div>
      </div>
      <div id="emergency"></div>
      <div id="nightOff"><div style="text-align:center"><div class="l">🦅</div><div class="c">HCS ATHLETICS</div></div></div>
    </div>
  </div>

<script>
  // ═══ config knobs ═══
  var CFG = {
    rev: 1,
    flipSec: 7, runLen: 4,
    dur: { menuAd: 12, events: 12, sportEvents: 12, allSports: 14, promoAd: 10, standby: 15 },
    fadeMs: 600,
    pattern: {
      game: ['photoRun','menuAd','photoRun','events','photoRun','menuAd','photoRun','sportEvents',
             'photoRun','menuAd','photoRun','events','photoRun','allSports','photoRun','menuAd','photoRun','promoAd'],
      idle: ['photoRun','allSports','photoRun','events','photoRun','promoAd','photoRun','events','photoRun','allSports','photoRun','promoAd']
    }
  };

  // ═══ fit the fixed 1920x1080 stage to the screen ═══
  function fit(){ var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    document.getElementById('tv').style.transform = 'scale(' + s + ')'; }
  window.addEventListener('resize', fit); fit();

  // ═══ small helpers ═══
  var skewMs = 0;
  function serverNow(){ return Date.now() + skewMs; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;'})[m];}); }
  function fmtPrice(c){ if(c==null) return ''; return (c%100===0)?('$'+c/100):('$'+(c/100).toFixed(2)); }
  function fmtTime(iso){ try{ return new Date(iso).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
  function dayAbbr(iso){ try{ return new Date(iso).toLocaleDateString([],{weekday:'short'}).toUpperCase(); }catch(e){ return ''; } }
  function dateAbbr(iso){ try{ return new Date(iso).toLocaleDateString([],{month:'numeric',day:'numeric'}); }catch(e){ return ''; } }
  function dayKey(iso){ try{ var d=new Date(iso); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }catch(e){ return iso; } }
  function levelWord(lvl){ return lvl==='v'?'VARSITY':lvl==='jv'?'JV':lvl==='ms'?'MS':''; }
  function genderSportTitle(label){ return String(label||'').replace(/^(JV|MS|V)\s+/i,'').toUpperCase(); }
  function abbrevSport(e){ var g=e.gender?e.gender[0].toUpperCase():''; var lv=(e.level||'').toUpperCase();
    var sp=e.sport?e.sport.replace('basketball','BBALL').replace('volleyball','VBALL').toUpperCase():(e.label||'').toUpperCase();
    return [lv,g,sp].filter(Boolean).join(' '); }

  // ═══ clock ═══
  function updateClock(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}); }
  setInterval(updateClock,1000); updateClock();

  // ═══ photo slideshow engine (cross-fade) ═══
  function slideshow(box, images, interval, st){
    box.querySelectorAll('img').forEach(function(n){ n.remove(); });
    if(st.timer){ clearInterval(st.timer); st.timer=null; }
    st.idx=0;
    if(!(images&&images.length)) return;
    images.forEach(function(src,i){ var img=document.createElement('img'); img.src=src; if(i===0) img.className='active'; box.appendChild(img); });
    if(images.length<2) return;
    st.timer=setInterval(function(){ var nodes=box.querySelectorAll('img'); if(nodes.length<2) return;
      nodes[st.idx].classList.remove('active'); st.idx=(st.idx+1)%nodes.length; nodes[st.idx].classList.add('active'); }, Math.max(2,interval||7)*1000);
  }

  // ═══ menu rendering (ported) ═══
  var TV_LOW=5;
  function tileHtml(item, halfOff){
    var cook=(item.cooking&&item.cooking.readyAtMs)?item.cooking.readyAtMs:0;
    var isCooking=cook&&cook>serverNow();
    var out=!isCooking&&item.stock!=null&&item.stock<=0;
    var low=!out&&!isCooking&&item.stock!=null&&item.stock<=TV_LOW;
    var ribbon=halfOff===true&&item.discountable===true;
    var unit=ribbon?Math.round(item.priceCents/2):item.priceCents;
    var cls='tile'+(out?' out':'')+(ribbon?' has-ribbon':'');
    var ov=''; if(ribbon)ov+='<div class="ribbon-half">½ OFF!</div>';
    if(out)ov+='<div class="soldout-banner">Sold Out</div>';
    if(low)ov+='<div class="chip-low">Only '+item.stock+' Left</div>';
    var price;
    if(isCooking) price='<div class="cooking-status" data-ready-at="'+cook+'">BACK IN '+Math.max(1,Math.ceil((cook-serverNow())/60000))+'m</div>';
    else if(ribbon) price='<div class="tile-price"><span class="price-was">'+fmtPrice(item.priceCents)+'</span>'+fmtPrice(unit)+'</div>';
    else price='<div class="tile-price">'+fmtPrice(unit)+'</div>';
    return '<div class="'+cls+'">'+ov+'<div class="tile-name">'+esc(item.name)+'</div>'+price+'</div>';
  }
  function menuHtml(menu){
    var items=(menu&&menu.items)||[], order=[], groups={};
    items.forEach(function(it){ var c=it.category||'Food'; if(!groups[c]){groups[c]=[];order.push(c);} groups[c].push(it); });
    var multi=order.length>1, html='<div class="menu-grid">';
    order.forEach(function(cat){ if(multi) html+='<div class="menu-cat">'+esc(cat).toUpperCase()+'</div>';
      groups[cat].forEach(function(it){ html+=tileHtml(it, menu.halfOff); }); });
    return html+'</div>';
  }

  // ═══ current-game lookup (for photo lower-third) ═══
  function currentGameInfo(){
    if(!LATEST||!LATEST.sport) return null;
    var pool=(LATEST.sportEvents||[]).concat(LATEST.schedule||[]);
    var match=null, best=Infinity, now=Date.now();
    pool.forEach(function(e){ if(e.label===LATEST.sport){ var d=Math.abs(new Date(e.start).getTime()-now); if(d<best){best=d;match=e;} } });
    return match;
  }

  // ═══ per-slide renderers (read live from LATEST) ═══
  function slidePhotoRun(layer){
    var photos = LATEST.mode==='game' ? (LATEST.gamePhotos||[]) : ((LATEST.control.carousel||{}).images||[]);
    var win = photoWindow(photos, CFG.runLen, Deck.photoOffset);
    Deck.photoOffset = photos.length ? (Deck.photoOffset+CFG.runLen)%photos.length : 0;
    var info = LATEST.mode==='game' ? currentGameInfo() : null;
    var lower='';
    if(LATEST.mode==='game'){
      var sportLine = esc(LATEST.sport||'HOME GAME');
      var oppLine = info&&info.opponent ? ((info.homeAway==='away'?'@ ':'vs ')+esc(info.opponent)) : '';
      var chips='';
      var ha = info&&info.homeAway;
      if(ha==='home') chips+='<span class="chip home">HOME</span>';
      else if(ha==='away') chips+='<span class="chip away">AWAY</span>';
      var t = (info&&info.start) ? fmtTime(info.start) : (LATEST.gameMode&&LATEST.gameMode.detected&&LATEST.gameMode.detected.startsAt?fmtTime(LATEST.gameMode.detected.startsAt):'');
      if(t) chips+='<span class="chip time">'+t+'</span>';
      lower='<div class="ph-scrim"></div><div class="ph-info"><div class="ph-sport">'+sportLine+'</div>'+
            (oppLine?'<div class="ph-opp">'+oppLine+'</div>':'')+'<div class="ph-chips">'+chips+'</div></div>'+
            '<div class="ph-score" id="phScore"></div>';
    } else {
      lower='<div class="ph-scrim" style="height:200px"></div><div class="ph-info"><div class="ph-sport">HCS EAGLES</div></div>';
    }
    layer.innerHTML='<div class="slide"><div class="ph-box"></div>'+lower+'</div>';
    if(!photos.length){ layer.querySelector('.ph-box').innerHTML='<div class="standby"><div class="l">🦅</div><div class="t">HCS EAGLES ATHLETICS</div></div>'; return; }
    var st={}; slideshow(layer.querySelector('.ph-box'), win, CFG.flipSec, st);
    layer._dispose=function(){ if(st.timer) clearInterval(st.timer); };
  }
  function photoWindow(all,count,offset){ if(!all||!all.length) return []; if(all.length<=count) return all.slice();
    var out=[]; for(var i=0;i<count;i++) out.push(all[(offset+i)%all.length]); return out; }

  function slideMenuAd(layer){
    var menu=LATEST.menu||{items:[]};
    var half = menu.halfOff ? '<div id="mHalf" style="display:block">½ OFF DEALS ACTIVE!</div>' : '';
    layer.innerHTML='<div class="slide"><div class="slide-header"><h1>Eagles Nest — Now Serving</h1></div>'+
      '<div class="slide-body">'+half+menuHtml(menu)+'</div></div>';
  }

  function rowBoardEnriched(rows, headerTitle){
    if(!rows.length) return '<div class="slide"><div class="slide-header"><h1>'+esc(headerTitle)+'</h1></div><div class="slide-body"><div class="empty-note">NO GAMES THIS WEEK — GO EAGLES!</div></div></div>';
    var html='<div class="slide"><div class="slide-header"><h1>'+esc(headerTitle)+'</h1></div><div class="slide-body"><div class="rows">';
    rows.forEach(function(e){
      var ha = e.homeAway==='home' ? '<span class="chip home">HOME</span>' : e.homeAway==='away' ? '<span class="chip away">AWAY</span>' : '';
      var opp = e.opponent ? ((e.homeAway==='away'?'@ ':'vs ')+esc(e.opponent)) : esc(e.summary||'');
      html+='<div class="row"><div class="day"><div class="d">'+dayAbbr(e.start)+'</div><div class="n">'+dateAbbr(e.start)+'</div></div>'+
            '<div class="lvl">'+esc(levelWord(e.level)||'')+'</div><div class="opp">'+opp+'</div>'+
            '<div class="ha">'+ha+'</div><div class="tm">'+(e.allDay?'':fmtTime(e.start))+'</div></div>';
    });
    return html+'</div></div></div>';
  }
  function slideSportEvents(layer){
    layer.innerHTML=rowBoardEnriched((LATEST.sportEvents||[]).slice(0,7), genderSportTitle(LATEST.sport)+' — THIS WEEK');
    trimRows(layer);
  }
  function slideEvents(layer){
    var evs=(LATEST.events||[]).slice(0,8);
    if(!evs.length){ layer.innerHTML='<div class="slide"><div class="slide-header"><h1>Upcoming Events</h1></div><div class="slide-body"><div class="empty-note">NO UPCOMING EVENTS</div></div></div>'; return; }
    var html='<div class="slide"><div class="slide-header"><h1>Upcoming Events</h1></div><div class="slide-body"><div class="rows">';
    evs.forEach(function(e){
      html+='<div class="row simple"><div class="day"><div class="d">'+dayAbbr(e.start)+'</div><div class="n">'+dateAbbr(e.start)+'</div></div>'+
            '<div class="ttl">'+esc(e.title)+'</div><div class="tm">'+(e.allDay?'':fmtTime(e.start))+'</div></div>';
    });
    layer.innerHTML=html+'</div></div></div>';
    trimRows(layer);
  }
  function trimRows(layer){ var body=layer.querySelector('.slide-body'), box=layer.querySelector('.rows'); if(!body||!box) return;
    var guard=0; while(box.scrollHeight>body.clientHeight && box.lastElementChild && guard++<40) box.removeChild(box.lastElementChild); }

  function slideAllSports(layer){
    var sched=LATEST.schedule||[];
    if(!sched.length){ layer.innerHTML='<div class="slide"><div class="slide-header"><h1>Eagles Athletics — Next 2 Weeks</h1></div><div class="slide-body"><div class="empty-note">NO EVENTS SCHEDULED</div></div></div>'; return; }
    var order=[], byDay={};
    sched.forEach(function(e){ var k=dayKey(e.start); if(!byDay[k]){byDay[k]=[];order.push(k);} byDay[k].push(e); });
    var maxCols=5, shownDays=order.slice(0,maxCols), moreDays=order.length-shownDays.length;
    var html='<div class="slide"><div class="slide-header"><h1>Eagles Athletics — Next 2 Weeks</h1></div><div class="slide-body"><div class="days">';
    shownDays.forEach(function(k){ var evs=byDay[k], first=evs[0]; var cap=6, show=evs.slice(0,cap), extra=evs.length-show.length;
      html+='<div class="daycol"><div class="dh"><div class="d">'+dayAbbr(first.start)+'</div><div class="n">'+dateAbbr(first.start)+'</div></div><div class="evs">';
      show.forEach(function(e){ var oppdot = e.opponent ? (esc(e.opponent)+' '+(e.homeAway==='home'?'·H':e.homeAway==='away'?'·A':'')) : esc(e.summary||'');
        html+='<div class="mini"><div class="s">'+esc(abbrevSport(e))+'</div><div class="o">'+oppdot+'</div><div class="t">'+(e.allDay?'All day':fmtTime(e.start))+'</div></div>'; });
      if(extra>0) html+='<div class="daymore">+'+extra+' more</div>';
      html+='</div></div>';
    });
    html+='</div>'+(moreDays>0?'<div class="moredays">+'+moreDays+' more days →</div>':'')+'</div></div>';
    layer.innerHTML=html;
    // width trim: drop trailing day columns that overflow
    var days=layer.querySelector('.days'), body=layer.querySelector('.slide-body'), guard=0;
    while(days && days.scrollWidth>body.clientWidth && days.lastElementChild && guard++<10) days.removeChild(days.lastElementChild);
  }

  function slidePromo(layer){
    var pool=(LATEST.ads||[]).slice();
    if(!pool.length) pool=((LATEST.control.infoCards)||[]).map(function(s){ return {headline:s, theme:'generic'}; });
    if(!pool.length){ slideStandby(layer); return; }
    var ad=pool[Deck.promoIdx % pool.length]; Deck.promoIdx++;
    var theme=(ad.theme||'generic').toLowerCase();
    var when=[ad.dateText, ad.opponent?((/^@|vs/i.test(ad.opponent)?'':'vs ')+ad.opponent):''].filter(Boolean).join(' · ');
    layer.innerHTML='<div class="slide"><div class="promo '+esc(theme)+'">'+
      (ad.subhead||when||ad.opponent?'<div class="eyebrow">'+esc(theme==='generic'?'EAGLES':theme.replace('out',' out'))+'</div>':'')+
      '<div class="hero">'+esc(ad.headline||'GO EAGLES')+'</div>'+
      (when?'<div class="when">'+esc(when)+'</div>':'')+
      (ad.subhead?'<div class="ribbon">'+esc(ad.subhead)+'</div>':'')+
      '</div></div>';
  }
  function slideStandby(layer){ layer.innerHTML='<div class="slide"><div class="standby"><div class="l">🦅</div><div class="t">HCS EAGLES ATHLETICS</div></div></div>'; }

  // ═══ deck engine ═══
  var LATEST=null;
  var Deck={ playlist:[], idx:0, frontId:'slideA', timer:null, pending:null, sig:null, paused:false, photoOffset:0, promoIdx:0 };
  function layerEl(id){ return document.getElementById(id); }
  function otherLayer(){ return Deck.frontId==='slideA'?'slideB':'slideA'; }
  function disposeLayer(el){ if(el._dispose){ try{ el._dispose(); }catch(e){} el._dispose=null; } }

  function photosPresent(st){ var p = st.mode==='game' ? (st.gamePhotos||[]) : ((st.control.carousel||{}).images||[]); return p.length>0; }
  function hasData(type,st){
    if(type==='photoRun') return photosPresent(st);
    if(type==='menuAd')   return st.mode==='game' && st.menu && st.menu.items && st.menu.items.length>0;
    if(type==='events')   return (st.events||[]).length>0;
    if(type==='sportEvents') return (st.sportEvents||[]).length>0;
    if(type==='allSports')   return (st.schedule||[]).length>0;
    if(type==='promoAd')  return ((st.ads||[]).length>0) || ((st.control.infoCards||[]).length>0);
    return false;
  }
  function durFor(type){ return type==='photoRun' ? CFG.runLen*CFG.flipSec : (CFG.dur[type]||12); }
  function buildPlaylist(st){
    var pat=CFG.pattern[st.mode]||CFG.pattern.idle, out=[];
    pat.forEach(function(tok){ if(tok==='photoRun'){ if(photosPresent(st)) out.push({type:'photoRun',dur:durFor('photoRun')}); }
      else if(hasData(tok,st)) out.push({type:tok,dur:durFor(tok)}); });
    if(!out.length) out=[{type:'standby',dur:durFor('standby')}];
    return out;
  }
  function renderSlide(el, slide){
    disposeLayer(el);
    switch(slide.type){
      case 'photoRun':    slidePhotoRun(el); break;
      case 'menuAd':      slideMenuAd(el); break;
      case 'events':      slideEvents(el); break;
      case 'sportEvents': slideSportEvents(el); break;
      case 'allSports':   slideAllSports(el); break;
      case 'promoAd':     slidePromo(el); break;
      default:            slideStandby(el);
    }
  }
  function advance(){
    if(Deck.pending){ Deck.playlist=Deck.pending; Deck.pending=null; Deck.idx=0; }
    if(!Deck.playlist.length) Deck.playlist=[{type:'standby',dur:durFor('standby')}];
    var slide=Deck.playlist[Deck.idx];
    var backId=otherLayer(), back=layerEl(backId), front=layerEl(Deck.frontId);
    renderSlide(back, slide);
    back.classList.add('on'); front.classList.remove('on');
    Deck.frontId=backId;
    Deck.idx=(Deck.idx+1)%Deck.playlist.length;
    Deck.timer=setTimeout(advance, slide.dur*1000);
  }
  function startDeck(){ if(Deck.paused||Deck.timer) return; advance(); }
  function stopDeck(){ if(Deck.timer){ clearTimeout(Deck.timer); Deck.timer=null; } }
  function applyStructure(st){
    var sig=[st.mode, photosPresent(st), hasData('menuAd',st), hasData('events',st), hasData('sportEvents',st),
             hasData('allSports',st), hasData('promoAd',st), CFG.rev].join('#');
    if(sig===Deck.sig) return;
    Deck.sig=sig;
    var pl=buildPlaylist(st);
    if(!Deck.timer){ Deck.playlist=pl; Deck.idx=0; startDeck(); } else { Deck.pending=pl; }
  }

  // ═══ cooking countdown (visible layer only) ═══
  setInterval(function(){ var on=document.querySelector('.layer.on'); if(!on) return;
    var els=on.querySelectorAll('[data-ready-at]');
    for(var i=0;i<els.length;i++){ var r=Number(els[i].getAttribute('data-ready-at')), left=r-serverNow();
      els[i].textContent = left<=0 ? 'READY NOW!' : ('BACK IN '+Math.ceil(left/60000)+'m'); } }, 1000);

  // ═══ apply full state ═══
  function apply(st){
    if(!st) return;
    LATEST=st;
    if(st.menu && st.menu.serverNow) skewMs = st.menu.serverNow - Date.now();
    // emergency
    var em=st.control&&st.control.emergency, emOn=!!(em&&em.active);
    document.body.classList.toggle('emergency', emOn);
    if(emOn) document.getElementById('emergency').textContent = em.message || 'Please follow staff instructions.';
    // night-off
    var no=st.control&&st.control.nightOff, noOn=false;
    if(no&&no.enabled){ var n=new Date(), cur=n.getHours()*60+n.getMinutes();
      var sp=String(no.start||'22:00').split(':'), ep=String(no.end||'06:00').split(':');
      var s=(+sp[0])*60+(+sp[1]), e=(+ep[0])*60+(+ep[1]); noOn = s<=e ? (cur>=s&&cur<e) : (cur>=s||cur<e); }
    document.getElementById('nightOff').classList.toggle('on', noOn);
    // pause deck under any overlay
    var shouldPause = emOn || noOn;
    if(shouldPause){ Deck.paused=true; stopDeck(); }
    else if(Deck.paused){ Deck.paused=false; applyStructure(st); startDeck(); return; }
    applyStructure(st);
  }

  // ═══ poll loop ═══
  function poll(){ google.script.run.withSuccessHandler(apply).withFailureHandler(function(){}).getGymState(); }
  poll();
  setInterval(poll, 15000);
  setTimeout(function(){ location.reload(); }, 4*60*60*1000);   // 4h safety reload
</script>
