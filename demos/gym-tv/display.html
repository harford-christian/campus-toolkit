<!DOCTYPE html>
<!--
  GymDisplay.html — the page the Raspberry Pi loads (?page=display).
  Polished v2. Layout DNA from ../../lobby-tv-project/LobbyPreview.html (fit scaler, weather,
  night-off) and menu tiles ported from ../eagles-landing/apps/public/tv/Tv.html + TvStyles.html.
  Data: one same-origin getGymState() poll (~15s). Weather is the ONLY direct browser fetch
  (open-meteo is CORS-open, no key).
-->
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --maroon:#800000; --gold:#FFD700; --cooking:#5bc0de; --ticker-h:56px; --rail-w:360px; --banner-h:72px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; background:#000; overflow:hidden; font-family:Inter,Arial,sans-serif; color:#fff; }
    #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
    #tv { width:1280px; height:720px; transform-origin:top left; position:relative; background:#0a0a0a; overflow:hidden; transition:opacity .45s ease; }
    #tv.fading { opacity:0; }

    /* ---- game-day banner ---- */
    #banner { height:0; overflow:hidden; display:flex; align-items:center; gap:18px; padding:0 24px;
              background:linear-gradient(90deg,var(--maroon),#b30000 55%,var(--gold));
              font-family:'Bangers',cursive; letter-spacing:1px; }
    body.mode-game #banner { height:var(--banner-h); }
    #bannerSport { font-size:34px; }
    #banner .home { font-family:Inter; background:var(--gold); color:#111; font-weight:800; font-size:16px; padding:4px 12px; border-radius:6px; animation:pulse 1.6s infinite; }
    #bannerTime { font-family:Inter; font-weight:600; font-size:20px; margin-left:auto; }
    @keyframes pulse { 50%{opacity:.5;} }

    .root { display:flex; height:calc(100% - var(--ticker-h)); }
    body.mode-game .root { height:calc(100% - var(--ticker-h) - var(--banner-h)); }
    .main { flex:1; position:relative; overflow:hidden; }
    .rail { width:var(--rail-w); background:#111; border-left:2px solid #222; padding:16px; display:flex; flex-direction:column; gap:12px; }

    /* ---- idle carousel ---- */
    #carousel img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1.1s; }
    #carousel img.active { opacity:1; }
    #carouselEmpty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#333; font-family:'Bangers',cursive; font-size:44px; letter-spacing:2px; }

    /* ---- game menu grid (ported from Eagles TvStyles) ---- */
    #menu { position:absolute; inset:0; padding:14px 18px; overflow:hidden; display:flex; flex-direction:column; }
    #halfoffBanner { display:none; background:var(--gold); color:var(--maroon); text-align:center; font-family:'Bangers',cursive; font-size:24px; letter-spacing:2px; padding:5px 0; margin-bottom:8px; border-radius:6px; }
    #menu h2 { font-family:'Bangers',cursive; color:var(--gold); font-size:22px; letter-spacing:1px; margin:8px 0 4px; }
    #menuGrid { flex:1; overflow:hidden; opacity:1; transition:opacity .45s ease; }
    .grid-sec + h2 { margin-top:12px; }
    .tile { position:relative; background:#0a0a0a; border:4px solid var(--maroon); border-radius:14px; padding:12px 14px; min-height:92px; overflow:hidden; }
    .tile-body { display:flex; flex-direction:column; justify-content:space-between; gap:8px; min-height:100%; }
    .tile-name { font-family:'Bangers',cursive; color:var(--gold); font-size:28px; letter-spacing:1px; text-transform:uppercase; line-height:1.05; }
    .tile-price { color:#fff; font-weight:800; font-size:36px; line-height:1; }
    .price-was { text-decoration:line-through; color:#888; font-size:0.6em; margin-right:8px; font-weight:600; }
    .cooking-status { color:var(--cooking); font-weight:700; font-size:26px; animation:cook 1.5s infinite alternate; }
    @keyframes cook { from{opacity:.55;} to{opacity:1;color:#7fd4e6;} }
    .tile-soldout { border-color:#3a3a3a; }
    .tile-soldout .tile-body { filter:grayscale(1); opacity:.35; }
    .soldout-banner { position:absolute; top:50%; left:50%; width:150%; transform:translate(-50%,-50%) rotate(-16deg);
                      background:var(--maroon); color:#fff; font-family:'Bangers',cursive; font-size:24px; letter-spacing:2px;
                      text-align:center; text-transform:uppercase; padding:5px 0; border-top:2px solid var(--gold); border-bottom:2px solid var(--gold); z-index:3; }
    .chip-low { position:absolute; top:8px; right:8px; background:var(--gold); color:var(--maroon); font-weight:900; font-size:14px; letter-spacing:.5px; padding:3px 8px; border-radius:8px; text-transform:uppercase; z-index:2; }
    .ribbon-half { position:absolute; top:10px; left:-6px; background:var(--gold); color:var(--maroon); font-family:'Bangers',cursive; font-size:18px; letter-spacing:1px; padding:2px 12px; transform:rotate(-8deg); border-radius:5px; box-shadow:2px 2px 8px rgba(0,0,0,.8); z-index:2; }
    .tile-has-ribbon .tile-body { padding-top:22px; }

    /* ---- rail widgets ---- */
    .rail .clock { font-size:34px; font-weight:800; }
    .rail .date  { color:#bbb; }
    .card { background:#181818; border:1px solid #262626; border-radius:12px; padding:12px 14px; }
    .card h3 { color:var(--gold); font-size:13px; letter-spacing:1px; margin-bottom:8px; }
    .ev { padding:6px 0; border-bottom:1px solid #222; font-size:15px; }
    .ev .when { color:#9ad; font-size:12px; }
    #infoText { font-size:17px; line-height:1.35; min-height:46px; transition:opacity .5s; }
    /* weather */
    #wxWidget .wx-main { display:flex; align-items:center; gap:12px; }
    #wxIcon { font-size:44px; }
    #wxTemp { font-size:30px; font-weight:800; }
    #wxFeel, #wxDesc { color:#bbb; font-size:13px; }
    .wx-forecast { display:flex; gap:10px; margin-top:10px; }
    .wx-day { flex:1; text-align:center; background:#0f0f0f; border-radius:8px; padding:6px 0; }
    .wx-day .d-name { color:#9ad; font-size:12px; } .wx-day .d-icon { font-size:22px; }
    .wx-day .d-hi { font-weight:700; font-size:14px; } .wx-day .d-lo { color:#888; font-size:12px; }
    /* game photo card */
    #photoCard { padding:0; overflow:hidden; position:relative; height:230px; }
    #gamePhotos img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1.1s; }
    #gamePhotos img.active { opacity:1; }

    /* mode-based visibility */
    body.mode-idle #menu, body.mode-idle #photoCard { display:none; }
    body.mode-game #carousel, body.mode-game #wxWidget, body.mode-game #infoCard { display:none; }

    /* ---- ticker ---- */
    #ticker { position:absolute; bottom:0; left:0; right:0; height:var(--ticker-h); background:var(--maroon); display:flex; align-items:center; overflow:hidden; }
    #ticker .badge { background:var(--gold); color:#111; font-weight:800; padding:0 16px; height:100%; display:flex; align-items:center; letter-spacing:1px; }
    #tickerText { white-space:nowrap; padding-left:100%; animation:scroll 34s linear infinite; font-size:18px; }
    @keyframes scroll { to { transform:translateX(-100%); } }

    /* ---- overlays ---- */
    #emergency { position:absolute; inset:0; background:#b00; z-index:9999; display:none; align-items:center; justify-content:center; font-size:46px; font-weight:800; text-align:center; padding:60px; }
    body.emergency #emergency { display:flex; }
    #nightOff { position:absolute; inset:0; background:#000; z-index:9000; display:none; align-items:center; justify-content:center; }
    #nightOff.on { display:flex; }
    #nightOff .no-inner { text-align:center; color:#3a3a3a; }
    #nightOff .no-logo { font-size:120px; } #nightOff .no-cap { margin-top:10px; font-size:14px; font-weight:700; letter-spacing:2px; }
  </style>
<!-- ===== Showcase demo shim (standalone build) ===== -->
<link rel="stylesheet" href="../../assets/demo-banner.css">
<script>window.DEMO_META = { name: "Gym TV Display" };</script>
<script src="../../assets/gsr-shim.js"></script>
<script src="data.js"></script>
<script src="mock.js"></script>
<script src="../../assets/demo-banner.js" defer></script>
</head>
<body class="mode-idle">
  <div id="stage">
    <div id="tv">
      <div id="banner"><span id="bannerSport"></span><span class="home">HOME</span><span id="bannerTime"></span></div>
      <div class="root">
        <div class="main">
          <div id="carousel"><div id="carouselEmpty">🦅 HCS ATHLETICS</div></div>
          <div id="menu">
            <div id="halfoffBanner">½ OFF DEALS ACTIVE!</div>
            <div id="menuGrid"></div>
          </div>
        </div>
        <div class="rail">
          <div><div class="clock" id="clock">--:--</div><div class="date" id="date"></div></div>
          <div class="card" id="wxWidget">
            <div class="wx-main"><div id="wxIcon">—</div>
              <div><div id="wxTemp">—°</div><div id="wxFeel"></div><div id="wxDesc">Loading…</div></div></div>
            <div class="wx-forecast" id="wxForecast"></div>
          </div>
          <div class="card" id="photoCard" style="display:none"><div id="gamePhotos"></div></div>
          <div class="card" id="infoCard" style="display:none"><h3>DID YOU KNOW</h3><div id="infoText"></div></div>
          <div class="card"><h3>UPCOMING EVENTS</h3><div id="events"></div></div>
        </div>
      </div>
      <div id="ticker"><div class="badge" id="tickerBadge">ANNOUNCEMENTS</div><div id="tickerText"></div></div>
      <div id="emergency"></div>
      <div id="nightOff"><div class="no-inner"><div class="no-logo">🦅</div><div class="no-cap">HCS Athletics</div></div></div>
    </div>
  </div>

<script>
  // ---- fit the fixed 1280x720 stage to the screen ----
  function fit() {
    var s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    document.getElementById('tv').style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit); fit();

  var skewMs = 0;                                  // serverNow - Date.now(); cooking timers ignore clock skew
  function serverNow() { return Date.now() + skewMs; }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (m) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]; }); }
  function fmtPrice(c) { if (c == null) return ''; return (c % 100 === 0) ? ('$' + c / 100) : ('$' + (c / 100).toFixed(2)); }

  // ---- clock ----
  function updateClock() {
    var d = new Date();
    document.getElementById('clock').textContent = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    document.getElementById('date').textContent = d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
  }
  setInterval(updateClock, 1000); updateClock();

  // ---- weather (open-meteo, no key, CORS-open — the only direct browser fetch) ----
  var WMO = {0:['☀️','Clear'],1:['🌤️','Mainly clear'],2:['⛅','Partly cloudy'],3:['☁️','Overcast'],45:['🌫️','Fog'],48:['🌫️','Icy fog'],51:['🌦️','Drizzle'],53:['🌦️','Drizzle'],55:['🌧️','Heavy drizzle'],61:['🌧️','Rain'],63:['🌧️','Rain'],65:['🌧️','Heavy rain'],71:['🌨️','Snow'],73:['🌨️','Snow'],75:['❄️','Heavy snow'],80:['🌦️','Showers'],81:['🌧️','Showers'],82:['⛈️','Heavy showers'],95:['⛈️','Thunderstorm'],96:['⛈️','T-storm+hail'],99:['⛈️','Severe T-storm']};
  function fetchWeather() {
    var url = 'https://api.open-meteo.com/v1/forecast?latitude=39.672&longitude=-76.352&current=temperature_2m,apparent_temperature,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FNew_York&forecast_days=4';
    fetch(url).then(function (r) { return r.json(); }).then(function (d) {
      var c = d.current, wd = WMO[c.weathercode] || ['🌡️', '—'];
      document.getElementById('wxIcon').textContent = wd[0];
      document.getElementById('wxTemp').textContent = Math.round(c.temperature_2m) + '°F';
      document.getElementById('wxFeel').textContent = 'Feels like ' + Math.round(c.apparent_temperature) + '°';
      document.getElementById('wxDesc').textContent = wd[1];
      var dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], html = '';
      for (var i = 1; i <= 3; i++) {
        var dt = new Date(d.daily.time[i] + 'T12:00:00'), fi = (WMO[d.daily.weathercode[i]] || ['🌡️'])[0];
        html += '<div class="wx-day"><div class="d-name">' + dn[dt.getDay()] + '</div><div class="d-icon">' + fi +
          '</div><div class="d-hi">' + Math.round(d.daily.temperature_2m_max[i]) + '°</div><div class="d-lo">' + Math.round(d.daily.temperature_2m_min[i]) + '°</div></div>';
      }
      document.getElementById('wxForecast').innerHTML = html;
    }).catch(function () { document.getElementById('wxDesc').textContent = 'Weather unavailable'; });
  }
  fetchWeather(); setInterval(fetchWeather, 30 * 60 * 1000);

  // ---- slideshows (idle carousel + game sport photos share one engine) ----
  function slideshow(box, images, interval, st) {
    var sig = (images || []).join('|') + '@' + interval;
    if (sig === st.sig) return;
    st.sig = sig;
    box.querySelectorAll('img').forEach(function (n) { n.remove(); });
    if (st.timer) clearInterval(st.timer);
    st.idx = 0;
    if (!(images && images.length)) return;
    images.forEach(function (src, i) { var img = document.createElement('img'); img.src = src; if (i === 0) img.className = 'active'; box.appendChild(img); });
    st.timer = setInterval(function () {
      var nodes = box.querySelectorAll('img'); if (nodes.length < 2) return;
      nodes[st.idx].classList.remove('active');
      st.idx = (st.idx + 1) % nodes.length;
      nodes[st.idx].classList.add('active');
    }, Math.max(2, interval || 8) * 1000);
  }
  var _carState = {}, _gameState = {};
  function setCarousel(images, interval) {
    document.getElementById('carouselEmpty').style.display = (images && images.length) ? 'none' : 'flex';
    slideshow(document.getElementById('carousel'), images, interval, _carState);
  }
  function setGamePhotos(images) {
    document.getElementById('photoCard').style.display = (images && images.length) ? 'block' : 'none';
    slideshow(document.getElementById('gamePhotos'), images, 6, _gameState);
  }

  // ---- rotating idle info cards ----
  var _info = [], _infoIdx = 0, _infoTimer = null, _infoSig = '';
  function setInfo(cards) {
    var sig = (cards || []).join('|');
    if (sig === _infoSig) return;
    _infoSig = sig; _info = cards || []; _infoIdx = 0;
    if (_infoTimer) { clearInterval(_infoTimer); _infoTimer = null; }
    var card = document.getElementById('infoCard'), txt = document.getElementById('infoText');
    if (!_info.length) { card.style.display = 'none'; return; }
    card.style.display = 'block'; txt.textContent = _info[0];
    if (_info.length > 1) _infoTimer = setInterval(function () {
      txt.style.opacity = '0';
      setTimeout(function () { _infoIdx = (_infoIdx + 1) % _info.length; txt.textContent = _info[_infoIdx]; txt.style.opacity = '1'; }, 500);
    }, 10000);
  }

  // ---- events ----
  function renderEvents(events) {
    var box = document.getElementById('events'); box.innerHTML = '';
    (events || []).slice(0, 6).forEach(function (ev) {
      var when = new Date(ev.start);
      var el = document.createElement('div'); el.className = 'ev';
      el.innerHTML = '<div class="when">' + when.toLocaleDateString([], { weekday: 'short', month: 'numeric', day: 'numeric' }) +
        (ev.allDay ? '' : ' · ' + when.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })) + '</div>' + esc(ev.title);
      box.appendChild(el);
      if (box.scrollHeight > box.clientHeight) el.remove();      // fit-what-shows
    });
  }

  // ---- menu (ported from Eagles Tv.html) ----
  var _menuVer = null, TV_LOW = 5;
  function tileHtml(item, halfOff) {
    var cook = (item.cooking && item.cooking.readyAtMs) ? item.cooking.readyAtMs : 0;
    var isCooking = cook && cook > serverNow();
    var soldOut = !isCooking && item.stock != null && item.stock <= 0;
    var low = !soldOut && !isCooking && item.stock != null && item.stock <= TV_LOW;
    var ribbon = halfOff === true && item.discountable === true;
    var unit = ribbon ? Math.round(item.priceCents / 2) : item.priceCents;
    var cls = 'tile' + (soldOut ? ' tile-soldout' : '') + (ribbon ? ' tile-has-ribbon' : '');
    var ov = '';
    if (ribbon) ov += '<div class="ribbon-half">½ OFF!</div>';
    if (soldOut) ov += '<div class="soldout-banner">Sold Out</div>';
    if (low) ov += '<div class="chip-low">Only ' + item.stock + ' Left</div>';
    var price;
    if (isCooking) price = '<div class="cooking-status" data-ready-at="' + cook + '">BACK IN ' + Math.max(1, Math.ceil((cook - serverNow()) / 60000)) + 'm</div>';
    else if (ribbon) price = '<div class="tile-price"><span class="price-was">' + fmtPrice(item.priceCents) + '</span>' + fmtPrice(unit) + '</div>';
    else price = '<div class="tile-price">' + fmtPrice(unit) + '</div>';
    return '<div class="' + cls + '">' + ov + '<div class="tile-body"><div class="tile-name">' + esc(item.name) + '</div>' + price + '</div></div>';
  }
  function menuHtml(menu) {
    var items = menu.items || [], order = [], groups = {};
    items.forEach(function (it) { var c = it.category || 'Food'; if (!groups[c]) { groups[c] = []; order.push(c); } groups[c].push(it); });
    var multi = order.length > 1, html = '';
    order.forEach(function (cat) {
      if (multi) html += '<h2>' + esc(cat).toUpperCase() + '</h2>';
      html += '<div class="grid-sec" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));grid-auto-rows:min-content;gap:12px;align-content:start;">';
      groups[cat].forEach(function (it) { html += tileHtml(it, menu.halfOff); });
      html += '</div>';
    });
    return html || '<div style="color:#666;padding:40px">Menu not available.</div>';
  }
  function renderMenu(menu) {
    if (!menu) return;
    document.getElementById('halfoffBanner').style.display = menu.halfOff ? 'block' : 'none';
    if (menu.version === _menuVer) return;          // only re-render (cross-fade) on version change
    var grid = document.getElementById('menuGrid');
    if (_menuVer === null) { grid.innerHTML = menuHtml(menu); grid.style.opacity = '1'; }
    else { grid.style.opacity = '0'; setTimeout(function () { grid.innerHTML = menuHtml(menu); grid.style.opacity = '1'; }, 450); }
    _menuVer = menu.version;
  }

  // ---- cooking countdown tick ----
  setInterval(function () {
    var els = document.querySelectorAll('#menuGrid [data-ready-at]');
    for (var i = 0; i < els.length; i++) {
      var readyAt = Number(els[i].getAttribute('data-ready-at')), left = readyAt - serverNow();
      els[i].textContent = left <= 0 ? 'READY NOW!' : ('BACK IN ' + Math.ceil(left / 60000) + 'm');
    }
  }, 1000);

  // ---- ticker ----
  function setTicker(mode, messages) {
    document.getElementById('tickerBadge').textContent = mode === 'game' ? 'CONCESSIONS' : 'ANNOUNCEMENTS';
    var msgs = (messages || []).slice();
    if (mode === 'game') msgs.push('Cash & card accepted · All proceeds support HCS Athletics');
    document.getElementById('tickerText').textContent = msgs.length ? msgs.join('   •   ') : 'Go Eagles!';
  }

  // ---- apply full state ----
  var _lastMode = null;
  function applyContent(st, game) {
    if (game) {
      document.getElementById('bannerSport').textContent = (st.sport || 'HOME GAME').toUpperCase();
      var startsAt = st.gameMode && st.gameMode.detected && st.gameMode.detected.startsAt;
      document.getElementById('bannerTime').textContent = startsAt ? new Date(startsAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';
      renderMenu(st.menu);
      setGamePhotos(st.gamePhotos || []);
      setInfo([]);
    } else {
      _menuVer = null;                              // force fresh menu render next time game starts
      setCarousel((st.control.carousel || {}).images, (st.control.carousel || {}).interval);
      setGamePhotos([]);
      setInfo(st.control.infoCards || []);
    }
    renderEvents(st.events);
    setTicker(st.mode, st.control && st.control.ticker);
  }
  function apply(st) {
    if (!st) return;
    if (st.menu && st.menu.serverNow) skewMs = st.menu.serverNow - Date.now();
    // emergency
    var em = st.control && st.control.emergency;
    document.body.classList.toggle('emergency', !!(em && em.active));
    if (em && em.active) document.getElementById('emergency').textContent = em.message || 'Please follow staff instructions.';
    // night-off window
    var no = st.control && st.control.nightOff, on = false;
    if (no && no.enabled) {
      var n = new Date(), cur = n.getHours() * 60 + n.getMinutes();
      var sp = String(no.start || '22:00').split(':'), ep = String(no.end || '06:00').split(':');
      var s = (+sp[0]) * 60 + (+sp[1]), e = (+ep[0]) * 60 + (+ep[1]);
      on = s <= e ? (cur >= s && cur < e) : (cur >= s || cur < e);
    }
    document.getElementById('nightOff').classList.toggle('on', on);

    var game = st.mode === 'game';
    applyContent(st, game);
    if (_lastMode === null) {
      document.body.classList.toggle('mode-game', game);
      document.body.classList.toggle('mode-idle', !game);
    } else if (game !== _lastMode) {                // stage cross-fade only on an actual mode flip
      var tv = document.getElementById('tv');
      tv.classList.add('fading');
      setTimeout(function () {
        document.body.classList.toggle('mode-game', game);
        document.body.classList.toggle('mode-idle', !game);
        tv.classList.remove('fading');
      }, 450);
    }
    _lastMode = game;
  }

  // ---- poll loop ----
  function poll() {
    google.script.run.withSuccessHandler(apply).withFailureHandler(function () {}).getGymState();
  }
  poll();
  setInterval(poll, 15000);
  setTimeout(function () { location.reload(); }, 4 * 60 * 60 * 1000);   // 4h safety reload
</script>
</body>
</html>
