<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lobby Display TV — Showcase demo</title>
<style>
  :root { --crimson:#B22222; --gold:#D4AF37; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #0f0f12; }
  .bar {
    flex: none; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 10px 16px; color: #fff;
    background: linear-gradient(120deg, #7a1414 0%, #B22222 60%, #d13a3a 100%);
    box-shadow: 0 4px 14px rgba(0,0,0,.35); z-index: 2;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.05rem; }
  .brand .logo { font-size: 1.5rem; }
  .brand small { display: block; font-weight: 600; font-size: .72rem; opacity: .85; }
  .seg { display: inline-flex; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.25); border-radius: 999px; padding: 4px; gap: 2px; flex-wrap: wrap; }
  .seg button {
    border: 0; cursor: pointer; font: inherit; font-weight: 700; font-size: .86rem;
    color: #fff; background: transparent; padding: 8px 13px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px; transition: background .12s;
  }
  .seg button:hover { background: rgba(255,255,255,.16); }
  .seg button.active { background: var(--gold); color: #3a2b00; }
  .spacer { flex: 1; }
  .hint { font-size: .78rem; opacity: .82; }
  .back { color: #fff; text-decoration: none; font-weight: 700; font-size: .86rem; opacity: .9; border: 1px solid rgba(255,255,255,.3); padding: 7px 12px; border-radius: 999px; }
  .back:hover { background: rgba(255,255,255,.12); }
  .stage { flex: 1; position: relative; background: #05070b; }
  .stage iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; background: #05070b; }
  @media (max-width: 820px) { .brand small, .hint { display: none; } .seg button { padding: 8px 10px; font-size: .8rem; } }
</style>
</head>
<body>
  <div class="bar">
    <div class="brand">
      <span class="logo" aria-hidden="true">📺</span>
      <span>Lobby Display<small>Front-desk TV &amp; control</small></span>
    </div>
    <div class="seg" role="tablist" aria-label="Choose a screen">
      <button data-src="dashboard.html" aria-selected="false">🎛️ Control Dashboard</button>
      <button data-src="preview.html?mode=slides" class="active" aria-selected="true">🖥️ Slides</button>
      <button data-src="preview.html?mode=pictures" aria-selected="false">🖼️ Photos</button>
      <button data-src="preview.html?mode=livestream" aria-selected="false">📡 Livestream</button>
      <button data-src="preview.html?mode=emergency" aria-selected="false">🚨 Emergency</button>
    </div>
    <span class="spacer"></span>
    <span class="hint">The TV in each operation ↑</span>
    <a class="back" href="../../index.html" target="_top">← Gallery</a>
  </div>
  <div class="stage">
    <iframe id="screen" src="preview.html?mode=slides" title="Lobby display screen"></iframe>
  </div>
<script>
  var frame = document.getElementById('screen');
  var btns = document.querySelectorAll('.seg button');
  btns.forEach(function (b) {
    b.addEventListener('click', function () {
      btns.forEach(function (x) { x.classList.remove('active'); x.setAttribute('aria-selected', 'false'); });
      b.classList.add('active'); b.setAttribute('aria-selected', 'true');
      frame.src = b.getAttribute('data-src');
    });
  });
</script>
</body>
</html>
