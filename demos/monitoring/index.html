<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Campus Monitoring — Harford Christian School</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* HCS shared design system (inlined — same token layer as the Leadership / Eagle Eye pages). READ-ONLY. */
  :root {
    --hcs-red:#B22222; --hcs-red-dark:#8f1b1b; --hcs-red-soft:#fff5f5;
    --hcs-gold:#D4AF37; --hcs-gold-soft:#fffdf4;
    --hcs-ink:#23272e; --hcs-muted:#6b7280; --hcs-line:#e7e9ee;
    --hcs-bg:#f6f7f9; --hcs-surface:#ffffff; --hcs-surface-2:#f7f8fa;
    --hcs-ok:#1f8a4c; --hcs-ok-bg:#e9f7ef; --hcs-ok-line:#bfe6cd;
    --hcs-alert:#B22222; --hcs-alert-bg:#fde8e8; --hcs-alert-line:#f5c2c2;
    --hcs-info:#2563eb; --hcs-info-bg:#e8f0fe;
    --hcs-off:#8a8f98; --hcs-off-bg:#f1f0ee; --hcs-off-line:#e0ddd9;
    --r-sm:8px; --r:12px; --r-lg:16px; --r-xl:18px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; background: var(--hcs-bg);
    color: var(--hcs-ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .nav { background: var(--hcs-surface); padding: 13px 22px; display: flex; align-items: center; gap: 11px;
    border-bottom: 1px solid var(--hcs-line); position: sticky; top: 0; z-index: 100; }
  .crest { width: 34px; height: 34px; border-radius: 9px; flex: none;
    background: linear-gradient(135deg, var(--hcs-red), var(--hcs-red-dark)); color: #fff; font-weight: 800;
    display: flex; align-items: center; justify-content: center; font-size: 0.95rem;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18); }
  .nav h1 { font-size: 1.04rem; font-weight: 800; letter-spacing: -0.01em; line-height: 1.15; }
  .nav .sub { font-size: 0.76rem; font-weight: 600; color: var(--hcs-muted); }

  .toggle-bar { background: var(--hcs-surface); border-bottom: 1px solid var(--hcs-line);
    padding: 10px 22px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .seg { display: inline-flex; border: 1.5px solid var(--hcs-line); border-radius: 999px; overflow: hidden; background: var(--hcs-surface); }
  .seg button { background: none; border: none; color: var(--hcs-muted); padding: 7px 17px; cursor: pointer;
    font-size: 0.84rem; font-weight: 700; transition: all 0.15s; font-family: inherit; }
  .seg button:not(:last-child) { border-right: 1.5px solid var(--hcs-line); }
  .seg button.active { background: var(--hcs-red); color: #fff; }
  .seg button:hover:not(.active) { background: var(--hcs-red-soft); color: var(--hcs-red); }
  .grp-label { font-size: 0.78rem; font-weight: 700; color: var(--hcs-muted); margin-left: 4px; }
  .btn-refresh { margin-left: auto; background: var(--hcs-red); color: #fff; border: 1px solid var(--hcs-red);
    border-radius: 9px; padding: 7px 15px; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn-refresh:hover { background: var(--hcs-red-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .btn-refresh:disabled { background: var(--hcs-surface-2); color: var(--hcs-muted); border-color: var(--hcs-line); cursor: default; box-shadow: none; }
  .btn-spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid transparent;
    border-top-color: currentColor; border-right-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main { padding: 22px 26px; }
  .checked { font-size: 0.74rem; color: var(--hcs-muted); margin: 0 0 16px 2px; }

  /* ── roll-up summary strip ─────────────────────────────────────────────── */
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .scard { background: var(--hcs-surface); border: 1px solid var(--hcs-line); border-left: 5px solid var(--hcs-ok);
    border-radius: var(--r-lg); padding: 16px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 2px rgba(20,20,40,0.04); }
  .scard.alert { border-left-color: var(--hcs-alert); background: var(--hcs-red-soft); }
  .scard .sic { font-size: 1.7rem; flex: none; }
  .scard .slab { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--hcs-muted); font-weight: 700; }
  .scard .sval { font-size: 1.15rem; font-weight: 800; margin-top: 2px; }
  .scard.ok    .sval { color: var(--hcs-ok); }
  .scard.alert .sval { color: var(--hcs-alert); }
  .scard .snames { font-size: 0.78rem; color: var(--hcs-muted); margin-top: 3px; font-weight: 600; }

  /* ── device groups ─────────────────────────────────────────────────────── */
  .group { margin-bottom: 24px; }
  .ghead { display: flex; align-items: baseline; gap: 9px; font-size: 0.9rem; font-weight: 800;
    letter-spacing: -0.01em; margin-bottom: 12px; padding-bottom: 7px; border-bottom: 2px solid var(--hcs-line); }
  .ghead .gn { margin-left: auto; font-size: 0.74rem; font-weight: 700; color: var(--hcs-muted); }
  .ghead .galert { color: var(--hcs-alert); }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 11px; }
  .card { background: var(--hcs-surface); border: 1px solid var(--hcs-line); border-left: 4px solid var(--hcs-off);
    border-radius: var(--r); padding: 12px 14px; box-shadow: 0 1px 2px rgba(20,20,40,0.03); }
  .card.s-alert   { border-left-color: var(--hcs-alert); background: var(--hcs-red-soft); }
  .card.s-normal  { border-left-color: var(--hcs-ok); }
  .card.s-info    { border-left-color: var(--hcs-info); }
  .card.s-offline { border-left-color: var(--hcs-off); }
  .card .cn { font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 7px; }
  .card .ci { font-size: 0.95rem; flex: none; }
  .card .cs { margin-top: 5px; font-size: 0.86rem; font-weight: 700; }
  .card.s-alert   .cs { color: var(--hcs-alert); }
  .card.s-normal  .cs { color: var(--hcs-ok); }
  .card.s-info    .cs { color: var(--hcs-info); }
  .card.s-offline .cs { color: var(--hcs-off); }
  .card .cd { margin-top: 3px; font-size: 0.76rem; color: var(--hcs-muted); font-weight: 600; }
  .card .cb { display: block; font-size: 0.68rem; color: var(--hcs-muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; }

  #loading, #empty { text-align: center; padding: 60px 20px; color: var(--hcs-muted); font-size: 0.95rem; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--hcs-line); border-top-color: var(--hcs-red);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }

  @media (max-width: 640px) { .summary { grid-template-columns: 1fr; } main { padding: 14px; } }
</style>
<!-- ===== Showcase demo shim (standalone build) ===== -->
<link rel="stylesheet" href="../../assets/demo-banner.css">
<script>window.DEMO_META = { name: "Campus Monitoring" };</script>
<script src="../../assets/gsr-shim.js"></script>
<script src="data.js"></script>
<script src="mock.js"></script>
<script src="../../assets/demo-banner.js" defer></script>
</head>
<body>

<nav class="nav">
  <div class="crest">HC</div>
  <div>
    <h1>Campus Monitoring</h1>
    <div class="sub">Harford Christian School &middot; YoLink sensors</div>
  </div>
</nav>

<div class="toggle-bar">
  <span class="grp-label">Group by</span>
  <div class="seg" id="seg">
    <button data-grp="building" class="active" onclick="setGroup('building', this)">Building</button>
    <button data-grp="type"                 onclick="setGroup('type', this)">Device Type</button>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="refresh()">Refresh</button>
</div>

<main>
  <div id="checked" class="checked"></div>
  <div id="summary" class="summary" style="display:none"></div>
  <div id="loading"><div class="spinner"></div>Loading sensors&hellip;</div>
  <div id="empty" style="display:none">No sensor data yet — the poll runs every 10 minutes. Check back shortly.</div>
  <div id="groups"></div>
</main>

<script>
  var SNAP = window.MONITOR_SNAP;
  var _group = 'building';

  var BUILDING_ORDER = ['High School', 'Elementary', 'Kindergarten', '6th Grade', 'Modular', 'Bus Barn', 'Other'];
  var TYPE_META = {
    leak:   { label: 'Water Leak Sensors', icon: '💧' },
    fridge: { label: 'Fridge / Freezer',   icon: '🧊' },
    meter:  { label: 'Water Meters',       icon: '🚰' },
    outlet: { label: 'Outlets',            icon: '🔌' },
    hub:    { label: 'Hubs',               icon: '📶' },
    other:  { label: 'Other',              icon: '⚙️' }
  };
  var TYPE_ORDER = ['leak', 'fridge', 'meter', 'outlet', 'hub', 'other'];
  var CAT_ICON = { leak: '💧', fridge: '🧊', meter: '🚰', outlet: '🔌', hub: '📶', other: '⚙️' };

  function esc(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function ago(iso) {
    if (!iso) return 'never';
    try {
      var mins = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + ' min ago';
      var h = Math.round(mins / 60);
      return h + (h === 1 ? ' hr ago' : ' hrs ago');
    } catch (e) { return ''; }
  }

  function setGroup(g, btn) {
    _group = g;
    Array.prototype.forEach.call(document.querySelectorAll('#seg button'), function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    renderGroups();
  }

  function refresh() {
    var btn = document.getElementById('btn-refresh');
    btn.disabled = true; btn._o = btn.innerHTML; btn.innerHTML = '<span class="btn-spinner"></span>Refreshing&hellip;';
    google.script.run
      .withSuccessHandler(function(snap) { SNAP = snap || SNAP; btn.disabled = false; btn.innerHTML = btn._o; renderAll(); })
      .withFailureHandler(function() { btn.disabled = false; btn.innerHTML = btn._o; })
      .getMonitorSnapshotForClient();
  }

  function renderAll() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('checked').textContent = 'Sensors checked ' + ago(SNAP && SNAP.checkedAt) +
      (SNAP && SNAP.count ? ' · ' + SNAP.count + ' devices' : '');
    renderSummary();
    renderGroups();
  }

  function renderSummary() {
    var el = document.getElementById('summary');
    var ru = SNAP && SNAP.rollups;
    if (!ru) { el.style.display = 'none'; return; }
    el.style.display = 'grid';
    el.innerHTML = summaryCard('💧', 'Water Leak', ru.leak) +
                   summaryCard('🧊', 'Fridge / Freezer', ru.fridge);
  }
  function summaryCard(icon, label, r) {
    var alert = !!(r && r.alert);
    var names = (r && r.names) || [];
    return '<div class="scard ' + (alert ? 'alert' : 'ok') + '">' +
      '<div class="sic">' + icon + '</div>' +
      '<div><div class="slab">' + esc(label) + '</div>' +
      '<div class="sval">' + (alert ? 'Alert Detected' : 'Normal') + (alert && r.count ? ' · ' + r.count : '') + '</div>' +
      (alert && names.length ? '<div class="snames">' + names.map(esc).join(', ') + '</div>' : '') +
      '</div></div>';
  }

  function renderGroups() {
    var el = document.getElementById('groups');
    var devices = (SNAP && SNAP.devices) || [];
    if (!devices.length) { el.innerHTML = ''; document.getElementById('empty').style.display = 'block'; return; }
    document.getElementById('empty').style.display = 'none';

    var buckets = {}, order;
    if (_group === 'type') {
      devices.forEach(function(d) { (buckets[d.category] = buckets[d.category] || []).push(d); });
      order = TYPE_ORDER.filter(function(k) { return buckets[k]; });
    } else {
      devices.forEach(function(d) { (buckets[d.building] = buckets[d.building] || []).push(d); });
      order = BUILDING_ORDER.filter(function(k) { return buckets[k]; });
      // any building not in the known order, appended
      Object.keys(buckets).forEach(function(k) { if (order.indexOf(k) < 0) order.push(k); });
    }

    el.innerHTML = order.map(function(key) {
      var list = buckets[key].slice().sort(function(a, b) {
        // alerts first, then by name
        if ((a.status === 'alert') !== (b.status === 'alert')) return a.status === 'alert' ? -1 : 1;
        return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
      });
      var alerts = list.filter(function(d) { return d.status === 'alert'; }).length;
      var heading = (_group === 'type') ? (TYPE_META[key] ? TYPE_META[key].icon + ' ' + TYPE_META[key].label : key) : key;
      var nInfo = alerts ? '<span class="gn galert">' + alerts + ' alert' + (alerts === 1 ? '' : 's') + ' / ' + list.length + '</span>'
                         : '<span class="gn">' + list.length + '</span>';
      return '<div class="group"><div class="ghead">' + esc(heading) + nInfo + '</div>' +
        '<div class="cards">' + list.map(cardHtml).join('') + '</div></div>';
    }).join('');
  }

  function cardHtml(d) {
    var icon = CAT_ICON[d.category] || '⚙️';
    return '<div class="card s-' + esc(d.status) + '">' +
      '<div class="cn"><span class="ci">' + icon + '</span>' + esc(d.name) + '</div>' +
      '<div class="cs">' + esc(d.summary || '') + '</div>' +
      (d.detail ? '<div class="cd">' + esc(d.detail) + '</div>' : '') +
      '<span class="cb">' + esc(_group === 'type' ? d.building : (TYPE_META[d.category] ? TYPE_META[d.category].label : d.type)) + '</span>' +
    '</div>';
  }

  renderAll();
</script>
</body>
</html>
